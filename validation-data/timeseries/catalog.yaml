schema_version: 1
canonical_columns:
- dataset_id
- run_id
- time_s
- T_K
- pressure_context
- species
- model_species
- signal_type
- value
- uncertainty
- source_table
- source_row
- sample
- analysis_label
- notes
root: validation-data/timeseries
normalization_source: docs-private/validation-data/timeseries from 2026-07-05 ingest
  plus t-110 DS-010 fetch attempt
model_mapping_note: model_species maps residue oxides to the runtime vapor species
  parent where possible; missing activity/pO2 context is reported as a validation
  gap, not fitted. Si-bearing residue and forsterite-rate rows map to SiO,
  the runtime volatile proxy for silica volatilization, not inactive elemental
  Si.
