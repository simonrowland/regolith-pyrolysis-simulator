# Chemistry Provenance Registry — the comparative decision layer
#
# Policy: docs/citation-policy.md. Bibliography (source details + DOI): docs/references/references.yaml
# (REF-xxx ids). This file is the layer ON TOP of the bibliography: keyed by VALUE (not by source), it
# records for each grounded number WHICH source we rely on, WHY that one, and what the ALTERNATIVES lack.
# It is the single machine-readable answer to "here is what we use and why, vs these other references".
# Population notes, audit tallies, and the encode-next backlog live in the sidecar, NOT here:
#   docs/chemistry-provenance.notes.md
#
# Audit (human or agent), one command: python3 scripts/audit_chemistry_provenance.py --strict
#   (a) every `value` matches the number at each of its `code_sites`;
#   (b) every grounded chemistry coefficient in the code has an entry here;
#   (c) reports counts per `tier` and every open `gap`.
#
# Entry schema (all keys required unless marked optional):
#   id:            stable slug (referenced by the inline comment at each code_site)
#   quantity:      what the number physically is
#   value:         the number (or range) actually used
#   units:         explicit units
#   tier:          CITED | ASSUMED | UNCERTIFIED   (see citation-policy.md §3)
#   basis:         standard-state / component-basis / concentration-measure   (policy §4; where it matters)
#   range:         {T_K: [lo, hi], composition: ..., measured_vs_extrapolated: measured|extrapolated}
#   uncertainty:   reported error bar or literature scatter
#   chosen:        {ref: REF-xxx, why: <one line: why this over the alternatives>}
#   alternatives:  [ {ref: REF-xxx|<name>, value: ..., lacks: <the specific X/Y/Z that down-ranked it>}, ... ]
#   code_sites:    [ <file:symbol> ]   (or "pending: <task>" if not yet in code)
#   validation:    (optional) how it is ground-truth checked
#   status:        active | pending-rework | deprecated

schema_version: 1

values:

  - id: gamma_alkali_melt_activity
    quantity: >-
      Melt activity coefficient of the alkali oxide component (single-cation NaO0.5 / KO0.5) in a
      silicate melt, used to correct the alkali vapor pressure for melt non-ideality
      (p_M proportional to gamma_MO0.5 * X_MO0.5, i.e. LINEAR in gamma on this basis).
    value: {NaO0.5: 1.0e-3, KO0.5: 3.5e-5}
    units: dimensionless
    tier: UNCERTIFIED   # single-temperature datum, extrapolated to the 1773-2173 K recipe band; T-dependence not yet fit
    basis: >-
      single-cation NaO0.5 / KO0.5 component; RAOULTIAN reference (activity -> 1 for the pure liquid
      oxide, consistent with the JANAF pure-oxide K_p); MOLE fraction (single-cation-normalized). The
      reaction is NaO0.5(l) = Na(g) + 1/4 O2 (Sossi & Fegley Eqn 25), so gamma enters p_Na LINEARLY.
    range:
      T_K: [1500, 1673]
      anchors:
        NaO0.5: {anchor_T_K: 1673, composition: "FCMAS ferrobasalt (Na 3252 ppm, K 944 ppm), lunar-analog"}
        KO0.5: {anchor_T_K: 1500, composition: "Apollo 12022 / DeMaria lunar basalt KEMS inversion"}
      measured_vs_extrapolated: point_anchor_extrapolated_to_recipe_band   # recipe band 1773-2173 K is HOTTER; gamma rises toward 1 with T
    uncertainty: "NaO0.5 +/-2.2e-4 (Sossi 2019); KO0.5 is DeMaria/Sossi-Fegley point-anchor value 3.5e-5 at 1500 K; table envelope KO0.5 6.3e-5-7.1e-4 remains a comparison band"
    chosen:
      ref: "REF-013 REF-019 REF-049"   # Sossi 2019 for Na; Sossi & Fegley 2018 + DeMaria 1971 for K
      locus: "GCA 260:204-231, §4.5.1 and Tables 3-4 (Table 4 gamma_NaO0.5=1.0e-3 at 1673 K); DeMaria et al. 1971 Apollo 12022 KEMS inversion carried by Sossi & Fegley 2018 Fig. 5/source OCR line ~350 gives gamma_KO0.5=3.5e-5 at 1500 K; reaction MO0.5(l)=M(g)+1/4 O2"
      url: "https://doi.org/10.1016/j.gca.2019.06.021; https://doi.org/10.2138/rmg.2018.84.11; NASA ADS bibcode 1971LPSC....2.1367D"
      corpus: "docs-private/deep-research/literature/sossi-2019-gca-hkl-evaporation/mineru/source/vlm/source.md"
      why: >-
        Primary 1-atm gas-mixing furnace evaporation experiments on a ferrobasalt (lunar analog),
        with LA-ICP-MS residual-glass analyses and HKL/logK* fitting; reports gamma on the correct
        single-cation NaO0.5 basis, Raoultian, with the explicit reaction and logK*. The runtime K value
        is the DeMaria 1971 lunar KEMS inversion carried by Sossi & Fegley 2018 at the Apollo 12022 anchor.
    alternatives:
      - ref: REF-019   # Sossi & Fegley 2018, Rev. Mineral. Geochem. 84:393-459
        locus: "Table 2, NaO0.5 & KO0.5 rows (pp. 409-410); Raoultian def Eqn 24 (p. 413); reaction Eqn 25 (p. 413); gamma(T) Fig 5 (p. 414)"
        value: "NaO0.5 8.4e-4-2.2e-3 @1673 K (Mathieu et al. 2011); KO0.5 6.3e-5-7.1e-4 @1573 K (Hastie et al. 1981)"
        url: "https://doi.org/10.2138/rmg.2018.84.11"
        corpus: "docs-private/deep-research/literature/sossi-fegley-2018-volatility/mineru/source/vlm/source.md — Table 2 :1244, Eqn 24 :1533, Eqn 25 :1547, Fig 5 :1577"
        lacks: "review compilation, not the primary; the NaO0.5 datum is from a CMS melt (Mathieu 2011), not a lunar-analog ferrobasalt"
      - ref: REF-049
        note: "DeMaria et al. 1971 Apollo 12022 KEMS; bibliography record is REF-049, DOI blank, ADS bibcode tracked in references.yaml."
        locus: "Fig 1 (p_Na vs 1/T), Fig 2 (p_K vs 1/T); Proc. 2nd Lunar Sci. Conf., vol. 2, pp. 1367-1380"   # exact page/URL: verify (t-106)
        value: "direct p_Na=3.2e-2 Pa @1538 K (melt 0.36 wt% Na2O); gamma_NaO0.5~1e-3 via S&F derivation"
        url: "NASA ADS bibcode 1971LPSC....2.1367D; DOI-less proceedings"
        corpus: "docs/model-limitations.md#demaria-1971-k-validation-rows"
        lacks: "does not tabulate gamma directly (reports p_Na, p_K). IS the LUNAR primary + the ideal VALIDATION case (our exact feedstock) — used to CHECK the model, not as the gamma source."
      - ref: "Bencze & Yazhenskikh 2016, gasifier-slag KEMS"
        locus: "Table S-I (ln p(Pa)=A-B/T fits); MinerU OCR corpus path below."
        value: "p_Na(1773 K calc)=2.77e-2 Pa on a Na2O 2-cation activity basis"
        url: ""
        corpus: "docs-private/deep-research/literature/bencze-yazhenskikh-2016-gasifier-slag-kems-si/mineru/source/vlm/source.md"
        lacks: "wrong feedstock (gasifier slag, not silicate/lunar); Na2O di-cation basis (not single-cation NaO0.5); degenerate aNa2O extrapolation"
    code_sites:
      - "pending: CF-3 rework (t-003) — engines/builtin/vapor_pressure.py MELT_OXIDE_ACTIVITY_COEFFICIENTS, rebuilt on the single-cation-linear basis"
    alphamelts_cross_check_status: "inconclusive_no_activities"
    validation: >-
      Reproduce DeMaria 1971 (test-harness feedstock = lunar basalt 0.36 wt% Na2O / 0.068 wt% K2O at the
      stated pO2): the corrected model p_Na must match the measured ~3.2e-2 Pa @1538 K and the p_Na(T) slope.
    status: implemented-cf3-rework-t003-pending-golden-rebaseline
    trace: docs-private/deep-research/cf3-alkali-activity-synthesis.md

  - id: k_mox_liquid_standard_reaction
    quantity: >-
      Potassium vapor-pressure standard-reaction term for the liquid single-cation KO0.5 reaction
      KO0.5(l) = K(g) + 1/4 O2(g), consumed directly by the builtin K vapor path.
    value:
      antoine: {A: 10.641294, B: 9965.408779, C: -123.001}
      oxide_activity_exponent: 1.0
      pO2_exponent: -0.25
      pO2_reference_bar: 1.0
      fit_residual_dex: {max_abs: 0.000223, rms: 0.000083}
      heldout_demaria_residual_dex: {min: 1.152912, max: 1.282637, at_1428_571K: 1.241499}
    units: "log10(Pa) Antoine-like standard term; P_K = 10^(A-B/T) * a_KO0.5 * (pO2_bar/1bar)^-0.25"
    tier: UNCERTIFIED
    basis: >-
      single-cation KO0.5 liquid Raoultian activity basis; oxide_activity_exponent = 1.0 and
      pO2_exponent = -0.25 from KO0.5(l) = K(g) + 1/4 O2(g). The term is a standard-reaction
      pressure at a_KO0.5=1 and pO2_reference_bar=1.0, not a JANAF K2O(cr) condensed-phase surrogate,
      not a VapoRock backsolve, and not fitted to DeMaria.
    range:
      T_K: [1190, 1600]
      composition: "source thermodynamic standard term; runtime validation uses Apollo 12022 lunar basalt K2O 0.068 wt%"
      measured_vs_extrapolated: "Lamoreaux & Hildenbrand 1984 Tables 2/4 fef fits and Table 4 enthalpies; DeMaria Fig.2/Table 1 rows held out"
    uncertainty: >-
      Lamoreaux & Hildenbrand 1984 Table 4 enthalpy propagation gives about +/-0.09 dex near
      1450 K before fef-fit tolerance; fef fits add about +/-0.03 to 0.3 dex reaction-summed.
      The paper flags potassium-oxide data as limited and uncertain. DeMaria KEMS calibration,
      Apollo 12022 sub-liquidus state, and runtime constant gamma_KO0.5 remain separate validation
      uncertainty carriers.
    chosen:
      ref: REF-052
      locus: >-
        Tables 2 and 4: K2O(l), K(g), and O2(g) Gibbs-energy-function fits plus DeltafH298/R;
        assembly verified in docs-private/research/2026-07-07-t141-kmox/lamoreaux-hildenbrand-1984-verified-data.md.
      url: "https://doi.org/10.1063/1.555706"
      why: >-
        This is the independent local source chain that keeps the standard term on liquid K2O/KO0.5
        without fitting to DeMaria. The held JANAF K2O(cr) term is rejected because it mixes a crystal
        standard state with the liquid Raoultian activity convention; the DeMaria/Sossi backsolve is
        rejected as validation data leakage into the standard term.
    alternatives:
      - ref: REF-020
        value: "JANAF K2O(cr)-derived held fit A=11.882258, B=12892.095382; 1429 K standard term about 2.86 log10 Pa"
        lacks: "wrong condensed-phase convention for liquid KO0.5 activity; review found 5.574 dex contamination when paired with Sossi gamma"
      - ref: "DeMaria et al. 1971 / Sossi & Fegley 2018 reconstruction"
        value: "prior fit A=15.171577, B=19293.857399, C=0.0; matched DeMaria 1429 K within about -0.10 dex"
        lacks: "not independent; standard term was back-solved from held-out DeMaria KEMS data"
    code_sites:
      - "data/vapor_pressures.yaml:metals.K"
    validation: >-
      Provider test reconstructs the Lamoreaux-Hildenbrand source rows to <=0.001 dex and reports
      the held-out DeMaria comparison using measured/interpolated Table 1 pO2 (log10 pO2_bar about
      -7.858 at 1428.57 K): model-minus-DeMaria residual is about +1.24 dex with runtime gamma.
    status: implemented-t141-pending-golden-rebaseline

  - id: janaf_chase1998_thermal_latent_dissoc
    quantity: >-
      Metal latent heats of vaporization and parent-oxide dissociation enthalpies used by the thermal
      budget when estimating the energy cost of evaporated products.
    value:
      latent_vaporization_kJ_per_mol: {Na: 97.42, K: 76.90, Mg: 127.40, Fe: 340.00, Ca: 153.60, Al: 284.10, Si: 359.00, Ti: 425.00, Cr: 339.50, Mn: 220.50}
      oxide_dissociation_kJ_per_mol: {Na2O: 414.22, K2O: 363.17, MgO: 601.60, FeO: 272.04, CaO: 635.09, Al2O3: 1675.69, SiO2: 910.94, TiO2: 944.75, Cr2O3: 1139.70, MnO: 385.20}
    units: kJ/mol
    tier: CITED
    basis: >-
      Delta_f H deg at 298.15 K, 1 bar standard state; dissociation values are -Delta_f H of the parent
      oxide, and latent values are M(l) -> M(g) vaporization enthalpies. The runtime uses these as
      298 K proxies and omits fusion plus sensible heat, as noted at the code site.
    range:
      T_K: [298, 6000]
      recipe_1773_2173K: interpolated within the JANAF tabulation but used as a proxy in the model
      measured_vs_extrapolated: interpolated
    uncertainty: "JANAF evaluated, species-specific; typical assessed uncertainty is order 0.1-2 kJ/mol, with per-table details in the source."
    chosen:
      ref: REF-020
      locus: "NIST-JANAF Monograph 9 species tables: metal latent rows Na(l)->Na(g), K(l)->K(g), Mg(l)->Mg(g), Fe(l)->Fe(g), Ca(l)->Ca(g), Al(l)->Al(g), Si(l)->Si(g), Ti(l)->Ti(g), Cr(l)->Cr(g), Mn(l)->Mn(g); oxide Delta_fH rows Na2O(s), K2O(s), MgO(s), FeO(s), CaO(s), Al2O3(s), SiO2(quartz), TiO2(rutile), Cr2O3(s), MnO(s). Table IDs/pages not fully recovered; Monograph 9 pages unverified."
      url: "https://janaf.nist.gov/"
      why: >-
        Canonical evaluated thermochemical compilation with consistent species and phase coverage across
        the required metals and oxides.
    alternatives:
      - ref: "Barin, Thermochemical Data of Pure Substances"
        lacks: "different evaluation round and not the uniform JANAF-consistent compilation used elsewhere in the simulator"
      - ref: "CODATA Key Values"
        lacks: "selected subset only; not full coverage for all metals, oxides, and vapors in this table"
    code_sites:
      - "simulator/thermal_budget.py:71 (_LATENT_VAPORIZATION_KJ_PER_MOL)"
      - "simulator/thermal_budget.py:100 (_OXIDE_DISSOCIATION_KJ_PER_MOL)"
    status: active

