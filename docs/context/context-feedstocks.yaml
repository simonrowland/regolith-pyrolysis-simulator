    metallic_FeNi: {wt_pct: [10, 20], note: "already reduced; magnetic separation → 100-200 kg/t at zero energy"}
    FeS_troilite: {wt_pct: [5, 6], note: "25-30 kg S/t from decomposition at 600-900C"}
    C: {wt_pct: [0.1, 0.5], note: "1-5 kg C/t"}
  liquidus_C: [1350, 1450]  # vs 1150-1250 for CMAS; 15-25% more melting energy
  gravity: "micro-g to milli-g (redesign needed for tapping, injection, condensation)"

