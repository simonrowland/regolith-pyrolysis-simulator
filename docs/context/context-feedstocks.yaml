  preferred_for: "Multi-product ISRU (O2 + metals + P chemicals + REE-Zr ceramic)"
  SiO2: [48, 53]
  TiO2: [1.5, 3.5]
  Al2O3: [13, 17]
  FeO: [8, 14]
  MgO: [6, 11]
  CaO: [9, 12]
  Na2O: [0.6, 1.3]
