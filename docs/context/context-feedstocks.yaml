  pO2_self_buffering: "Fe/FeO equilibrium at 1500C → pO2 ~1e-9 bar (suppresses SiO without external control)"


ci_carbonaceous_chondrite:  # Also Ceres and comet nuceli
  source: "CI meteorites; Hayabusa2 Ryugu return; OSIRIS-REx Bennu return"
  confidence: "High (two sample returns 2020/2023)"
  note: "Bulk composition; ~200-350 kg/t lost as volatiles during extended C0"
  bulk:
    H2O_structural: [10, 20]    # in phyllosilicates
    C: [2, 5]                    # organics + carbonates
    S: [2, 6]                    # predominantly sulfides
    SiO2: [22, 28]
    FeO_plus_Fe2O3: [20, 30]    # mostly as magnetite Fe3O4
    MgO: [15, 22]
    Al2O3: [1.5, 3]
    CaO: [1, 2.5]
    Na2O: [0.5, 1.0]
    NiO: [1.2, 1.8]             # high Ni → 3-8% Ni in pyrolysis Fe product
  anhydrous_silicate_after_degassing:
    mass_per_tonne: [650, 800]
    SiO2: [32, 40]
    FeO: [25, 35]               # all as FeO after conditioning blow
    MgO: [22, 26]
    Al2O3: [2, 3]
    CaO: [1.5, 3]
    NiO: [1.5, 2.5]
  degassing_cascade:
    200-500C: "organic pyrolysis → hydrocarbons, CO2 (char remains)"
    400-700C: "phyllosilicate dehydroxylation → H2O (serpentine → forsterite + enstatite)"
    500-900C: "sulfide decomposition → S2 (no reductant needed)"
    600-800C: "carbonate decomposition → CO2"
    800-950C: "magnetite reduction by CO → wustite (FeO)"
    1000-1050C: "conditioning O2 blow (desulf, decarb, re-oxidise incidental Fe)"
  key_products:
    H2O_kg: [100, 170]          # uniquely abundant
    Fe_Ni_alloy_kg: [75, 120]   # from pyrolysis; 3-8% Ni, zero S/C (vapour purified)
    S_kg: [25, 40]
    hydrocarbons_kg: [15, 30]
  indigenous_carbon_sufficient: true  # 30-50 kg C vs 10-27 kg demand; self-cleaning
  surface_dehydration_note: "Ryugu showed ~50% less H2O than pristine CI meteorites"

cm_carbonaceous_chondrite:
  note: "Similar to CI but less hydrated, less carbon"
  H2O_structural: [6, 12]
  C: [1.5, 3]
  S: [2, 4]
  anhydrous_silicate: "similar to CI but slightly higher SiO2, lower FeO"

# === ICY CARBONACEOUS FAMILY ===
# Broad category covering CI/CM meteorites, Ceres regolith, and comet nuclei.
# All share identical post-degassing silicate processing (C1–C6 unchanged from CI baseline).
# Differences are confined to C0 staged degassing + trap cartridges + bonus volatiles.
# Ceres is the prime long-term mining target ("has everything") and gets its own dedicated entry below.

ceres_regolith:
  source: "Dawn VIR/GRaND global mapping + 2025 brine/habitability reanalyses"
  confidence: "Very High (orbital + recent models)"
  note: "extends: ci_carbonaceous_chondrite — evolved icy carbonaceous dwarf-planet regolith (NH4-clays + brine salts)"
  H2O_ice_structural_kg_per_tonne: [120, 280]  # variable; poles/bright spots & subsurface brines much higher
  carbon_content_wt_pct: [15, 20]             # ultra-carbonaceous dark component + organics reservoir
  key_minerals: "Mg-phyllosilicates, global ammoniated phyllosilicates (NH4-clays), Mg/Ca/Na carbonates, brine salts"
  anhydrous_silicate_after_degassing: "identical to CI (SiO₂ 32–40, FeO 25–35, MgO 22–26) but slightly Mg-richer"
  key_feature: "Ammonia-rich + brine-derived salts; highest-accessibility water factory in main belt"
  preferred_for: "Water + NH₃ propellant/life-support + fertilizer salts + Mg shuttle bootstrapping"
  adaptations:
    C0: "Extended staged (6–15 h): organics/NH₃ release 200–500 °C, phyllosilicate dehydroxylation 400–700 °C, carbonate decomposition 600–850 °C, sulfide + conditioning O₂ blow 1000–1050 °C. Add NH₃ trap (200–400 °C) + enhanced carbonate/CO₂ handling."
  bonus_products:
    H2O_kg: [120, 250]
    NH3_kg: [8, 25]
    carbonate_salts_kg: [15, 40]   # Mg/Ca/Na carbonates for chemistry or cement
  process_deltas: |
    Post-C0 silicate processing (C1–C6) identical to CI baseline. Immediate Mg surplus (batch-1 bootstrapping). Higher a(MgO) possible from Mg-carbonates/serpentines. Excellent energy balance. Centigravity environment (0.029 g) simplifies mining vs micro-g bodies. Micro-g adaptations still apply for condensers.

comet_nucleus:
  source: "Rosetta/67P + other Jupiter-family comets; primitive outer-solar-system analogs"
  confidence: "High (Rosetta + meteorite/returned sample context)"
  note: "extends: ci_carbonaceous_chondrite  — Volatile-extreme CI with massive supervolatiles"
  dust_to_ice_ratio: "4–10 : 1 (porous nucleus ~75 % void)"
  volatiles_lost_in_C0:
    H2O_kg_per_tonne: [200, 400]
    CO_CO2_kg: [50, 150]
    organics_hydrocarbons_kg: [50, 100]
    CH4_NH3_HCN_kg: [10, 40]
    S_kg: [20, 40]
  anhydrous_silicate_after_degassing: "identical to CI (SiO₂ 32–40, FeO 25–35, MgO 22–26)"
  key_feature: "Massive propellant factory (CO, CH₄, H₂O, NH₃) + same metals as CI"
  preferred_for: "Outer-belt/icy-body ISRU: propellant + life-support + Mg shuttle"
  adaptations:
    C0: "Extreme staged degassing (10–20+ h): 100–300 °C (supervolatiles + organics), 400–700 °C (H₂O), 500–900 °C (sulfides), 600–800 °C (carbonates), 1000–1050 °C (conditioning O₂ blow). Add CO/CH₄ cold-traps (100–200 °C), NH₃/HCN scrubber (150–300 °C), enhanced SO₂ sorbent."
  bonus_products:
    H2O_kg: [200, 350]
    CO_CH4_propellant_kg: [60, 180]
    NH3_HCN_kg: [10, 30]
  process_deltas: |
    Post-C0 silicate identical to CI → full C1–C6 unchanged (Mg-dominant 55–85+ kg Mg/t).
    Immediate Mg surplus; highest net propellant yield of any feedstock.
    Energy: +600–1000 kWh solar-thermal for C0. Micro-g wicking/centrifugal condensers mandatory (already noted for S-type/CI).
    Terminal slag unchanged. Safety: staged ramp critical to avoid pressure spikes in porous nucleus material.

