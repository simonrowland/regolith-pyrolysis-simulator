  confidence: "Medium-High (Apollo samples + meteorites + orbital Th mapping)"
  process_deltas: "Extended C0 with controlled-pO2 Phase 0b (950-1180°C, 0.5-5 mbar O2 flow/sweep/bubbling, 1-4h hold) for selective P volatilization as PO/POx; delays Na/K onset. Dedicated 350-650°C CaO/MgO P-trap in condensation train → 60-90% P capture as phosphate byproduct (no metal contamination). Analog to CI conditioning O2 blow. O2 fully recoverable solar-thermally. Enhances alkali shuttle + premium P/REE/Zr slag valorization."
