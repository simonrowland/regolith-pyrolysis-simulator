# Oxygen Shuttle — Feedstock Compositions
# All values in wt% oxide (anhydrous basis unless noted)

lunar_mare:
  source: "Apollo 11/12/15 basaltic soils"
  confidence: "High (sample return)"
  SiO2: [43, 46]
  TiO2: [1.5, 8.0]    # highly variable; low-Ti ~1.5, high-Ti ~8
  Al2O3: [12, 15]
  FeO: [15, 18]
  MgO: [8, 10]
  CaO: [10, 12]
  Na2O: [0.3, 0.5]
  K2O: [0.05, 0.15]
  Cr2O3: [0.2, 0.5]
  MnO: [0.15, 0.25]
  P2O5: [0.05, 0.15]
  ZrO2: trace
  REE: [0.01, 0.03]    # wt% total REE oxide
  native_Fe_wt_pct: ~0.5  # nanophase Fe0
  volatiles_kg_per_tonne: [0.3, 1.0]  # solar-wind implanted CHNOPS

lunar_highland:
  source: "Apollo 16 anorthositic soils"
  confidence: "High (sample return)"
  SiO2: [44, 46]
  TiO2: [0.3, 0.6]
  Al2O3: [25, 28]
  FeO: [4, 6]
  MgO: [5, 7]
  CaO: [14, 17]
  Na2O: [0.4, 0.6]
  K2O: [0.05, 0.15]
