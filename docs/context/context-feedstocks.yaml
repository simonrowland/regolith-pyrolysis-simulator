  Cr2O3: [0.3, 0.7]
  MnO: [0.15, 0.30]
  ZrO2: [0.15, 0.45]       # 1500–4000+ ppm Zr
  REE: [0.6, 2.5]          # total REE oxides, 20–100× mare
  Th_ppm: [25, 80+]        # ore-grade in hotspots
  note: "Phosphate cumulates or immiscible fractions yield extreme ends; bulk realistic for shallow mining."
  key_feature: "Supercharged alkali shuttle stock + premium REE-Zr-P-Th slag byproduct"
  preferred_for: "Economic valorization of terminal slag (REE extraction, P chemicals)"
  process_deltas: "C0 extended for P; 3–10× K yield in C1; slag mass/grade dramatically higher"

