  process_deltas: |
    Extreme S-type analog. C0: major sulfur recovery. C2 Fe negligible. C4 **dominant** (120–220 kg Mg/t possible — immediate surplus). Very low liquidus energy. Strong pO₂ self-buffering. Perfect for Mg bootstrapping and high-temperature refractories.
    
