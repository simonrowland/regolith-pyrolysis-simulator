  SiO2: [48, 55]
  TiO2: [0.1, 0.2]
  Al2O3: [2, 4]
  FeO: [8, 18]         # H-chondrite 8-10%, LL-chondrite 14-18%
  MgO: [30, 38]        # 3-4x lunar; olivine-pyroxene mineralogy
  CaO: [1, 3]
  Na2O: [0.8, 1.2]     # 2-3x lunar
  K2O: [0.05, 0.15]
  Cr2O3: [0.3, 0.6]
  MnO: [0.2, 0.4]
