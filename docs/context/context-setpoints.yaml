# Oxygen Shuttle — Operational Setpoints & Yield Tables
# All values for 1-tonne mature low-Ti mare batch unless noted.
# Yields are practical ranges for typical mare (Fe ~93 kg/t, Ti ~18 kg/t, SiO2 ~460 kg/t).

campaign_0:
  name: "Vacuum Bakeoff & Volatile Recovery"
  T_range_C: [20, 950]  # or to 950, 1050
  atmosphere: "hard vacuum"
  pO2_bar: null  # deep vacuum
  products:
    volatiles: {mass_kg: [0.3, 1.0], note: "CHNOPS from solar-wind implantation"}
    native_Fe: {mass_kg: ~5, note: "nanophase Fe0, magnetic separation, zero energy"}
  duration_h: "included in ramp"
  notes: "Volatile release complete by ~700C; alkali onset >900C (thermally separated)"

campaign_0b_p_cleanup_standardized:
    activation_condition: "default_recommended_for_all_lunar OR P2O5_wt_pct > 0.04 OR persistent_P_IR_after_1050C_vacuum_hold"  # IR always rules; default mild for uniformity; P is variable in feedstocks
    beneficiation_preferred: true  # avoids absorbing O2 into metallic iron
    T_range_C: [1180, 1320]  # may need to cool afterwards, before hard-vacuum Campaign 1 to avoid SiO release
    atmosphere: "controlled O2 flow/sweep or mild bubbling"
    pO2_mbar: [3.0, 15.0]    # enough to suppress Na/K/SiO as metals train is sealed; only volatiles train open 
    duration_h: [0.5, 2.5]   # IR endpoint control
    O2_total_processed_kg_per_kg_P: [0.8, 2.5]
    O2_net_bound_kg_per_kg_P: [0.15, 0.60]
    products:
      phosphate_salts: {mass_kg: [0.2, 12], note: "85–98% captured as clean Ca/Mg/alkali phosphates in 350–650 °C trap"}
    notes: "Standardized mild oxidative P-cleanup for ALL lunar feedstocks (mare, highland, SPA, PKT, PSR, etc.). Enables higher-T complete P volatilization with Na/K suppression. IR endpoint for adaptive duration. Minimal overhead on low-P ores; full capability for KREEP. Synergizes with pO₂-managed philosophy and beneficiation."

