    p_open_Pa: {value: 800000.0, units: Pa, source_tag: assumption, assumption_class: relief_setpoint, range: [1000.0, 2000000.0], provenance: phase-2 diagnostic assumption}
    vessel_rating_Pa: {value: 1000000.0, units: Pa, source_tag: assumption, assumption_class: hardware_rating, range: [1000.0, 5000000.0], provenance: phase-2 diagnostic assumption}
