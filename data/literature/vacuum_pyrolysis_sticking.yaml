schema_version: 1
surface: vacuum_pyrolysis_wall_and_condenser_capture
usage:
  - simulator/condensation.py::_stage_alpha_s
  - simulator/condensation.py::_wall_alpha_s
  - simulator/condensation.py::_pressure_isolated_capture_budget_kg
  - engines/builtin/evaporation_flux.py::BuiltinEvaporationFluxProvider
status_values:
  - CITED
  - UNCERTIFIED
notes:
  - >
    Values marked CITED are literature-grounded Hertz-Knudsen-Langmuir
    accommodation coefficients adopted for the simulator alpha_s term.
    They are not direct measurements on every runtime liner surface; surface
    mismatch is carried in uncertainty_flag and must stay visible to operator
    fouling diagnostics.
  - >
    Values marked UNCERTIFIED are conservative fouling defaults, not literature
    constants. They remain status-bearing until direct or closer vacuum
    deposition data exists.

reactivity_class_values:
  - reactive
  - physisorbing

# C4b re-evaporation default (2026-06-29): SiO disproportionates on the
# wall to non-volatile products, so its deposit uses an effective product
# P_sat ~= 0. The listed metals keep reversible pure-species condensation.
# Fe/Mg physisorbing-with-reactive-tail is a known approximation recorded in
# docs/model-limitations.md; CrO2 remains reversible here to avoid widening
# this SiO-only chunk into the unresolved Cr oxide wall-product decision.
reactivity_class_by_species:
  SiO: reactive
  Na: physisorbing
  K: physisorbing
  Fe: physisorbing
  Mg: physisorbing
  Ca: physisorbing
  Mn: physisorbing
  Cr: physisorbing
  Al: physisorbing
  Ti: physisorbing
  CrO2: physisorbing

species:
  Fe:
    value: 0.02
    status: CITED
    source_class: cited_hkl_accommodation
    source: "REF-016 Costa & Jacobson 2015 KEMS Fo93Fa7 olivine, Fe+ alpha=0.011-0.020 at 1700-1800 K; high-side 0.02 adopted for conservative Fe capture."
    source_url: "https://ntrs.nasa.gov/citations/20150002321"
    temperature_range_K: [1700, 1800]
    envelope: [0.011, 0.020]
    uncertainty_flag: collector_surface_proxy_not_cold_wall_measurement
    output_status: sourced_with_surface_proxy
  SiO:
    value:
      form: arrhenius
      # alpha_s_SiO(T)=0.52*exp(-3685/T): Wetzel & Gail 2013 A&A 553 A92 DOI 10.1051/0004-6361/201220803 -- Arrhenius compilation of the SiO evaporation coeff (reaction-rate-limited; cross-checks Gunther 1958, Rocabois 1996, Ferguson&Nuth 2008/2012). Mid-range ~0.04 was the prior fixed pin.
      A: 0.52
      B: 3685.0
      valid_range_K: [1000, 1800]
      uncertainty_envelope: [0.003, 0.067]
      cite: "Wetzel&Gail 2013 DOI 10.1051/0004-6361/201220803"
      status: CITED
      prior_scalar:
        value: 0.04
        source: "REF-018 REF-016 Schaefer & Fegley 2004 Table 10 SiO2(liq), Hashimoto 1990, alpha_s=0.038-0.048; Costa & Jacobson 2015 olivine SiO+ 0.003-0.036 cross-check."
    cold_wall_condensation:
      value: 1.0
      status: CITED
      source_class: cited_high_supersaturation_condensation_limit
      source: "REF-040 Pound 1972 JPCRD 1:135 DOI 10.1063/1.3253096: high-supersaturation condensation coefficient for growth -> unity; evaporation alpha_e != condensation alpha_c off-equilibrium."
      source_url: "https://doi.org/10.1063/1.3253096"
      uncertainty_envelope: [0.016, 1.0]
      uncertainty_flag: "no_direct_cold_wall_SiO_measurement; rarely active - SiO does not evolve from melt below ~1000C, guard for cold-spot faults + initial-fouled-wall Story-2"
    status: CITED
    source_class: cited_hkl_accommodation
    source: "Wetzel & Gail 2013 A&A 553 A92 Arrhenius compilation alpha_s_SiO(T)=0.52*exp(-3685/T), reaction-rate-limited SiO evaporation coefficient. Cold-wall condensation below the valid_range_K floor uses the cited high-supersaturation condensation limit in cold_wall_condensation, not this evaporation Arrhenius."
    source_url: "https://doi.org/10.1051/0004-6361/201220803"
    temperature_range_K: [1000, 1800]
    envelope: [0.003, 0.067]
    uncertainty_flag: high_T_evaporation_alpha_for_hot_source_only_cold_wall_subfloor_uses_pound_1972_unity_condensation_gate
    output_status: sourced_with_surface_proxy
  CrO2:
    value: 0.90
    status: UNCERTIFIED
    source_class: uncertified_conservative_default
    source: "REF-014 notes no isolated CrO2 Hertz-Knudsen alpha adopted; retain high-capture default as a fouling-conservative placeholder."
    source_url: "https://doi.org/10.1016/j.gca.2005.08.014"
    temperature_range_K: not_applicable_uncertified
    envelope: [0.0, 1.0]
    uncertainty_flag: no_direct_sticking_coefficient
    output_status: status_bearing
  Mg:
    value: 0.20
    status: CITED
    source_class: cited_hkl_accommodation
    source: "REF-015 REF-018 Richter et al. 2002 Mg/SiO alpha~0.1-0.2 in vacuum at 1800 C; Schaefer & Fegley 2004 Table 10 Mg2SiO4(liq)/Hashimoto alpha_s=0.20-0.21."
    source_url: "https://doi.org/10.1016/S0016-7037(01)00782-7"
    temperature_range_K: [1873, 2373]
    envelope: [0.10, 0.21]
    uncertainty_flag: collector_surface_proxy_not_direct_mg_wall_measurement
    output_status: sourced_with_surface_proxy
  Na:
    value: 1.0
    status: CITED
    source_class: cited_hkl_accommodation
    source: "REF-013 Sossi et al. 2019 GCA 260:204 reports near-ideal Na alpha_e~1 in open-furnace ferrobasalt FCMAS melt; high-capture value adopted for alkali wall fouling."
    source_url: "https://doi.org/10.1016/j.gca.2019.06.021"
    temperature_range_K: [1700, 2273]
    envelope: [0.9, 1.0]
    uncertainty_flag: source_side_open_furnace_to_wall_capture_proxy
    output_status: sourced_with_surface_proxy
  K:
    value: 1.0
    status: UNCERTIFIED
    source_class: uncertified_na_analogy_default
    source: "REF-013 REF-019 only support a Na analogy for K near-unity alpha; no direct K wall/deposition alpha found, so high-capture default remains UNCERTIFIED."
    source_url: "https://doi.org/10.2138/rmg.2018.84.11"
    temperature_range_K: [1700, 2273]
    envelope: [0.8, 1.0]
    uncertainty_flag: no_direct_k_sticking_coefficient
    output_status: status_bearing
  Ca:
    value: 0.90
    status: UNCERTIFIED
    source_class: uncertified_proxy_default
    source: "Zhang et al. 2014 CaTiO3 melt Ca activity proxy exists for evaporation alpha, but no direct Ca wall/deposition alpha is cited; high-capture default remains UNCERTIFIED."
    source_url: "https://doi.org/10.1016/j.gca.2014.05.047"
    temperature_range_K: [2278, 2278]
    envelope: [0.0, 1.0]
    uncertainty_flag: no_direct_ca_sticking_coefficient
    output_status: status_bearing
  Mn:
    value: 0.85
    status: UNCERTIFIED
    source_class: uncertified_conservative_default
    source: "REF-013 REF-014 discuss Mn volatility but no isolated Hertz-Knudsen/sticking alpha was adopted; retain conservative high-capture default."
    source_url: "https://doi.org/10.1016/j.gca.2005.08.014"
    temperature_range_K: not_applicable_uncertified
    envelope: [0.0, 1.0]
    uncertainty_flag: no_direct_mn_sticking_coefficient
    output_status: status_bearing
  Cr:
    value: 0.90
    status: UNCERTIFIED
    source_class: uncertified_conservative_default
    source: "REF-014 discusses Cr volatility but no isolated Hertz-Knudsen/sticking alpha was adopted; retain conservative high-capture default."
    source_url: "https://doi.org/10.1016/j.gca.2005.08.014"
    temperature_range_K: not_applicable_uncertified
    envelope: [0.0, 1.0]
    uncertainty_flag: no_direct_cr_sticking_coefficient
    output_status: status_bearing

unknown_species_default:
  value: 0.80
  status: UNCERTIFIED
  source_class: uncertified_unknown_species_default
  source: "No species-specific wall/deposition sticking coefficient is configured; legacy high-capture fallback retained as status-bearing fouling default."
  source_url: null
  temperature_range_K: not_applicable_uncertified
  envelope: [0.0, 1.0]
  uncertainty_flag: no_species_specific_sticking_coefficient
  output_status: status_bearing

capture_budget_regularizer_floor:
  value: 0.01
  status: UNCERTIFIED
  source_class: numerical_regularizer_not_literature_constant
  source: "Legacy pressure-isolated capture-budget floor preventing zero normalized temperature driving-force in the provisional pre-pressure-coupling model; not a physical condensation/sticking constant."
  source_url: null
  temperature_range_K: not_applicable_numerical
  usage: simulator/condensation.py::_pressure_isolated_stage_efficiency
  uncertainty_flag: numerical_safeguard
  output_status: uncertainty_only
