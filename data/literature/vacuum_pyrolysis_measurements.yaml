schema_version: vacuum_pyrolysis_measurements.v1

measurements:
  robinot_2026_deposit_measurements:
    evidence_class: experiment-grade
    paper_citation:
      citation_id: robinot_2026
      label: "Robinot et al. 2026 vacuum pyrolysis experiment"
      bibliography_status: pending_full_lit_sweep
    doi: 10.1016/j.asr.2026.02.003
    extraction:
      source_location: mineru_markdown_methods_results_conclusion_and_fig4_caption
      digitized: false
      extractor: VPR-P5-schema
      extraction_date: 2026-06-12
      extraction_status: full_text_numeric_pass_no_fig4c_table
    figure_extraction:
      fig4c_per_location_mass_table:
        extraction_status: not_extractable_from_markdown
        checked_sources:
          - docs-private/research/2026-06-12-vpr-sources/robinot_2026_solar_pyrolysis.md
          - docs-private/research/2026-06-12-vpr-sources/acquisition-manifest.json
        source:
          citation_id: robinot_2026
          source_location: fig4_caption_and_results_section
          digest: "Fig. 4c is present only as a figure image/caption in the MinerU markdown; no tabulated per-location mass rows are extracted."
      numerically_extractable_from_markdown:
        - observable: sample_mass
          reported_value: 3.38
          reported_unit: g
          source_location: results_section
        - observable: chamber_pressure
          reported_value: 13.0
          reported_unit: mbar
          qualifier: approximate
          source_location: results_section
        - observable: argon_flow
          reported_value: 0.3
          reported_unit: NL_min
          source_location: results_section
        - observable: duration
          reported_value: 1.0
          reported_unit: h
          qualifier: approximate
          source_location: results_section
        - observable: peak_temperature
          reported_value: 1800
          reported_unit: degC
          qualifier: approximate_peak
          source_location: results_section
        - observable: oxygen_released
          reported_value: 35
          reported_unit: mg
          source_location: results_section
        - observable: oxygen_yield_by_mass
          reported_value: 1.05
          reported_unit: percent
          source_location: results_section
        - observable: comparable_run_yield
          reported_value: 1.17
          reported_unit: percent
          source_location: results_section
        - observable: specific_energy_yield
          reported_value: 31
          reported_unit: mg_O2_per_kWh
          source_location: results_section
        - observable: glassy_lump_mass
          reported_value: 1.82
          reported_unit: g
          source_location: results_section
        - observable: total_vaporized_or_captured_mass
          reported_value: 1.1
          reported_unit: g
          source_location: results_section
        - observable: unaccounted_mass
          reported_value: 0.27
          reported_unit: g
          source_location: results_section
        - observable: final_mass_recovery
          reported_value: 92
          reported_unit: percent
          source_location: results_section
    conditions_reported:
      pressure_mbar:
        reported_value: 13.0
        reported_unit: mbar
        qualifier: approximate
        source:
          citation_id: robinot_2026
          source_location: methods
          digest: "Argon carrier-gas sweep pressure is about 13 mbar."
      carrier_gas:
        species: Ar
        mole_fraction: 1.0
        source:
          citation_id: robinot_2026
          source_location: methods
          digest: "Carrier gas reported as argon."
      flow_boundary:
        reported_value: 0.3
        reported_unit: NL_min
        source:
          citation_id: robinot_2026
          source_location: methods
          digest: "Imposed argon flow reported as 0.3 NL/min."
      temperature_C:
        reported_value: 1800
        reported_unit: degC
        qualifier: approximate_peak
        source:
          citation_id: robinot_2026
          source_location: methods
          digest: "Robinot anchor reports a peak temperature near 1800 C."
      duration_h:
        reported_value: 1.0
        reported_unit: h
        qualifier: approximate
        source:
          citation_id: robinot_2026
          source_location: methods
          digest: "Robinot anchor reports about one hour of heating."
      sample_mass_g:
        reported_value: 3.38
        reported_unit: g
        source:
          citation_id: robinot_2026
          source_location: methods
          digest: "Robinot anchor reports a 3.38 g EAC-1 pellet."
    material_context:
      feedstock_kind: simulant
      feedstock_id: robinot_2026_feedstock_pending_lit_sweep
      simulant_vs_real_caveat: "Skeleton preserves the paper as simulant context; full composition extraction pending."
      glass_fraction_status: blocked_missing_glass_fraction
    quantitative_measurements:
      - observable: oxygen_released
        reported_value: 35
        reported_unit: mg
        normalized_value_kg: 0.000035
        source:
          citation_id: robinot_2026
          source_location: results_section
          digest: "Robinot anchor reports 35 mg O2."
      - observable: glassy_lump_mass
        reported_value: 1.82
        reported_unit: g
        normalized_value_kg: 0.00182
        source:
          citation_id: robinot_2026
          source_location: results_section
          digest: "Robinot anchor reports a 1.82 g glassy lump."
      - observable: total_vaporized_or_captured_mass
        reported_value: 1.1
        reported_unit: g
        normalized_value_kg: 0.0011
        source:
          citation_id: robinot_2026
          source_location: results_section
          digest: "Robinot Sec. 4.1 reports 1.1 g material vaporized and captured on holder, window, condenser, and filter; Fig. 4c per-location mass split is not tabulated in markdown."
      - observable: unaccounted_mass
        reported_value: 0.27
        reported_unit: g
        normalized_value_kg: 0.00027
        source:
          citation_id: robinot_2026
          source_location: results_section
          digest: "Robinot Sec. 4.1 reports 0.27 g unaccounted for after component cleaning."
      - observable: final_mass_recovery
        reported_value: 92
        reported_unit: percent
        source:
          citation_id: robinot_2026
          source_location: results_section
          digest: "Robinot Sec. 4.1 reports final mass recovery reached 92%."
    observed_locations:
      - id: holder
        surface_role: sample_holder
        extraction_status: qualitative_only
        measured_hot_vs_cooldown: post_run_cooldown
        reported_species_or_composition:
          Na:
            measurement_type: qualitative
            qualifier: present
            source:
              citation_id: robinot_2026
              source_location: results_section
              digest: "Robinot per-location sweep anchor reports Na on the holder."
          Fe:
            measurement_type: qualitative
            qualifier: present
            source:
              citation_id: robinot_2026
              source_location: results_section
              digest: "Robinot per-location sweep anchor reports Fe on the holder."
        morphology_notes:
          value: "Holder deposit/fouling tracked as a named location; full paper extraction pending."
          source:
            citation_id: robinot_2026
            source_location: apparatus_and_results
            digest: "Holder is retained as a separate surface role for per-location comparison."
        quantitative_measurements: []
      - id: window
        surface_role: transparent_wall
        extraction_status: qualitative_only
        measured_hot_vs_cooldown: post_run_cooldown
        reported_species_or_composition:
          Si:
            measurement_type: qualitative
            qualifier: present
            source:
              citation_id: robinot_2026
              source_location: results_section
              digest: "Robinot per-location sweep anchor reports Si on the window."
          Fe:
            measurement_type: qualitative
            qualifier: present
            source:
              citation_id: robinot_2026
              source_location: results_section
              digest: "Robinot per-location sweep anchor reports Fe on the window."
        morphology_notes:
          value: "Window fouling tracked qualitatively; no recovered mass entered in skeleton."
          source:
            citation_id: robinot_2026
            source_location: apparatus_and_results
            digest: "Window is retained as a separate surface role for qualitative residuals."
        quantitative_measurements: []
      - id: condenser
        surface_role: collector
        extraction_status: qualitative_only
        measured_hot_vs_cooldown: post_run_cooldown
        reported_species_or_composition:
          Si:
            measurement_type: qualitative
            qualifier: about_one_third
            source:
              citation_id: robinot_2026
              source_location: results_section
              digest: "Robinot per-location sweep anchor reports the condenser deposit is about one-third Si."
          Fe:
            measurement_type: qualitative
            qualifier: present
            source:
              citation_id: robinot_2026
              source_location: results_section
              digest: "Robinot per-location sweep anchor reports Fe in condenser deposit."
          Mg:
            measurement_type: qualitative
            qualifier: present
            source:
              citation_id: robinot_2026
              source_location: results_section
              digest: "Robinot per-location sweep anchor reports Mg in condenser deposit."
        morphology_notes:
          value: "Condenser/cold-trap location is named qualitatively; Fig. 4c mass split is figure-only in the markdown."
          source:
            citation_id: robinot_2026
            source_location: results
            digest: "Robinot reports condenser composition, but the 1.1 g captured mass is total across holder/window/condenser/filter."
        quantitative_measurements: []
      - id: filter
        surface_role: downstream_filter
        extraction_status: missing_mass
        measured_hot_vs_cooldown: post_run_cooldown
        reported_species_or_composition:
          Si:
            measurement_type: qualitative
            qualifier: mostly
            source:
              citation_id: robinot_2026
              source_location: results_section
              digest: "Robinot per-location sweep anchor reports the filter deposit is mostly Si."
          Na:
            measurement_type: qualitative
            qualifier: moderate
            source:
              citation_id: robinot_2026
              source_location: results_section
              digest: "Robinot per-location sweep anchor reports moderate Na on the filter."
          Fe:
            measurement_type: qualitative
            qualifier: moderate
            source:
              citation_id: robinot_2026
              source_location: results_section
              digest: "Robinot per-location sweep anchor reports moderate Fe on the filter."
          Mg:
            measurement_type: qualitative
            qualifier: trace
            source:
              citation_id: robinot_2026
              source_location: results_section
              digest: "Robinot per-location sweep anchor reports trace Mg on the filter."
          P:
            measurement_type: qualitative
            qualifier: trace
            source:
              citation_id: robinot_2026
              source_location: results_section
              digest: "Robinot per-location sweep anchor reports trace P on the filter."
          K:
            measurement_type: qualitative
            qualifier: trace
            source:
              citation_id: robinot_2026
              source_location: results_section
              digest: "Robinot per-location sweep anchor reports trace K on the filter."
        morphology_notes:
          value: "Filter retained as downstream surface; mass split pending."
          source:
            citation_id: robinot_2026
            source_location: apparatus_and_results
            digest: "Filter location is named so missing mass does not collapse to zero."
        quantitative_measurements: []
    conflicting_reported_values:
      - observable: total_vaporized_or_captured_mass
        resolution: unresolved_report_both
        values:
          - reported_value: 1.1
            reported_unit: g
            normalized_value_kg: 0.0011
            source:
              citation_id: robinot_2026
              source_location: results_section
              digest: "Robinot result passage reports 1.1 g."
          - reported_value: 1.3
            reported_unit: g
            normalized_value_kg: 0.0013
            source:
              citation_id: robinot_2026
              source_location: conclusion
              digest: "Robinot conclusion passage reports 1.3 g."
    named_missing_fields:
      - condenser_temperature_C
      - per_location_surface_temperature_C
      - view_factor_from_melt
      - full_feedstock_composition
      - per_location_mass_split
    measured_time_series: []
