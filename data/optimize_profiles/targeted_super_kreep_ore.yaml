profile_id: targeted-super-kreep-ore-objectives-v1
profile_schema_version: profile-schema-v1
feedstock: targeted_super_kreep_ore
description: Super-KREEP ore; heavy P cleanup and refractory-rump economics.
north_star_rationale: Super-KREEP value includes REE/P-rich refractory rump outside the current objective vocabulary, so use cleanup-heavy O2/metals/glass proxies.
objective_emphasis: Heavy Stage-0 P cleanup with balanced extraction proxies.
objectives:
  - {metric: oxygen_stored_kg, sense: maximize, units: kg, weight: 0.26, rationale: stored O2 after cleanup}
  - {metric: metals_total_kg, sense: maximize, units: kg, weight: 0.24, rationale: metal ingot proxy}
  - {metric: pure_silica_glass_kg, sense: maximize, units: kg, weight: 0.20, rationale: glass co-product}
  - {metric: metals_plus_o2_kg, sense: maximize, units: kg, weight: 0.16, rationale: combined extraction proxy}
  - {metric: energy_kWh, sense: minimize, units: kWh, weight: 0.08, rationale: long cleanup cost}
  - {metric: duration_h, sense: minimize, units: h, weight: 0.06, rationale: cleanup hold penalty}
constraints:
  gates: [delivered_stream_purity, coating, extraction_completeness, knudsen_viscous, furnace_temperature]
run: {campaign: C0, hours: 1, mass_kg: 1000.0, backend_name: stub}
fidelities:
  stub: {backend_name: stub, hours: 1}
  fast: {backend_name: stub, hours: 1}
  high: {backend_name: stub, hours: 1}
  auto: {backend_name: stub, hours: 1}
seed_recipes:
  - id: super-kreep-p-cleanup-seed
    source_campaigns: [C0b_p_cleanup, C2A_continuous]
    rationale: Use the strongest setpoints P cleanup window before Path A extraction.
    patch:
      campaigns:
        C0b_p_cleanup:
          temp_range_C: [1180, 1320]
          pO2_mbar: [3.0, 15.0]
          pO2_mbar_default: 9.0
          p_total_mbar_default: 9.0
          duration_h: [0.5, 2.5]
        C2A_continuous:
          temp_range_C: [1050, 1600]
          p_total_mbar_default: 10.0
          duration_h: [18, 28]
