# Condensation temperature reference (at ~1 mbar partial pressure)
# Used by condensation train model for species routing
condensation_reference_at_1mbar:
  Fe: 1250    # Stage 1
  SiO: 1050   # Stage 2 (as amorphous SiO2)
  Mg: 580     # Stage 3
  Na: 480     # Stage 3
  K: 420      # Stage 3
  Ca: 780     # would condense in Stage 3 if present
  Mn: 1000    # between Stage 1 and 2
  Cr: 1280    # Stage 1 (co-deposits with Fe)
  CrO2: 1250  # Dedicated Cr oxide stage; condenses as Cr2O3 + O2
  NaCl: 900   # Stage-0 foulant volatilization
  KCl: 880    # Stage-0 foulant volatilization (more volatile than NaCl)
