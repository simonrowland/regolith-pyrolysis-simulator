# Vapor-pressure reference data for effective P_eq calculations
# Antoine equation: log10(P_Pa) = A - B / (T_K + C)
# Runtime Antoine rows can be pure references, pseudo VapoRock refits, or
# reaction terms that are activity/pO2-scaled by the builtin Antoine/Ellingham
# provider into the effective P_eq consumed by evaporation. Only
# pure_component_antoine sidecars are pure-component references.
# Sources: legacy constants plus diagnostic refits against VapoRock over Kress91
# IW operating conditions. The builtin provider is authoritative; VapoRock is
# diagnostic-only when available.
#
# Dense fallback refit (2026-06-14, scripts/vaporock_pseudo_antoine_refit.py):
#   current VapoRock import; 7 feedstocks; 31 T points from 1350-1950 K;
#   Kress91/IW via vaporock.redox_buffer(T, "IW"); 217 samples/species.
#   Na max 0.379 dex (low); K max 0.691 dex (low);
#   Mg max 0.282 dex (moderate); SiO max 0.270 dex (moderate).
#   Fe 0.023 dex did not re-confirm against current VapoRock; dense-grid
#   refit lowers current residual to 0.418 dex but remains low confidence.
#
# VapoRock structural-species note (2026-05-20): K and O2 are
# structurally limited in the builtin surface. Antoine entries here are
# diagnostic curve-fit approximations and intentionally narrower
# than VapoRock's full JANAF gas speciation. O2 is not listed as an
# evaporating species because it has no single parent oxide; VapoRock may
# expose it through the read-only vaporock_full_speciation_Pa diagnostic.
#
# Evaporation alpha policy:
# - evaporation_alpha blocks carry HKL alpha value, citation, temperature
#   context, uncertainty envelope, and confidence tier.
# - tier 2 values are proxy or conditional proxies, not direct regolith-melt
#   measurements.
# - tier 3 species intentionally carry no alpha value. Runtime evaporation
#   refuses nonzero flux for those species unless the operator explicitly opts
#   into unmeasured alpha=1.0 fallback for prototyping.

