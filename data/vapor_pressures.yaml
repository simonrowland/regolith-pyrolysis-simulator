# Pure-component vapor pressures for Hertz-Knudsen calculations
# Antoine equation: log10(P_Pa) = A - B / (T_K + C)
# Sources: Alcock et al. (1984), Hultgren (1973), NIST-JANAF, Chase (1998)
#
# Cross-check targets (from context-thermo.md THERMO-13):
#   Na at 1600 C (1873 K): several bar (~2-5 bar → 2e5-5e5 Pa)
#   K  at 1600 C: > Na (more volatile)
#   Fe at 1500 C: ~0.01-0.1 mbar → 1-10 Pa
#   Mg at 1600 C: ~0.5 bar → 5e4 Pa
#   SiO at 1600 C (vacuum): 0.5-2 mbar → 50-200 Pa
#   Ca at 1484 C (bp): significant above 1500 C
#
# VapoRock structural-species note (2026-05-20): K and O2 should be
# treated as VapoRock-authoritative when VapoRock is available. Antoine
# entries here are fallback-only approximations and intentionally narrower
# than VapoRock's full JANAF gas speciation. O2 is not listed as an
# evaporating species because it has no single parent oxide; VapoRock may
# expose it through the read-only vaporock_full_speciation_Pa diagnostic.

metals:
  Na:
    formula: "Na"
    molar_mass_g_mol: 22.99
    electrons_per_atom: 1
    parent_oxide: "Na2O"
    evaporation_alpha:
      value: 1.0
      source: "Sossi et al. 2019 GCA 260:204, Na alpha_e~1 near-ideal evaporation from ferrobasalt FCMAS melt"
      T_band_K: [1700, 2273]
      envelope: [0.9, 1.0]
    antoine:
      # Liquid Na: Alcock et al. 1984
      A: 10.866
      B: 5688
      C: 0
    valid_range_K: [371, 2000]
    boiling_point_C: 883
    condensation_T_C_at_1mbar: 480
    notes: "Clausius-Clapeyron form (C=0). ΔH_vap ≈ 108.9 kJ/mol."

  K:
    formula: "K"
    molar_mass_g_mol: 39.10
    electrons_per_atom: 1
    parent_oxide: "K2O"
    evaporation_alpha:
      value: 1.0
      source: "Sossi et al. 2019 GCA 260:204 alkali near-ideal by analogy to Na; Sossi & Fegley 2018 liquids commonly near unity"
      T_band_K: [1700, 2273]
      envelope: [0.9, 1.0]
    antoine:
      A: 10.718
      B: 4961
      C: 0
    valid_range_K: [337, 1800]
    boiling_point_C: 759
    condensation_T_C_at_1mbar: 420
    notes: |
      More volatile than Na. ΔH_vap ≈ 95.0 kJ/mol.
      VapoRock-authoritative structural species when VapoRock is available;
      Antoine coefficients are fallback-only approximations, not a refit to
      the full VapoRock composition/fO2 response.

  Mg:
    formula: "Mg"
    molar_mass_g_mol: 24.31
    electrons_per_atom: 2
    parent_oxide: "MgO"
    evaporation_alpha:
      value: 0.20
      source: "Richter et al. 2002 Mg/SiO alpha~0.1-0.2 in vacuum at 1800 C; SF2004 Table 10 Mg2SiO4(l), Hashimoto 1990, alpha_s=0.20-0.21"
      T_band_K: [1873, 2373]
      envelope: [0.10, 0.21]
    antoine:
      A: 11.412
      B: 7813
      C: 0
    valid_range_K: [923, 2000]
    boiling_point_C: 1091
    condensation_T_C_at_1mbar: 580
    notes: "ΔH_vap ≈ 149.6 kJ/mol. p_vap ~0.5 bar at 1600°C."

  Fe:
    formula: "Fe"
    molar_mass_g_mol: 55.85
    electrons_per_atom: 2
    parent_oxide: "FeO"
    evaporation_alpha:
      value: 0.02
      source: "Costa & Jacobson 2015 KEMS Fo93Fa7 olivine, Fe+ alpha=0.011-0.020 at 1700-1800 K; Ebel 2005 calculated Fe/FeO alpha~0.2 noted as non-measured high-side proxy"
      T_band_K: [1873, 2373]
      envelope: [0.011, 0.020]
    antoine:
      A: 11.353
      B: 19710
      C: 0
    valid_range_K: [1811, 3135]
    boiling_point_C: 2862
    condensation_T_C_at_1mbar: 1250
    notes: "ΔH_vap ≈ 377.4 kJ/mol. Low vapor pressure at process T."

  Ca:
    formula: "Ca"
    molar_mass_g_mol: 40.08
    electrons_per_atom: 2
    parent_oxide: "CaO"
    antoine:
      A: 11.238
      B: 9520
      C: 0
    valid_range_K: [1115, 1757]
    boiling_point_C: 1484
    condensation_T_C_at_1mbar: 780
    notes: "ΔH_vap ≈ 182.3 kJ/mol. Significant above ~1500°C."

  Al:
    formula: "Al"
    molar_mass_g_mol: 26.98
    electrons_per_atom: 3
    parent_oxide: "Al2O3"
    antoine:
      A: 11.553
      B: 17340
      C: 0
    valid_range_K: [933, 2792]
    boiling_point_C: 2519
    condensation_T_C_at_1mbar: 1180
    notes: "ΔH_vap ≈ 332.0 kJ/mol. Negligible below 2500°C — not pyrolysable."

  Si:
    formula: "Si"
    molar_mass_g_mol: 28.09
    electrons_per_atom: 4
    parent_oxide: "SiO2"
    antoine:
      A: 11.619
      B: 21590
      C: 0
    valid_range_K: [1687, 3538]
    boiling_point_C: 3265
    condensation_T_C_at_1mbar: 1400
    notes: "ΔH_vap ≈ 413.5 kJ/mol. Negligible at process T. Extracted by MRE only."

  Ti:
    formula: "Ti"
    molar_mass_g_mol: 47.87
    electrons_per_atom: 4
    parent_oxide: "TiO2"
    antoine:
      A: 11.650
      B: 23200
      C: 0
    valid_range_K: [1941, 3560]
    boiling_point_C: 3287
    condensation_T_C_at_1mbar: 1500
    notes: "ΔH_vap ≈ 444.3 kJ/mol. Not pyrolysable — extracted by Na shuttle or MRE."

  Cr:
    formula: "Cr"
    molar_mass_g_mol: 52.00
    electrons_per_atom: 3
    parent_oxide: "Cr2O3"
    antoine:
      A: 11.420
      B: 20730
      C: 0
    valid_range_K: [2180, 2944]
    boiling_point_C: 2671
    condensation_T_C_at_1mbar: 1280
    notes: "ΔH_vap ≈ 396.9 kJ/mol. Trace amounts, extracted by Na shuttle."

  Mn:
    formula: "Mn"
    molar_mass_g_mol: 54.94
    electrons_per_atom: 2
    parent_oxide: "MnO"
    antoine:
      A: 11.183
      B: 14740
      C: 0
    valid_range_K: [1519, 2334]
    boiling_point_C: 2061
    condensation_T_C_at_1mbar: 1000
    notes: "ΔH_vap ≈ 282.3 kJ/mol. Moderate volatility, trace amounts."

oxide_vapors:
  SiO:
    formula: "SiO"
    molar_mass_g_mol: 44.08
    parent_oxide: "SiO2"
    stoich_oxide_per_vapor: 1.3629764065335754  # kg SiO₂ consumed per kg SiO evaporated
    stoich_O2_per_vapor: 0.3629764065335753    # kg O₂ freed per kg SiO evaporated
    evaporation_alpha:
      value: 0.04
      source: "SF2004 Table 10 SiO2(liq), Hashimoto 1990, alpha_s=0.038-0.048; Costa & Jacobson 2015 olivine SiO+ 0.003-0.036 cross-check"
      T_band_K: [1873, 2373]
      envelope: [0.003, 0.048]
    antoine:
      # SiO vapor from SiO₂ decomposition: SiO₂(melt) → SiO(g) + ½O₂(g)
      # Effective vapor pressure depends on a(SiO₂) and pO₂
      # These are pure-component SiO saturation values
      A: 11.817
      B: 18700
      C: 0
    valid_range_K: [1400, 2200]
    condensation_T_C: [900, 1200]
    condensation_product: "amorphous SiO₂ (disproportionation: 2SiO → Si + SiO₂)"
    condensation_products_mol_per_mol_vapor:
      Si: 0.5
      SiO2: 0.5
    suppression_equation: "p(SiO) = K(T) × a(SiO₂) / √pO₂"
    suppression_factor_at_1mbar_O2: ">300×"
    notes: |
      THE problem species. At hard vacuum (pO₂ ~1e-9 bar), SiO dominates
      offgas above ~1400°C. At pO₂ = 1 mbar, suppressed >300×.
      Condenses as adhesive, corrosive amorphous silica below ~1200°C.
      See [THERMO-1] in context-thermo.md.

  CrO2:
    formula: "CrO2"
    molar_mass_g_mol: 83.9961
    parent_oxide: "Cr2O3"
    stoich_oxide_per_vapor: 0.9047574827878914  # kg Cr2O3 consumed per kg CrO2 evaporated
    stoich_O2_per_vapor: -0.09524251721210866  # kg O2 consumed per kg CrO2 evaporated
    antoine:
      # Fallback fit to VapoRock JANAF0 CrO2(g) output over 1500-2200 K:
      # log10(P_Pa) = A - B/T_K + 0.5 log10(a_Cr2O3) + 0.25 log10(pO2_bar)
      A: 12.9245114
      B: 23732.9593
      C: 0
    oxide_activity_exponent: 0.5
    pO2_exponent: 0.25
    pO2_reference_bar: 1.0
    valid_range_K: [1500, 2200]
    vaporock_janaf0_shomate:
      source_file: "../VapoRock/src/vaporock/data/JANAF0-vapor-data.csv"
      source_row: 34
      species_name: "CrO2(g)"
      valid_range_K: [1100, 6000]
      A: 57.85928
      B: 0.190282
      C: -0.038347
      D: 0.002643
      E: -2.578022
      F: -99.71476
      G: 328.5921
      H: -75.312
      source: JANAF coefficients shipped by VapoRock.
    condensation_T_C: [1100, 1300]
    condensation_setpoint_C: 1250
    condensation_product: "Cr2O3(s) harvest with O2 coproduct: CrO2 -> 0.5 Cr2O3 + 0.25 O2"
    condensation_products_mol_per_mol_vapor:
      Cr2O3: 0.5
      O2: 0.25
    condensation_product_accounts:
      Cr2O3: "terminal.chromium_condensed_oxide_stored"
      O2: "process.overhead_gas"
    notes: |
      Option A engineering path: CrO2(g) is collected as stable Cr2O3 in a
      dedicated high-temperature Cr oxide stage between Fe and SiO. Sossi-Moon
      fixture records CrO2(g) as significant above 1500 K; VapoRock JANAF0
      supplies CrO2(g) thermochemistry over 1100-6000 K.

# Condensation temperature reference (at ~1 mbar partial pressure)
# Used by condensation train model for species routing
condensation_reference_at_1mbar:
  Fe: 1250    # Stage 1
  SiO: 1050   # Stage 2 (as amorphous SiO₂)
  Mg: 580     # Stage 3
  Na: 480     # Stage 3
  K: 420      # Stage 3
  Ca: 780     # would condense in Stage 3 if present
  Mn: 1000    # between Stage 1 and 2
  Cr: 1280    # Stage 1 (co-deposits with Fe)
  CrO2: 1250  # Dedicated Cr oxide stage; condenses as Cr2O3 + O2
