    backsolve:
      feedstock_grid: "dense seven-feedstock lunar/mars grid"
      fO2_convention: "Kress91 IW"
      activity_formula: "a_SiO2 * sqrt(1e-9 / pO2_bar) for pO2_bar > 1e-9; hard-vacuum reference otherwise"
      target: "VapoRock SiO(g) partial pressure on the dense grid"
      residual_dex: 0.270
      old_metadata_residual_dex: 0.113
