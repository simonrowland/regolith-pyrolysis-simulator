# Pure-component vapor pressures for Hertz-Knudsen calculations
# Antoine equation: log10(P_Pa) = A - B / (T_K + C)
# Sources: legacy pure-component constants plus 2026-05-20 fallback refits
# to VapoRock over Kress91 IW operating conditions. The builtin provider is
# a fallback; VapoRock remains authoritative when available.
#
# Fitted fallback residuals vs VapoRock on the 1400-1900 K Kress91 IW grid:
#   SiO max 0.113 dex; Na max 0.121 dex; Mg max 0.203 dex.
#   Fe max 0.023 dex on the basalt single-reference grid.
#   K is structural and single-reference fallback-only, max residual 1.469 dex.
#
# VapoRock structural-species note (2026-05-20): K and O2 should be
# treated as VapoRock-authoritative when VapoRock is available. Antoine
# entries here are fallback-only approximations and intentionally narrower
# than VapoRock's full JANAF gas speciation. O2 is not listed as an
# evaporating species because it has no single parent oxide; VapoRock may
# expose it through the read-only vaporock_full_speciation_Pa diagnostic.
#
# Evaporation alpha policy:
# - evaporation_alpha blocks carry HKL alpha value, citation, temperature
#   context, uncertainty envelope, and confidence tier.
# - tier 2 values are proxy or conditional proxies, not direct regolith-melt
#   measurements.
# - tier 3 species intentionally carry no alpha value. Runtime evaporation
#   refuses nonzero flux for those species unless the operator explicitly opts
#   into unmeasured alpha=1.0 fallback for prototyping.

metals:
  Na:
    formula: "Na"
    molar_mass_g_mol: 22.98976928
    electrons_per_atom: 1
    parent_oxide: "Na2O"
    fit_target: "pseudo_psat_backsolved_from_vaporock"
    backsolve:
      feedstock_grid: "seven-feedstock lunar/mars grid"
      fO2_convention: "Kress91 IW"
      activity_formula: "(K_decomp * a_oxide**n_ox / pO2_bar)**(1/n_M), clamped at 1"
      target: "VapoRock partial pressure on the grid"
      residual_dex: 0.121
    pure_component_antoine:
      source: "NIST TN 2273 normal boiling point; CRC/NIST dH_vap~97.42 kJ/mol; Clausius-Clapeyron anchored at 1 atm"
      A: 9.407048
      B: 5088.599272
      C: 0
    evaporation_alpha:
      value: 1.0
      source: "Sossi et al. 2019 GCA 260:204, Na alpha_e~1 near-ideal evaporation from ferrobasalt FCMAS melt"
      T_band_K: [1700, 2273]
      envelope: [0.9, 1.0]
      tier: 2
      # V1e-followon (2026-05-27, post-0.5.0): Na/K alpha reconciliation.
      # Sossi 2019 (open furnace, mass-loss method) reports alpha_e ~ 1
      # (near-ideal). Fedkin et al. 2006 LPSC (KEMS / Knudsen effusion
      # mass spec, sealed equilibrium chamber) reports alpha_e ~ 0.13 for
      # Na -- about 8x lower. The disagreement is methodological:
      # KEMS measures evaporation flux against an equilibrium reservoir
      # (HKL denominator dominated by re-condensation); open-furnace
      # measures net loss to a swept volume (no back-flux). The
      # simulator recipes run at ~mbar overhead with continuous sweep
      # gas, which is closer to the open-furnace regime than the KEMS
      # chamber. Pin to Sossi 2019. Operators wanting Fedkin's
      # conservative value can override via setpoints (see
      # data/setpoints.yaml chemistry_kernel block).
      competing_sources:
        - source: "Fedkin et al. 2006 LPSC 37:#2249, KEMS sealed-chamber"
          value: 0.13
          regime: "sealed equilibrium chamber; not representative of mbar-sweep pyrolysis"
    antoine:
      # Fallback fit to VapoRock, 1400-1900 K, Kress91 IW, seven-feedstock grid.
      A: 8.477035
      B: 11265.231371
      C: 0
    valid_range_K: [1400, 1900]
    boiling_point_C: 883
    condensation_T_C_at_1mbar: 480
    notes: "Builtin fallback effective curve; max residual 0.121 dex vs VapoRock on the Kress91 IW fit grid."

  K:
