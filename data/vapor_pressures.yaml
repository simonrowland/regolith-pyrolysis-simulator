oxide_vapors:
  SiO:
    formula: "SiO"
    molar_mass_g_mol: 44.084
    parent_oxide: "SiO2"
    fit_target: "pseudo_psat_backsolved_from_vaporock"
    backsolve:
      feedstock_grid: "seven-feedstock lunar/mars grid"
      fO2_convention: "Kress91 IW"
      activity_formula: "a_SiO2 * sqrt(1e-9 / pO2_bar) for pO2_bar > 1e-9; hard-vacuum reference otherwise"
      target: "VapoRock partial pressure on the grid"
      residual_dex: 0.113
    stoich_oxide_per_vapor: 1.362920787587333  # kg SiO2 consumed per kg SiO evaporated
    stoich_O2_per_vapor: 0.36292078758733326   # kg O2 freed per kg SiO evaporated
    evaporation_alpha:
      value: 0.04
      source: "SF2004 Table 10 SiO2(liq), Hashimoto 1990, alpha_s=0.038-0.048; Costa & Jacobson 2015 olivine SiO+ 0.003-0.036 cross-check"
      T_band_K: [1873, 2373]
      envelope: [0.003, 0.048]
      tier: 2
    antoine:
      # SiO vapor from SiO2 decomposition: SiO2(melt) -> SiO(g) + 1/2O2(g)
      # Effective vapor pressure depends on a(SiO2) and pO2
      # Fallback fit to VapoRock, 1400-1900 K, Kress91 IW, seven-feedstock grid.
      A: 22.117682
      B: 40638.351545
      C: 0
    valid_range_K: [1400, 2200]
    condensation_T_C: [900, 1200]
    condensation_product: "amorphous SiO2 (disproportionation: 2SiO -> Si + SiO2)"
    condensation_products_mol_per_mol_vapor:
      Si: 0.5
      SiO2: 0.5
    suppression_equation: "p(SiO) = K(T) * a(SiO2) / sqrt pO2"
    suppression_factor_at_1mbar_O2: ">300*"
    notes: |
      THE problem species. At hard vacuum (pO2 ~1e-9 bar), SiO dominates
      offgas above ~1400°C. At pO2 = 1 mbar, suppressed >300*.
      Condenses as adhesive, corrosive amorphous silica below ~1200°C.
      See [THERMO-1] in context-thermo.md.
      Builtin fallback max residual 0.113 dex vs VapoRock on the Kress91 IW
      fit grid; extrapolation keeps prior runtime coverage to 2200 K.

  CrO2:
    formula: "CrO2"
    molar_mass_g_mol: 83.9941
    parent_oxide: "Cr2O3"
    fit_target: "standard_reaction_term"
    reaction:
      formula: "0.5 Cr2O3(s/l) + 0.25 O2(g) -> CrO2(g)"
      exponent_oxide: 0.5
      exponent_pO2: 0.25
      basis: "VapoRock fallback fit to JANAF0 CrO2(g) output"
    stoich_oxide_per_vapor: 0.904761167748687  # kg Cr2O3 consumed per kg CrO2 evaporated
    stoich_O2_per_vapor: -0.0952388322513129  # kg O2 consumed per kg CrO2 evaporated
    evaporation_alpha_policy:
      tier: 3
      policy: "fail_loud_missing_alpha"
      source: "Fedkin et al. 2006 plus chromia-boiler literature; no isolated CrO2 HK alpha adopted"
    antoine:
      # Fallback fit to VapoRock JANAF0 CrO2(g) output over 1500-2200 K:
      # log10(P_Pa) = A - B/T_K + 0.5 log10(a_Cr2O3) + 0.25 log10(pO2_bar)
      A: 12.9245114
      B: 23732.9593
      C: 0
    oxide_activity_exponent: 0.5
    pO2_exponent: 0.25
    pO2_reference_bar: 1.0
    valid_range_K: [1500, 2200]
    vaporock_janaf0_shomate:
      source_file: "../VapoRock/src/vaporock/data/JANAF0-vapor-data.csv"
      source_row: 34
      species_name: "CrO2(g)"
      valid_range_K: [1100, 6000]
      A: 57.85928
      B: 0.190282
      C: -0.038347
      D: 0.002643
      E: -2.578022
      F: -99.71476
      G: 328.5921
      H: -75.312
      source: JANAF coefficients shipped by VapoRock.
    condensation_T_C: [1100, 1300]
    condensation_setpoint_C: 1250
    condensation_product: "Cr2O3(s) harvest with O2 coproduct: CrO2 -> 0.5 Cr2O3 + 0.25 O2"
    condensation_products_mol_per_mol_vapor:
      Cr2O3: 0.5
      O2: 0.25
    condensation_product_accounts:
      Cr2O3: "terminal.chromium_condensed_oxide_stored"
      O2: "process.overhead_gas"
    notes: |
      Option A engineering path: CrO2(g) is collected as stable Cr2O3 in a
      dedicated high-temperature Cr oxide stage between Fe and SiO. Sossi-Moon
      fixture records CrO2(g) as significant above 1500 K; VapoRock JANAF0
      supplies CrO2(g) thermochemistry over 1100-6000 K.

