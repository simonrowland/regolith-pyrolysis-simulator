        feedstocks: ["lunar_mare_low_ti", "lunar_mare_high_ti", "lunar_highland", "lunar_pkt_kreep_average", "lunar_spa_kreep_influenced", "mars_basalt", "mars_sulfate_rich"]
        n_samples: 217
        composition_basis: "VapoRock-supported silicate oxides; unsupported Stage 0 foulants removed, remaining oxides renormalized to 100 wt%"
        fit_objective: "bounded minimax absolute log10 residual; |C| <= 1000 K"
    stoich_oxide_per_vapor: 1.362920787587333  # kg SiO2 consumed per kg SiO evaporated
    stoich_O2_per_vapor: 0.36292078758733326   # kg O2 freed per kg SiO evaporated
    evaporation_alpha:
      value:
        form: arrhenius
        # alpha_s_SiO(T)=0.52*exp(-3685/T): Wetzel & Gail 2013 A&A 553 A92 DOI 10.1051/0004-6361/201220803 -- Arrhenius compilation of the SiO evaporation coeff (reaction-rate-limited; cross-checks Gunther 1958, Rocabois 1996, Ferguson&Nuth 2008/2012). Mid-range ~0.04 was the prior fixed pin.
        A: 0.52
        B: 3685.0
        valid_range_K: [1000, 1800]
        uncertainty_envelope: [0.003, 0.067]
        cite: "Wetzel&Gail 2013 DOI 10.1051/0004-6361/201220803"
        status: CITED
        prior_scalar:
          value: 0.04
          source: "REF-018 REF-016 SF2004 Table 10 SiO2(liq), Hashimoto 1990, alpha_s=0.038-0.048; Costa & Jacobson 2015 olivine SiO+ 0.003-0.036 cross-check."
      source: "Wetzel & Gail 2013 A&A 553 A92 Arrhenius compilation alpha_s_SiO(T)=0.52*exp(-3685/T), reaction-rate-limited SiO evaporation coefficient. HOT evaporation interface uses alpha_s(T) at source T; microscopic reversibility applies there. COLD-WALL condensation below valid_range_K floor uses the grounded Pound 1972 JPCRD 1:135 DOI 10.1063/1.3253096 unity condensation coefficient; alpha_e != alpha_c off-equilibrium at high supersaturation."
      T_band_K: [1000, 1800]
      envelope: [0.003, 0.067]
      tier: 2
    antoine:
      # SiO vapor from SiO2 decomposition: SiO2(melt) -> SiO(g) + 1/2O2(g)
      # Effective vapor pressure depends on a(SiO2) and pO2
      # Bounded-minimax fallback fit to current VapoRock dense IW grid.
      A: 28.062027
      B: 79705.252727
      C: 1000.0
    valid_range_K: [1400, 2200]
    condensation_T_C: [900, 1200]
    condensation_product: "amorphous SiO2 (disproportionation: 2SiO -> Si + SiO2)"
    condensation_products_mol_per_mol_vapor:
      Si: 0.5
      SiO2: 0.5
    suppression_equation: "p(SiO) = K(T) * a(SiO2) / sqrt pO2"
    suppression_factor_at_1mbar_O2: ">300*"
    notes: |
      THE problem species. At hard vacuum (pO2 ~1e-9 bar), SiO dominates
      offgas above ~1400°C. At pO2 = 1 mbar, suppressed >300*.
      Condenses as adhesive, corrosive amorphous silica below ~1200°C.
      See [THERMO-1] in context-thermo.md.
      Builtin fallback max residual 0.270 dex vs current VapoRock on the
      dense Kress91 IW fit grid; extrapolation keeps prior runtime coverage
      to 2200 K. Moderate confidence; VapoRock is diagnostic-only when
