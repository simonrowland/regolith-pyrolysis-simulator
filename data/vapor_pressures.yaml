      fO2_convention: "Kress91 IW"
      activity_formula: "(K_decomp * a_oxide**n_ox / pO2_bar)**(1/n_M), clamped at 1"
      target: "VapoRock Na(g) partial pressure on the dense grid"
      residual_dex: 0.379
      old_metadata_residual_dex: 0.121
      old_dense_residual_dex: 1.413
      provenance:
        generated_by: "scripts/vaporock_pseudo_antoine_refit.py"
        temperature_K: {min: 1350, max: 1950, step: 20, count: 31}
        feedstocks: ["lunar_mare_low_ti", "lunar_mare_high_ti", "lunar_highland", "lunar_pkt_kreep_average", "lunar_spa_kreep_influenced", "mars_basalt", "mars_sulfate_rich"]
        n_samples: 217
        composition_basis: "VapoRock-supported silicate oxides; unsupported Stage 0 foulants removed, remaining oxides renormalized to 100 wt%"
        fit_objective: "bounded minimax absolute log10 residual; |C| <= 1000 K"
    pure_component_antoine:
      source: "REF-002 NIST Chemistry WebBook SRD 69 Rodebush and Walters 1930 sodium (C7440235); log10(P/bar)=2.46077-1873.728/(T-416.372), converted to Pa by A+5"
      source_certification: "source_equation_fit"
      A: 7.460770
      B: 1873.728
      C: -416.372
      valid_range_K: [924, 1118]
    evaporation_alpha:
      value: 1.0
      source: "OWNER-RATIFY source_class=open_furnace_apparent_not_intrinsic: REF-013 Sossi et al. 2019 GCA 260:204, Na alpha_e~1 near-ideal open-furnace evaporation from ferrobasalt FCMAS melt; retained pending owner ratification against competing Fedkin intrinsic 0.13"
      T_band_K: [1700, 2273]
      envelope: [0.9, 1.0]
      tier: 2
      # V1e-followon (2026-05-27, post-0.5.0): Na/K alpha reconciliation.
      # Sossi 2019 (open furnace, mass-loss method) reports alpha_e ~ 1
      # (near-ideal). Fedkin et al. 2006 LPSC (KEMS / Knudsen effusion
      # mass spec, sealed equilibrium chamber) reports alpha_e ~ 0.13 for
      # Na -- about 8x lower. The disagreement is methodological:
      # KEMS measures evaporation flux against an equilibrium reservoir
      # (HKL denominator dominated by re-condensation); open-furnace
      # measures net loss to a swept volume (no back-flux). The
      # simulator recipes run at ~mbar overhead with continuous sweep
      # gas, which is closer to the open-furnace regime than the KEMS
      # chamber. Pin to Sossi 2019. Operators wanting Fedkin's
      # conservative value can override via setpoints (see
      # data/setpoints.yaml chemistry_kernel block).
      competing_sources:
        - source: "REF-014 Fedkin et al. 2006 LPSC 37:#2249, KEMS sealed-chamber"
          value: 0.13
          regime: "sealed equilibrium chamber; not representative of mbar-sweep pyrolysis"
    antoine:
      # Bounded-minimax fallback fit to current VapoRock dense IW grid.
      A: 5.185860
      B: 11127.434869
      C: 1000.0
    valid_range_K: [1400, 1900]
    boiling_point_C: 883
    condensation_T_C_at_1mbar: 480
    notes: "Builtin authoritative effective curve; max residual 0.379 dex vs current VapoRock on the dense Kress91 IW grid. Low confidence; VapoRock is diagnostic-only when available."

