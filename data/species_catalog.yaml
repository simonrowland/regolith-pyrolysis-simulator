schema_version: 1
description: >
  Formula catalog for molar atoms-in/atoms-out accounting. Feedstock keys stay
  ergonomic: oxide wt% keys remain oxide-equivalent, elemental wt% keys remain
  elemental-equivalent, and mixture keys use explicit estimated group formulas.

