  # Estimated groups. Atoms describe accounting surrogates, not real molecules.
  - id: REE_oxides
    atoms:
      La: 2
      O: 3
    basis: estimated_oxide_equivalent
    category: estimated_group
    estimated: true
    uncertainty: high
    aliases:
      - rare_earth_oxides
    source: Representative trivalent light rare-earth sesquioxide, La2O3; actual REE distribution unavailable in current feedstock keys.
  - id: organics
    atoms:
      C: 1
      H: 2
    basis: estimated_group_formula
    category: organic_group
    estimated: true
    uncertainty: high
    source: Hydrocarbon-equivalent CH2 surrogate; heteroatom content not specified by current feedstock keys.
  - id: hydrocarbons
    atoms:
      C: 1
      H: 2
    basis: estimated_group_formula
    category: organic_group
    estimated: true
    uncertainty: medium
    aliases:
      - hydrocarbons_kg_per_tonne
    source: Average hydrocarbon/alkane-chain CH2 accounting surrogate.
  - id: organics_hydrocarbons
    atoms:
      C: 1
      H: 2
    basis: estimated_group_formula
    category: organic_group
    estimated: true
    uncertainty: high
    aliases:
      - organics_hydrocarbons_kg_per_tonne
    source: Collapsed organics plus hydrocarbons key mapped to CH2 accounting surrogate.
  - id: carbonate_salts
    atoms:
      Mg: 1
      Ca: 1
      Na: 2
      C: 3
      O: 9
    basis: estimated_group_formula
    category: salt_group
    estimated: true
    uncertainty: high
    aliases:
