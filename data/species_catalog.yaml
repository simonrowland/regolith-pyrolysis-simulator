    components:
      - id: MgCO3
        moles: 1
      - id: CaCO3
        moles: 1
      - id: Na2CO3
        moles: 1
    source: Equal-molar MgCO3/CaCO3/Na2CO3 surrogate from feedstock note naming Mg/Ca/Na carbonates; actual salt distribution unavailable.
  - id: NaCl_KCl_salts
    atoms:
