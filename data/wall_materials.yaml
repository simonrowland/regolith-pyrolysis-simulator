    composition_bounds: 'Na2O-FeO-SiO2 ternary slice only; full Na-K-Fe-Ca-Al-Mg-O mix remains needs_experiment.'
    oxygen_activity_window: 'Fe valence and pO2 dependent; not numerically filled'
    total_pressure_window: null
    engine_redox_thresholds:
      Na_FeO_crossover_C: 1173.4
      K_FeO_crossover_C: 832.0
      basis: 'tests/test_physics_ground_truth.py NIST-JANAF high-T oxide refit; above each crossover the corresponding alkali-to-FeO reduction is thermodynamically refused.'
    evidence_tier: calphad_bibliographic
    source_ids: ['R4-CD5', 'R4-CD6', 'JANAF-NaK-FeO-crossovers']
    needs_experiment: true
