reactive_exchange_templates:
  uncharacterized_reducing_vacuum: &rx_uncharacterized_reducing_vacuum
    regime: reducing_vacuum
    product_phase: uncharacterized
    favorability: uncharacterized
    sign: uncharacterized
    redox_path: uncharacterized
    oxygen_activity_window: null
    total_pressure_window: null
    net_liner_delta: uncharacterized
    reaction_site: unknown
    wall_property_effect:
      structural: uncharacterized
      service_temp_shift: uncharacterized
      magnitude: qualitative
      basis: 'No source-backed reactive-exchange product or regime window for this material/species cell in hot low-pO2, low-total-pressure service.'
    evidence_tier: uncharacterized
    source_ids: []
    needs_experiment: true
    needs_calphad: true
  sio_reducing_vacuum_volatile: &rx_sio_reducing_vacuum_volatile
    regime: reducing_vacuum
    product_phase: 'SiO(g) / SiOx disproportionation products, not stable mullite'
    favorability: source_supported
    sign: volatile_or_revolatilizing
    redox_path: 'Hot low-pO2/low-total-pressure branch keeps SiO volatile or drives SiOx disproportionation; stable SiO2-to-mullite incorporation is not the default.'
    oxygen_activity_window: 'low-pO2 reducing vacuum; numeric pO2 window unfilled'
    total_pressure_window: '<=1e-2 Pa counterexample at 1673 K for mullite decomposition'
    net_liner_delta: uncharacterized
    reaction_site: surface
    wall_property_effect:
      structural: uncharacterized
      service_temp_shift: uncharacterized
      magnitude: qualitative
      basis: 'Schick gates silica vaporization by oxygen potential; Kitaoka gives the vacuum counterexample for mullite decomposition to Al2O3 + SiO(g).'
    evidence_tier: direct_observation
    source_ids: ['R4-RX-Schick-1960', 'R4-RX-Kitaoka-2019']
    needs_experiment: true
    needs_calphad: false
  alumina_sio_oxidizing_mullite: &rx_alumina_sio_oxidizing_mullite
    regime: oxidizing
    product_phase: 'mullite (3Al2O3.2SiO2)'
    favorability: phase_diagram_supported
    sign: consolidating
    redox_path: 'SiO/SiOx must first oxidize to SiO2; SiO2 then reacts with Al2O3 into the mullite field.'
    oxygen_activity_window: 'oxidizing or locally O-buffered wall; numeric pO2 window unfilled'
    total_pressure_window: null
    net_liner_delta: thickening
    reaction_site: surface
    wall_property_effect:
      structural: consolidating_if_adherent
      service_temp_shift: uncharacterized
      magnitude: qualitative
      basis: 'Only the oxidized silica branch is source-backed for mullite formation; adhesion and reaction-layer continuity still require testing.'
    evidence_tier: phase_diagram
    source_ids: ['R4-RX-Schick-1960', 'R4-RX-Kitaoka-2019', 'ACerS-NIST-SRD31']
    needs_experiment: true
    needs_calphad: false
  alumina_alkali_beta_spall: &rx_alumina_alkali_beta_spall
    regime: reducing_vacuum
    product_phase: 'beta-alumina / alkali aluminate'
    favorability: direct_observation
    sign: expansive_spalling
    redox_path: 'Na/Na2O ingress into alumina or aluminosilicate refractory; K analogue remains less characterized.'
    oxygen_activity_window: null
    total_pressure_window: null
    net_liner_delta: spall
    reaction_site: grain_boundary
    wall_property_effect:
      structural: spall
      service_temp_shift: lower
      magnitude: qualitative
      basis: 'Kennedy and Lee report alkali-aluminate/beta-alumina products, rapid alkali diffusion, volume expansion, poor thermal-shock resistance, and refractory failure; owner prompt carries the 20-25 pct expansion hazard.'
    evidence_tier: direct_observation
    source_ids: ['R4-RX-Kennedy-1981', 'R4-RX-Lee-1988']
    needs_experiment: true
    needs_calphad: true
  alumina_feo_hercynite: &rx_alumina_feo_hercynite
    regime: reducing_vacuum
    product_phase: 'hercynite (FeAl2O4)'
    favorability: direct_observation
    sign: neutral
    redox_path: 'FeO-bearing slag reacts with Al2O3 to grow a FeAl2O4 reaction layer; activity/window and rate remain FeO-activity dependent.'
    oxygen_activity_window: 'FeO-bearing low-oxygen slag branch; numeric pO2 window unfilled'
    total_pressure_window: null
    net_liner_delta: thinning
    reaction_site: surface
    wall_property_effect:
      structural: reaction_layer
      service_temp_shift: lower
      magnitude: qualitative
      basis: 'Sarkar/Sohn show diffusion-controlled hercynite reaction-layer growth through FeAl2O4 in FeO-bearing slags.'
    evidence_tier: direct_observation
    source_ids: ['R4-RX-Sarkar-Sohn-2019']
    needs_experiment: true
    needs_calphad: true
  mullite_sio_oxidizing: &rx_mullite_sio_oxidizing
    regime: oxidizing
    product_phase: mullite
    favorability: source_supported
    sign: neutral
    redox_path: 'Oxidizing or O-buffered surface keeps silica activity compatible with mullite rather than SiO volatilization.'
    oxygen_activity_window: 'oxidizing or locally O-buffered wall; numeric pO2 window unfilled'
    total_pressure_window: null
    net_liner_delta: thickening
    reaction_site: surface
    wall_property_effect:
      structural: consolidating_if_adherent
      service_temp_shift: uncharacterized
      magnitude: qualitative
      basis: 'Kitaoka treats mullite stability under oxygen-potential gradients; no hot regolith condensate adhesion constant is filled.'
    evidence_tier: direct_observation
    source_ids: ['R4-RX-Kitaoka-2019']
    needs_experiment: true
    needs_calphad: false
  mullite_sio_reducing_decomposition: &rx_mullite_sio_reducing_decomposition
    regime: reducing_vacuum
    product_phase: 'Al2O3 + SiO(g)'
    favorability: direct_observation
    sign: volatile_or_revolatilizing
    redox_path: 'Mullite decomposition is thermodynamically favored at <=1e-2 Pa total pressure and 1673 K; do not treat SiO-to-mullite as the default branch.'
    oxygen_activity_window: 'reducing vacuum / oxygen-potential gradient'
    total_pressure_window: '<=1e-2 Pa at 1673 K'
    net_liner_delta: thinning
    reaction_site: surface
    wall_property_effect:
      structural: surface_recession
      service_temp_shift: lower
      magnitude: qualitative
      basis: 'Kitaoka supplies the low-pressure mullite decomposition counterexample; Schick supplies the silica-to-SiO(g) vaporization gate.'
    evidence_tier: direct_observation
    source_ids: ['R4-RX-Kitaoka-2019', 'R4-RX-Schick-1960']
    needs_experiment: true
    needs_calphad: false
  magnesia_sio_forsterite_buffered: &rx_magnesia_sio_forsterite_buffered
    regime: buffered
    product_phase: 'forsterite (Mg2SiO4) / Mg-silicate reaction layer'
    favorability: phase_diagram_supported
    sign: consolidating
    redox_path: 'SiO must enter an oxidized SiO2/silica-activity branch before MgO + SiO2 can form forsterite.'
    oxygen_activity_window: 'glazed or deposit-buffered silica activity; numeric pO2 window unfilled'
    total_pressure_window: null
    net_liner_delta: thickening
    reaction_site: surface
    wall_property_effect:
      structural: reaction_layer
      service_temp_shift: uncharacterized
      magnitude: qualitative
      basis: 'MgO-SiO2/MAS phase-diagram provenance supports product identity only; transport, adherence, and reaction depth remain unfilled.'
    evidence_tier: phase_diagram
    source_ids: ['ACerS-NIST-SRD31', 'R4-RX-Smart-Glasser-1981']
    needs_experiment: true
    needs_calphad: false
  silica_alkali_silicate: &rx_silica_alkali_silicate
    regime: buffered
    product_phase: 'Na/K silicate glass or liquid'
    favorability: phase_diagram_supported
    sign: neutral
    redox_path: 'Alkali oxide plus SiO2 enters binary alkali-silicate phase fields; exact Na/K volatility and film composition are unfilled.'
    oxygen_activity_window: 'oxide/glazed branch; metallic Na/K first-arrival remains uncharacterized'
    total_pressure_window: null
    net_liner_delta: thinning
    reaction_site: surface
    wall_property_effect:
      structural: fluxing
      service_temp_shift: lower
      magnitude: qualitative
      basis: 'ACerS/NIST phase-equilibria source supports alkali-silicate product classes; exact binary windows need diagram extraction.'
    evidence_tier: phase_diagram
    source_ids: ['ACerS-NIST-SRD31']
    needs_experiment: true
    needs_calphad: true
  silica_feo_fayalite: &rx_silica_feo_fayalite
    regime: reducing_vacuum
    product_phase: 'fayalite-type FeO-SiO2 liquid/slag'
    favorability: phase_diagram_supported
    sign: neutral
    redox_path: 'FeO plus SiO2 enters fayalite/FeO-SiO2 slag fields when an FeO-bearing oxide film exists; metallic Fe first-arrival remains uncharacterized.'
    oxygen_activity_window: 'low-pO2 FeO-bearing slag branch'
    total_pressure_window: null
    net_liner_delta: thinning
    reaction_site: surface
    wall_property_effect:
      structural: fluxing
      service_temp_shift: lower
      magnitude: qualitative
      basis: 'Fayalite-type FeO-SiO2 slag wetting is source-backed at low pO2; exact fused-silica liner corrosion rate is not filled.'
    evidence_tier: phase_diagram
    source_ids: ['R1-SI3', 'R4-CD7', 'ACerS-NIST-SRD31']
    needs_experiment: true
    needs_calphad: true

reactive_exchange:
  fused_silica:
    SiO:
      - regime: reducing_vacuum
        product_phase: 'SiO(g) from SiO2 self-volatilization'
        favorability: source_supported
        sign: volatile_or_revolatilizing
        redox_path: 'Hot low-pO2/vacuum conditions favor silica vaporization to SiO(g); incoming SiO does not create a stable retained liner product by default.'
        oxygen_activity_window: 'low-pO2 reducing vacuum; numeric pO2 window unfilled'
        total_pressure_window: null
        net_liner_delta: thinning
        reaction_site: surface
        wall_property_effect:
          structural: surface_recession
          service_temp_shift: lower
          magnitude: qualitative
          basis: 'Schick supports SiO2-to-SiO(g) wall self-volatilization under hot low-pO2/vacuum conditions.'
        evidence_tier: direct_observation
        source_ids: ['R4-RX-Schick-1960']
        needs_experiment: true
        needs_calphad: false
    alkali_NaK:
      - *rx_silica_alkali_silicate
    Fe_FeO:
