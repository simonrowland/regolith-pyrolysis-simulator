materials:
  fused_silica:
    label: "Fused silica / fused quartz (SiO2)"
    role: "Glaze or capture surface; low-expansion hot-face insert; not primary structure above its continuous range."
    service_temp:
      continuous_C: 1050
      max_operating_C: 1200
      peak_C: 1250
      degradation_onset_C: 1000
      evidence: direct
      citations: ["W:S1"]
      note: >
        Normal continuous use is about 1050 degC, recommended max operating
        temperature is 1200 degC, and non-continuous use is about 1250 degC.
        Devitrification begins near 1000 degC and is accelerated by alkali
        contamination.
    chemical_attack:
      SiO:
        severity: moderate
        evidence: analogous-only
        citations: ["W:S24", "W:S25", "W:S26"]
        note: >
          SiO condensate and ferrosilicon fouling are sourced, but fused-silica
          wall compatibility or beneficial glaze behavior is not direct
          material data. Sustained low-pO2 SiO exposure remains
          uncharacterized.
      alkali_NaK:
        severity: high
        evidence: direct
        citations: ["W:S1", "W:S36"]
        note: >
          Silica-rich refractories failed in high-temperature or boiling sodium,
          and alkali contamination accelerates quartz/fused-silica
          devitrification and alkali-silicate fluxing.
      Fe_FeO:
        severity: high
        evidence: direct
        citations: ["W:S12"]
        note: >
          FeO-SiO2 compositions can form low-melting fayalitic phases. Metallic
          Fe vapor or FeO vapor adherence to fused silica remains
          uncharacterized.
    stickiness:
      SiO:
        class: uncharacterized
        evidence: analogous-only
        citations: ["W:S24", "W:S25", "W:S26"]
        note: >
          Industrial SiO deposits foul equipment, but adhesion to fused silica
          is not directly characterized and nanofab SiO film adhesion evidence
          is mixed.
        surface_interaction:
          arrival_mode: molecular_film
          sticking:
            alpha_s_ref: data/materials.yaml::default_alpha_s_by_species.SiO
          wetting:
            contact_angle_deg: null
            surface_energy_J_m2: null
            liquid_composition: null
            temperature_C: null
            atmosphere: null
          bonding_or_sintering:
            onset_C: null
            basis: 'No regolith-condensate bonding onset value. R1-SI5/Fuel-2017 cold-compression-strength testing is methodology only; do not use ash onset values as simulator constants.'
          removal:
            reentrainment: null
            thermal_cycle_spallation_risk: 'uncharacterized; requires deposit-on-liner thermal-cycle test before deriving retained fraction.'
          derived_retention_fraction:
            value: null
        provenance:
          evidence_tier: uncharacterized
          applicability: 'SiO first-arrival treated as molecular/SiOx film; melt-wetting analog not applied without oxidized or mixed-oxide branch evidence. Existing source IDs are chemistry or attack proxies only; no R1 retention primitive is filled.'
          regime: thin-film
          source_ids: ['W:S24', 'W:S25', 'W:S26']
          needs_experiment: true
          needs_pdf_extraction: null
      alkali:
        class: strongly-adhering
        evidence: analogous-only
        citations: ["W:S1", "W:S27", "W:S36"]
        note: >
          Alkali-silicate glass/liquid formation is the sticky analog. No
          direct Na/K vapor deposit adhesion class was found.
        surface_interaction:
          arrival_mode: metallic_liquid
          sticking:
            alpha_s_ref:
              Na: data/materials.yaml::default_alpha_s_by_species.Na
              K: data/materials.yaml::default_alpha_s_by_species.K
          wetting:
            contact_angle_deg: null
            surface_energy_J_m2: null
            liquid_composition: 'soda-lime-silica glass on alumina-silica refractory; close analog for secondary alkali/silicate oxide-melt branch, not first-arrival Na/K metal or SiO film.'
            temperature_C: 1200
            atmosphere: 'air / solid-glass-air sessile-drop interface'
          bonding_or_sintering:
            onset_C: null
            basis: 'No regolith-condensate bonding onset value. R1-SI5/Fuel-2017 cold-compression-strength testing is methodology only; do not use ash onset values as simulator constants.'
          removal:
            reentrainment: null
            thermal_cycle_spallation_risk: 'uncharacterized; requires deposit-on-liner thermal-cycle test before deriving retained fraction.'
          derived_retention_fraction:
            value: null
        provenance:
          evidence_tier: close_analog
          applicability: 'Contact-angle source applies to secondary soda-lime-silica oxide melt on alumina-silica refractory, not primary Na/K metallic condensate; PDF extraction needed for numeric angle table.'
          regime: air
          source_ids: ['R1-SI1', 'R1-SI5']
          needs_experiment: true
          needs_pdf_extraction: 'R1-SI1'
      Fe:
        class: uncharacterized
        evidence: analogous-only
        citations: ["W:S12"]
        note: >
          Strong adherence is limited to the fayalitic-liquid analog. Metallic
          Fe vapor deposit adhesion is uncharacterized.
        surface_interaction:
          arrival_mode: solid_aerosol
          sticking:
            alpha_s_ref: data/materials.yaml::default_alpha_s_by_species.Fe
          wetting:
            contact_angle_deg: null
            surface_energy_J_m2: null
            liquid_composition: null
            temperature_C: null
            atmosphere: null
          bonding_or_sintering:
            onset_C: null
            basis: 'No regolith-condensate bonding onset value. R1-SI5/Fuel-2017 cold-compression-strength testing is methodology only; do not use ash onset values as simulator constants.'
          removal:
            reentrainment: null
            thermal_cycle_spallation_risk: 'uncharacterized; requires deposit-on-liner thermal-cycle test before deriving retained fraction.'
          derived_retention_fraction:
            value: null
        provenance:
          evidence_tier: uncharacterized
          applicability: 'Fe first-arrival on this representative wall is treated as metal nuclei/aerosol unless an FeO-silicate liquid branch is sourced. Existing source IDs are chemistry or attack proxies only; no R1 retention primitive is filled.'
          regime: vacuum
          source_ids: ['W:S12']
          needs_experiment: true
          needs_pdf_extraction: null
    service_life:
      evidence: uncharacterized
      citations: []
      note: >
        No regolith SiO/Na/K/FeO campaign lifetime was found. Wear gates are
        devitrification, alkali-silicate fluxing, and fayalite formation.

  dense_alumina:
    label: "Dense high-purity alumina (Al2O3)"
    role: "Structural hot face, crucible, and tube material."
    service_temp:
      continuous_C: 1700
      max_operating_C: 1843
      peak_C: null
      degradation_onset_C: null
      evidence: direct
      citations: ["W:S3", "W:S5"]
      note: >
        99.8 percent dense alumina is listed to 1700 degC with no load.
        High-alumina furnace-lining limits near 1843 degC are formulation
        dependent.
    chemical_attack:
      SiO:
        severity: moderate
        evidence: analogous-only
        citations: ["W:S10", "W:S34"]
        note: >
          Alumina-silica and FeOx-silicate slag behavior provide the analog.
          Direct SiO vapor compatibility remains uncharacterized.
      alkali_NaK:
        severity: high
        evidence: direct
        citations: ["W:S3", "W:S4", "W:S36", "W:S37"]
        note: >
          Na vapor/gaseous alkali can form sodium aluminate and beta-alumina.
          K salt reactions are sourced, while K metal vapor remains
          uncharacterized.
      Fe_FeO:
        severity: high
        evidence: direct
        citations: ["W:S34", "W:S35"]
        note: >
          FeOx-silicate slag strongly wets/reacts with alumina and FeO-Al2O3
          can form hercynite. Fe/FeO vapor behavior remains uncharacterized.
    stickiness:
      SiO:
        class: strongly-adhering
        evidence: analogous-only
        citations: ["W:S34"]
