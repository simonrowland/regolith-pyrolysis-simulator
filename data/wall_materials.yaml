    alkali_NaK:
      - *rx_uncharacterized_reducing_vacuum
    Fe_FeO:
      - *rx_uncharacterized_reducing_vacuum
  magnesia:
    SiO:
      - *rx_magnesia_sio_forsterite_buffered
      - *rx_sio_reducing_vacuum_volatile
    alkali_NaK:
      - *rx_uncharacterized_reducing_vacuum
    Fe_FeO:
      - *rx_uncharacterized_reducing_vacuum
  bulk_zirconia_ysz:
    SiO:
      - *rx_uncharacterized_reducing_vacuum
    alkali_NaK:
      - *rx_uncharacterized_reducing_vacuum
    Fe_FeO:
      - *rx_uncharacterized_reducing_vacuum
  plasma_sprayed_alumina:
    SiO:
      - *rx_alumina_sio_oxidizing_mullite
      - *rx_sio_reducing_vacuum_volatile
    alkali_NaK:
      - *rx_alumina_alkali_beta_spall
    Fe_FeO:
      - *rx_alumina_feo_hercynite
  plasma_sprayed_ysz:
    SiO:
      - *rx_uncharacterized_reducing_vacuum
    alkali_NaK:
      - *rx_uncharacterized_reducing_vacuum
    Fe_FeO:
      - *rx_uncharacterized_reducing_vacuum
  plasma_sprayed_mullite:
