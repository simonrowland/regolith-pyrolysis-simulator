      - *rx_mullite_sio_oxidizing
      - *rx_mullite_sio_reducing_decomposition
    alkali_NaK:
      - *rx_alumina_alkali_beta_spall
    Fe_FeO:
      - *rx_uncharacterized_reducing_vacuum

