schema_version: vacuum_pyrolysis_preset.v1
paper_id: sesko_2024_vapor_phase_pyrolysis
paper_citation_id: sesko_2024
measurement_id: sesko_2024_vapor_phase_pyrolysis_measurements
preset_kind: faithful_with_remediation_twin
