# Minimal liner-material surface data for Chunk A of the SiO wall-deposit
# campaign. Values intentionally preserve the pre-existing train constants:
# temp_range_C mirrors CondensationTrain.create_default(), and alpha_s values
# are migrated from simulator/condensation.py STICKING_COEFF at baseline
# 251481c. Do not tune these as golden fixtures.
# STICKING_COEFF/default alpha_s values are ungrounded fitted/by-feel
# assumptions pending W2 grounding in data/literature/vacuum_pyrolysis_sticking.yaml.
#
# max_service_T_C is recorded for the liner/surface contract and defaults to
# the stage high temperature in Chunk A. Chunk C owns pressure coupling and
# operational material-temperature sequencing.

default_alpha_s_by_species: &default_alpha_s_by_species
  Fe: 0.9
  SiO: 0.7
  CrO2: 0.9
  Mg: 0.8
  Na: 0.95
  K: 0.95
  Ca: 0.85
  Mn: 0.85
  Cr: 0.9

default_liner_alpha_s_by_species: &default_liner_alpha_s_by_species
  Fe:
    value: 0.9
    status: proxy
    source_class: legacy_species_default_proxy
    source: data/materials.yaml::default_alpha_s_by_species.Fe
    output_status: uncertainty_only
  SiO:
    value: 0.7
    status: proxy
    source_class: legacy_species_default_proxy
    source: data/materials.yaml::default_alpha_s_by_species.SiO
    output_status: uncertainty_only
  CrO2:
    value: 0.9
    status: proxy
    source_class: legacy_species_default_proxy
    source: data/materials.yaml::default_alpha_s_by_species.CrO2
    output_status: uncertainty_only
  Mg:
    value: 0.8
    status: proxy
    source_class: legacy_species_default_proxy
    source: data/materials.yaml::default_alpha_s_by_species.Mg
    output_status: uncertainty_only
  Na:
    value: 0.95
    status: proxy
    source_class: legacy_species_default_proxy
    source: data/materials.yaml::default_alpha_s_by_species.Na
    output_status: uncertainty_only
  K:
    value: 0.95
    status: proxy
    source_class: legacy_species_default_proxy
    source: data/materials.yaml::default_alpha_s_by_species.K
    output_status: uncertainty_only
  Ca:
    value: 0.85
    status: proxy
    source_class: legacy_species_default_proxy
    source: data/materials.yaml::default_alpha_s_by_species.Ca
    output_status: uncertainty_only
  Mn:
    value: 0.85
    status: proxy
    source_class: legacy_species_default_proxy
    source: data/materials.yaml::default_alpha_s_by_species.Mn
    output_status: uncertainty_only
  Cr:
    value: 0.9
    status: proxy
    source_class: legacy_species_default_proxy
    source: data/materials.yaml::default_alpha_s_by_species.Cr
    output_status: uncertainty_only

fused_silica_liner_alpha_s_by_species: &fused_silica_liner_alpha_s_by_species
  <<: *default_liner_alpha_s_by_species
  SiO:
    value: 0.0
    status: uncharacterized
    source_class: fail_closed_no_direct_sticking_coefficient
    source: data/wall_materials.yaml::materials.fused_silica.stickiness.SiO
    output_status: status_bearing
    basis: "Fused-silica SiO retention has cited chemistry/fouling proxies but no direct differentiated alpha_s; fail closed instead of applying the legacy 0.7."

stages:
  0:
    structural_material: refractory_shell
    liner_material: hot_duct_refractory_liner
    temp_range_C: [1400, 1600]
    max_service_T_C: 1600
    alpha_s_by_species: *default_alpha_s_by_species
  1:
    structural_material: refractory_shell
    liner_material: fe_condenser_liner
    temp_range_C: [1100, 1400]
    max_service_T_C: 1400
    alpha_s_by_species: *default_alpha_s_by_species
  2:
    structural_material: refractory_shell
    liner_material: cr_oxide_cartridge_liner
    temp_range_C: [1100, 1300]
    max_service_T_C: 1300
    alpha_s_by_species: *default_alpha_s_by_species
  3:
    structural_material: refractory_shell
    liner_material: fused_silica_baffles
    temp_range_C: [900, 1200]
    max_service_T_C: 1200
    alpha_s_by_species: *default_alpha_s_by_species
  4:
    structural_material: refractory_shell
    liner_material: alkali_mg_cyclone_liner
    temp_range_C: [350, 700]
    max_service_T_C: 700
    alpha_s_by_species: *default_alpha_s_by_species
  5:
    structural_material: refractory_shell
    liner_material: vortex_dust_filter_liner
    temp_range_C: [200, 350]
    max_service_T_C: 350
    alpha_s_by_species: *default_alpha_s_by_species
  6:
    structural_material: metallic_pressure_shell
    liner_material: turbine_compressor_liner
    temp_range_C: [50, 200]
    max_service_T_C: 200
    alpha_s_by_species: *default_alpha_s_by_species
  7:
    structural_material: metallic_pressure_shell
    liner_material: turbine_outlet_monitor_liner
    temp_range_C: [20, 50]
    max_service_T_C: 50
    alpha_s_by_species: *default_alpha_s_by_species

wall_surfaces:
  interstage_duct:
    structural_material: refractory_shell
    liner_material: hot_wall_refractory_liner
    surface_model: lumped_collection_pipe
    alpha_s_by_species: *default_alpha_s_by_species

liner_materials:
  fe_condenser_liner:
    max_service_T_C: 1400
    alpha_s_by_species: *default_liner_alpha_s_by_species
  cr_oxide_cartridge_liner:
    max_service_T_C: 1300
    alpha_s_by_species: *default_liner_alpha_s_by_species
  fused_silica_baffles:
    max_service_T_C: 1200
    alpha_s_by_species: *fused_silica_liner_alpha_s_by_species
  alkali_mg_cyclone_liner:
    max_service_T_C: 700
    alpha_s_by_species: *default_liner_alpha_s_by_species
  vortex_dust_filter_liner:
    max_service_T_C: 350
    alpha_s_by_species: *default_liner_alpha_s_by_species
  turbine_compressor_liner:
    max_service_T_C: 200
    alpha_s_by_species: *default_liner_alpha_s_by_species
  turbine_outlet_monitor_liner:
    max_service_T_C: 50
    alpha_s_by_species: *default_liner_alpha_s_by_species
  hot_wall_refractory_liner:
    max_service_T_C: 1600
    alpha_s_by_species: *default_liner_alpha_s_by_species
    resinter_threshold_kg: null
    resinter_threshold_basis: configurable_parameter_no_sourced_default
    fast_fouling_campaign_threshold: 10
