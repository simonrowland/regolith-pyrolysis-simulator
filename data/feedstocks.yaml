# CARBONACEOUS / ICY BODY FEEDSTOCKS
# ---------------------------------------------------------------------------
# CI, CM, Ceres, and Comet share identical post-degassing silicate processing
# (C1-C6 unchanged from CI baseline). Differences are confined to C0 staged
# degassing + trap cartridges + bonus volatiles.

ci_carbonaceous_chondrite:
  label: "CI Carbonaceous Chondrite"
  source: "FAMILY-REPRESENTATIVE MODELED COMPOSITION (not a cited table); context basis: CI meteorites; Hayabusa2 Ryugu return; OSIRIS-REx Bennu return"
  confidence: "High"
  note: >
    Bulk composition includes ~20-35% volatile mass (H2O, C, S) lost during
    extended C0. Main composition_wt_pct gives the BULK including volatiles-
    as-oxides for C0 modelling. The anhydrous_silicate_after_degassing
    composition is what enters C1-C6 campaigns.
  composition_wt_pct:
    SiO2:  25.0
    FeO:   25.0    # FeO + Fe2O3, mostly as magnetite Fe3O4
    MgO:   18.5
    Al2O3:  2.25
    CaO:    1.75
    Na2O:   0.75
    NiO:    1.50
    H2O:   15.0    # structural, in phyllosilicates
    carbonaceous_organic: 4.0  # IOM/organic matter; literature-converged correction, not carbonate remainder
    carbonate_salts: 2.5  # Ivuna/Orgueil-class carbonate mineral mass; not_speciated Mg/Ca/Fe carbonate
    S:      4.0    # predominantly sulfides
  composition_ranges:
    SiO2:  [22, 28]
    FeO:   [20, 30]
    MgO:   [15, 22]
    Al2O3: [1.5, 3]
    CaO:   [1, 2.5]
    Na2O:  [0.5, 1.0]
    NiO:   [1.2, 1.8]
    H2O:   [10, 20]
    carbonaceous_organic: [3.0, 5.5]
    carbonate_salts: [1.5, 4.0]
    S:     [2, 6]
  sum_check: 100.25  # bulk; corrected carbon carriers consume prior minor/trace remainder
  carbon_speciation_provenance:
    carbonaceous_organic:
      value_wt_pct: 4.0
      interval_wt_pct: [3.0, 5.5]
      source: "REF-028 REF-025 REF-027 Yokoyama T. et al. 2023, Science abn7850; Pearson V.K. et al. 2006, M&PS 41:1899-1918; Alexander C.M.O'D. et al. 2007, GCA 71:4380-4403."
      basis: "CI bulk carbon is IOM/organic-dominated; Ivuna organic C is about 90% of total C."
    carbonate_salts:
      value_wt_pct: 2.5
      interval_wt_pct: [1.5, 4.0]
      source: "REF-028 REF-026 Yokoyama T. et al. 2023, Science abn7850; Bland P.A. et al. 2004, M&PS 39:3-16; Endress M. & Bischoff A. 1996, GCA 60:3035-3045."
      basis: "Ivuna residual carbonate C implies about 2.6-2.8 wt% carbonate mineral; Ryugu-rich aliquots remain a separate lithology branch."
    implied_bulk_c_wt_pct: [2.9, 4.0]
  stage0_carrier_keys:
    carbonate:
      composition_key: carbonate_salts
      reaction_family: carbonate_decomposition
      stage0_components_set: STAGE0_CARBONATE_COMPONENTS
      interval_required: true
      not_speciated: true
      level_range_wt_pct: [1.5, 4.0]
      sources:
        - "Yokoyama et al. 2023"
        - "Bland et al. 2004"
        - "Endress & Bischoff 1996"
  stage0_profile: "carbonaceous_degas_cleanup"
  stage0_temp_range_C: [20, 1050]
  stage0_formula_inventory:
    carbonaceous_organic:
      template_formula: generic_carbonaceous_organic
      decomposition_temp_range_C: [200, 800]
      final_temp_C: 1050
      cap_kg_per_tonne: [30, 55]
      offgas_mode: complete_oxidation
      oxygen_source: controlled_stage0_O2
      source: "REF-028 REF-025 REF-027 Yokoyama et al. 2023 + Pearson et al. 2006 + Alexander et al. 2007 constrain CI organic matter to 4.0 wt% [3.0, 5.5]; generic C/H/O/N inventory is a process surrogate for oxidative cleanup."
    hydrocarbons:
      template_formula: generic_carbonaceous_hydrocarbon
      decomposition_temp_range_C: [200, 500]
      final_temp_C: 1050
      cap_kg_per_tonne: [15, 30]
      offgas_mode: complete_oxidation
      oxygen_source: controlled_stage0_O2
      source: "MODELED BUCKET (not a cited table); generic carbonaceous hydrocarbon cleanup bucket; C/H mass fractions approximate sourcebook-style volatile tables when exact organics speciation is unavailable."
  anhydrous_silicate_after_degassing:
    note: "650-800 kg per tonne survives C0; this is the C1-C6 input"
    mass_per_tonne_kg: [650, 800]
    composition_wt_pct:
      SiO2:  36.0
      FeO:   30.0    # all as FeO after conditioning blow
      MgO:   24.0
      Al2O3:  2.5
      CaO:    2.25
      NiO:    2.0
    composition_ranges:
      SiO2:  [32, 40]
      FeO:   [25, 35]
      MgO:   [22, 26]
      Al2O3: [2, 3]
      CaO:   [1.5, 3]
      NiO:   [1.5, 2.5]
    sum_check: 96.75  # minor residual phases account for remainder
  degassing_cascade:
    step_1: "200-500C: organic pyrolysis -> hydrocarbons, CO2 (char remains)"
    step_2: "400-700C: phyllosilicate dehydroxylation -> H2O"
    step_3: "500-900C: sulfide decomposition -> S2 (no reductant needed)"
    step_4: "600-800C: carbonate decomposition -> CO2"
    step_5: "800-950C: magnetite reduction by CO -> wustite (FeO)"
    step_6: "1000-1050C: conditioning O2 blow (desulf, decarb, re-oxidise incidental Fe)"
  potential_products:
    H2O_kg_per_tonne: [100, 170]
    Fe_Ni_alloy_kg_per_tonne: [75, 120]   # 3-8% Ni, zero S/C (vapour purified)
    S_kg_per_tonne: [25, 40]
    hydrocarbons_kg_per_tonne: [15, 30]
  key_feature: "Uniquely abundant water (100-170 kg/t); self-cleaning indigenous carbon"
  preferred_for: "Water production + Fe-Ni alloy + Mg shuttle feedstock"
  process_notes: >
    Indigenous carbon sufficient (30-50 kg C vs 10-27 kg demand; self-cleaning).
    Ryugu showed ~50% less H2O than pristine CI meteorites (surface dehydration).
