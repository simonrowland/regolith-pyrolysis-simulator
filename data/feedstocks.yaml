lunar_mare_low_ti:
  label: "Lunar Mare Basalt (Low-Ti)"
  source: "Apollo 12/15 low-Ti basaltic soils"
  confidence: "High"
  note: >
    Low-Ti mare basalt variant (TiO2 ~1.5 wt%). Source data gives single
    ranges for all oxides with TiO2 1.5-8.0; this entry uses the low end
    for TiO2. Sum of midpoints is ~97.2 wt% — the deficit reflects that
    real low-Ti samples have slightly higher SiO2/FeO/CaO than the
    overall range midpoints. Retained as-is for traceability.
    Lunar sample chemistry reports total iron as FeO by convention unless
    source data explicitly separates ferric iron.
  composition_wt_pct:
    SiO2:  44.5
    TiO2:   1.5
    Al2O3: 13.5
    FeO:   16.5
    MgO:    9.0
    CaO:   11.0
    Na2O:   0.4
    K2O:    0.10
    Cr2O3:  0.35
    MnO:    0.20
    P2O5:   0.10
  composition_ranges:
    SiO2:  [43, 46]
    TiO2:  [1.0, 2.0]   # low-Ti subset
    Al2O3: [12, 15]
    FeO:   [15, 18]
    MgO:   [8, 10]
    CaO:   [10, 12]
    Na2O:  [0.3, 0.5]
    K2O:   [0.05, 0.15]
    Cr2O3: [0.2, 0.5]
    MnO:   [0.15, 0.25]
    P2O5:  [0.05, 0.15]
  sum_check: 97.15  # see note
  key_feature: "Standard lunar basalt; moderate Fe and Mg; low TiO2"
  preferred_for: "General ISRU baseline; Fe/Mg shuttle feedstock"
  process_notes: "Standard C0-C6 flowsheet; ~0.5 wt% nanophase Fe0 present"

