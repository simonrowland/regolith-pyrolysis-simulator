  confidence: "Low"
  note: >
    No sample return; Psyche mission arrives Aug 2029. Metallic phase
    is ~500 kg per tonne of bulk material. This entry is phase-normalized:
    a 1000 kg simulation means 1000 kg of separated metal phase, not one
    tonne of unsorted bulk M-type regolith. Elemental composition (not oxides).
  composition_wt_pct:
    Fe:  90.0
    Ni:   7.5
    Co:   0.40
    S:    1.25
    P:    0.20
  composition_ranges:
    Fe: [88, 92]
    Ni: [5, 10]
    Co: [0.3, 0.5]
    S:  [0.5, 2]
    P:  [0.1, 0.3]
  mass_fraction_of_bulk: 0.50   # metadata only; entry is phase-normalized
  sum_check: 99.35
  key_feature: "Natural Invar/Kovar analog; melting + tapping only"
  preferred_for: "Direct metal production; no reduction needed"
  process_notes: "Melt at 1550-1600C; immiscible separation (7.9 vs 2.8 g/cm3); tap Fe-Ni-Co-P metal; process silicate separately"

