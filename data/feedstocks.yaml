s_type_asteroid_silicate:
  label: "S-Type Asteroid Silicate Fraction"
  source: "H/L/LL ordinary chondrite meteorites; Hayabusa Itokawa sample return"
  confidence: "High"
  note: >
    Silicate fraction AFTER magnetic separation of Fe-Ni metal phase.
    Wide FeO range (8-18%) spans H-chondrite (low FeO) to LL-chondrite
    (high FeO). Midpoint sum ~105.5% because the wide MgO and FeO ranges
    reflect different subtypes that don't co-occur at their midpoints.
    Use H-type (FeO~9, MgO~36) or LL-type (FeO~16, MgO~32) for
    specific simulations. Normalise for generic runs.
  composition_wt_pct:
    SiO2:  51.5
    TiO2:   0.15
    Al2O3:  3.0
    FeO:   13.0
    MgO:   34.0
    CaO:    2.0
    Na2O:   1.0
    K2O:    0.10
    Cr2O3:  0.45
    MnO:    0.30
  composition_ranges:
    SiO2:  [48, 55]
    TiO2:  [0.1, 0.2]
    Al2O3: [2, 4]
    FeO:   [8, 18]
    MgO:   [30, 38]
    CaO:   [1, 3]
    Na2O:  [0.8, 1.2]
    K2O:   [0.05, 0.15]
    Cr2O3: [0.3, 0.6]
    MnO:   [0.2, 0.4]
  sum_check: 105.50  # see note; midpoints span H-to-LL subtypes
  bulk_additions:
    metallic_FeNi_wt_pct: [10, 20]   # already reduced; magnetic separation -> 100-200 kg/t at zero energy
    FeS_troilite_wt_pct: [5, 6]      # 25-30 kg S/t from decomposition at 600-900C
    C_wt_pct: [0.1, 0.5]             # 1-5 kg C/t
  key_feature: "Extreme MgO (30-38%); olivine-pyroxene mineralogy; 3-4x lunar Mg"
  preferred_for: "Mg shuttle bootstrap; Mg-dominant metal production; Na2O 2-3x lunar"
  process_notes: >
    Liquidus 1350-1450C (vs 1150-1250C for CMAS); 15-25% more melting energy.
    Micro-g to milli-g environment requires redesign for tapping, injection, condensation.
    10-20 wt% free Fe-Ni metal recoverable magnetically before pyrolysis.

