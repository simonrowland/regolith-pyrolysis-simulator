# ---------------------------------------------------------------------------
# MARS FEEDSTOCKS
# ---------------------------------------------------------------------------
# Mars feedstocks include SO3, Cl, ClO4 as additional components (sulfates,
# halides, perchlorates) not present in lunar/asteroid compositions.
# All Mars feedstocks operate under ~6 mbar CO2 atmosphere (no deep vacuum).

# buy: https://spaceresourcetech.com/collections/regolith-simulants
# source: Long-Fox et al. 2023 Frontiers in Space Technologies Table 2 XRF for MGS-1 base; Costa et al. 2024 TiO2 cross-check.
mars_global_mgs1:
  name: "MGS-1 Mars global simulant"
  label: "MGS-1 Mars Global Simulant (SRT/Exolith)"
  class: mars_simulant
  stage0_profile: "bulk_preservation"
  source: "Space Resource Technologies (Exolith Lab spin-off) MGS-1; targets average Mars global surface regolith"
  confidence: "High for captured major oxides; Mars volatile salts must be lot/variant-specific"
  note: >
    Source-captured MGS-1 base simulant composition. Mars sulfate, chloride,
    and perchlorate inventories are variant/lot-specific and explicitly
    not_reported here rather than inferred. Use MGS-1S/MGS-1C/JEZ-1 variants
    only after their full source tables are captured. Simulant, not real Mars
    soil: nanophase iron oxides, perchlorates, and hydrated phases are not
    automatically represented by this base XRF subset.
  # Long-Fox et al. 2023 Table 2 MGS-1 oxide subset sums to 89.59 wt%.
  # Composition below is declared on a 100 wt% anhydrous/volatile-free basis;
  # sulfur, halides, perchlorates, salts, and sulfides remain not_reported per lot.
  # TODO(vpr-p4): capture lot-variant volatile sidecar before enabling Mars volatile chemistry.
  composition_wt_pct:
    SiO2:  49.00
    TiO2:   0.51
    Al2O3: 11.63
    FeO:   11.83
    MgO:   16.53
    CaO:    8.83
    Na2O:   1.67
  sum_check: 100.00
  composition_basis:
    mode: "declared_anhydrous_volatile_free_normalized"
    source_oxide_subset_wt_pct: 89.59
    normalized_sum_check_wt_pct: 100.0
    excluded_classes: [sulfur, halides, perchlorates, salts, sulfides]
    citation: "Long-Fox J.M. et al. 2023, Frontiers in Space Technologies, Table 2 XRF for MGS-1."
  glass_fraction:
    value: "not_reported"
    note: "MGS-1 captured sources do not report glass fraction."
  stage0_buckets:
    h2o_wt_pct: "not_reported"
    organics_wt_pct: 0.0
    carbon_wt_pct: 0.0
    sulfur_wt_pct: "not_reported"
    halides_wt_pct: "not_reported"
    perchlorates_wt_pct: "not_reported"
    salts_wt_pct: "not_reported"
    native_metals_wt_pct: 0.0
    sulfides_wt_pct: "not_reported"
    refractory_trace_wt_pct: "not_reported"
  provenance:
    composition_citation: "Long-Fox J.M. et al. 2023, Frontiers in Space Technologies, Table 2 XRF for MGS-1; Costa et al. 2024 analytical cross-check for TiO2 0.46."
    composition_digest: "sha256:d58159a7b69bcc9c"
    lot_or_batch: "not_reported; request current-lot XRF from SRT"
    buy_url: "https://spaceresourcetech.com/collections/regolith-simulants"
    buy_url_checked: "2026-06-11"
  simulant_vs_real_caveat:
    report_placement: "measurement_sidecar"
    text: "MGS-1 is a Mars simulant, not real Mars regolith; nanophase Fe oxides, hydrated phases, perchlorates, and sulfate/halide salts require explicit sidecar data."
  environment:
    surface_pressure_mbar: 6
    atmosphere: "96% CO2"
    constraint: "Mars material is not processed as hard-vacuum regolith"
  key_feature: "Mars global average simulant with elevated Mg and explicit missing volatile-salt metadata"
  preferred_for: "Mars ISRU baseline after variant/lot volatile salts are supplied"
  process_notes: "Loadable for oxide-only comparisons; not experiment-grade for Mars volatile chemistry without sidecar salts/perchlorates."

