  confidence: "High"
  note: >
    Silicate fraction AFTER magnetic separation of Fe-Ni metal phase.
    Wide FeO range (8-18%) spans H-chondrite (low FeO) to LL-chondrite
    (high FeO). Midpoint sum ~105.5% because the wide MgO and FeO ranges
    reflect different subtypes that don't co-occur at their midpoints.
    Use H-type (FeO~9, MgO~36) or LL-type (FeO~16, MgO~32) for
    specific simulations. Normalise for generic runs.
  composition_wt_pct:
    SiO2:  51.5
