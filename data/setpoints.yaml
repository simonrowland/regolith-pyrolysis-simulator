# ============================================================================
# 13. MRE STEPPED VOLTAGE HOLDS (Simulator control sequence)
# ============================================================================
mre_stepped_voltage_holds:
  description: >
    Stepped voltage hold schedule for MRE_BASELINE and C5 campaigns.
    At each voltage step, hold until target species current decays
    below 5% of applied current, then advance to next step.
    C5 limited MRE uses only steps up to 1.6 V.
    NOTE: voltages reanchored to raw-thermo (matching DECOMP_VOLTAGES /
    mre_voltage_sequence, MRE-COVERAGE #32B). This block appears UNCONSUMED
    (no code reader; the live schedule is mre_voltage_sequence) and is a
    single-source-of-truth consolidation candidate (SC-09 ladder-drift).
  # voltage: "canonical" resolves through simulator/mre_ladder.py
  # DECOMP_VOLTAGES.
  sequence:
    - voltage: "canonical"
      species: [FeO]
      min_hold_hours: 3
    - voltage: "canonical"
      species: [Cr2O3]
      min_hold_hours: 2
    - voltage: "canonical"
      species: [MnO]
      min_hold_hours: 2
    - voltage: "canonical"
      species: [SiO2]
      min_hold_hours: 5
    - voltage: "canonical"
      species: [TiO2]
      min_hold_hours: 3
    - voltage: "canonical"
      species: [Al2O3]
      min_hold_hours: 8
    - voltage: "canonical"
      species: [MgO]
      min_hold_hours: 5
    - voltage: "canonical"
      species: [CaO]
      min_hold_hours: 10


