              semantic_target_kind: null
              target_element: "Na"
              residual_species: *completion_residual_Na
              element_map:
                Na: *completion_species_Na
            - <<: *vapor_completion_contract
              contract_id: "C2A_staged.alkali_early_fe.K.vapor"
              target_species: "K"
              semantic_target_kind: null
              target_element: "K"
              residual_species: *completion_residual_K
              element_map:
                K: *completion_species_K
        sio_window:
