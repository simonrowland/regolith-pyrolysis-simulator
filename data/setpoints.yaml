# ============================================================================
# Oxygen Shuttle -- Simulator Setpoints & Condensation Train Configuration
# ============================================================================
# Single source of truth for the regolith-pyrolysis-simulator.
# All values for 1-tonne mature low-Ti mare batch unless noted.
# Yields are practical ranges for typical mare
#   (Fe ~93 kg/t, Ti ~18 kg/t, SiO2 ~460 kg/t).
#
# Source: context-setpoints.yaml v2 + context-core.md + context-thermo.md
# ============================================================================

# Top-level operator furnace ceiling. Grounding: docs-private/research/
# 2026-06-18-furnace-max-temp/findings.md recommends default 1800 C and
# bounds [1200, 2000]: 1200 C from fused-silica max-operating authority,
# with upper range from refractory service temperatures plus 1800-2100 C solar
# vacuum pyrolysis operating evidence.
furnace_max_T_C: 1800

# ============================================================================
# 1. CAMPAIGNS
# ============================================================================
campaigns:

  # Expected terminal rump composition by recipe. Documentation only; not an
  # assertion. F5 owns executable per-recipe checks.
  # - C0: feedstock silicate melt + Stage 0 inert slag; no final ceramic claim.
  # - C0b: CMAS-rich melt after P cleanup + refractory inert slag.
  # - C2A_continuous: Fe/alkali/SiO-depleted Ca-Mg-Al-Ti-Cr-REE rump with residual SiO2.
  # - C2A_staged: staged Path A rump; same class target as C2A_continuous,
  #   with V1c cool Na cleanup reducing residual Fe before later campaigns.
  # - C2B: Fe-depleted CMAS glass/ceramic stock; SiO2 intentionally retained.
  # - C3: legacy alkali-shuttle polish; K and hot Na FeO claims are deprecated
  #   under V1c JANAF and executable reducers must pass the temperature gate.
  # - C4: Branch Two Mg-depleted Ca-Al-Ti-Cr-REE rump with residual SiO2.
  # - C5: Branch Two limited-MRE target is Ca/Al/REE ceramic rump.
  # - C6: Mg-thermite target is Ca/REE terminal slag after Al extraction.

  # --------------------------------------------------------------------------
  # C0 -- Vacuum Bakeoff & Volatile Recovery
  # --------------------------------------------------------------------------
  C0:
    label: "Vacuum Bakeoff & Volatile Recovery"
    temp_range_C: [20, 950]
    dT_dt_C_per_hr: 50
    atmosphere: "hard_vacuum"
    pO2_mbar: null                       # deep vacuum
    target_species: ["H2O", "CO2", "S2", "CHNOPS"]
    products:
      volatiles:
        mass_kg: [0.3, 1.0]
        note: "CHNOPS from solar-wind implantation"
      native_Fe:
        mass_kg: 5.0                     # nanophase Fe0, magnetic separation, zero energy
        note: "nanophase Fe0, magnetic separation, zero energy"
    endpoint:
      type: "ir_signal_decay"
      threshold: 0.05
    max_hold_hr: 25
    soft_endpoint:
      type: "temperature_min_after_min_hold"
      min_hold_hr: 10
      temperature_min_C: 940
    termination_class: "C"
    duration_h: "included_in_ramp"
    notes: >
      Volatile release complete by ~700 C; alkali onset >900 C
      (thermally separated). Native Fe separated magnetically at
      zero additional energy cost.

  # --------------------------------------------------------------------------
  # C0b -- Standardised P-Cleanup (mild oxidative hold)
  # --------------------------------------------------------------------------
  C0b_p_cleanup:
    label: "Standardised P-Cleanup (Mild Oxidative Hold)"
    activation_condition: >
      default_recommended_for_all_lunar OR P2O5_wt_pct > 0.04
      OR persistent_P_IR_after_1050C_vacuum_hold
    beneficiation_preferred: true        # avoids absorbing O2 into metallic Fe
    temp_range_C: [1180, 1320]
    dT_dt_C_per_hr: null                 # isothermal hold; IR-endpoint controlled
    atmosphere: "controlled_O2_flow"     # flow/sweep or mild bubbling
    pO2_mbar: [3.0, 15.0]               # suppresses Na/K/SiO; only volatiles train open
    pO2_mbar_default: 9.0
    p_total_mbar_default: 9.0
    target_species: ["PO", "POx"]
    products:
      phosphate_salts:
        mass_kg: [0.2, 12.0]
        note: "85-98% captured as clean Ca/Mg/alkali phosphates in 350-650 C trap"
    O2_total_processed_kg_per_kg_P: [0.8, 2.5]
    O2_net_bound_kg_per_kg_P: [0.15, 0.60]
    endpoint:
      type: "ir_signal_decay"
      threshold: 0.05
    max_hold_hr: 3
    soft_endpoint:
      type: "temperature_min_at_cap"
      temperature_min_C: 1200
    termination_class: "C"
    duration_h: [0.5, 2.5]              # IR endpoint control
    notes: >
      Standardised mild oxidative P-cleanup for ALL lunar feedstocks
      (mare, highland, SPA, PKT, PSR, etc.). Enables higher-T complete P
      volatilisation with Na/K suppression. IR endpoint for adaptive
      duration. Minimal overhead on low-P ores; full capability for KREEP.
      Synergises with pO2-managed philosophy and beneficiation.
      May need to cool afterwards before hard-vacuum C2A to avoid SiO release.

  # --------------------------------------------------------------------------
  # C2A -- Continuous Adaptive pN2 Ramp (Path A default)
  #        Replaces deprecated separate C1 + C2A entries.
  # --------------------------------------------------------------------------
  C2A_continuous:
    label: "Continuous Adaptive pN2 Ramp -- Na/K + Fe + SiO2 Co-Extraction (Path A)"
    activation_condition: "Path_A AND NOT preserving_CMAS_glass_for_glass_or_ceramics"
    preferred_default: true
    # Continuous runtime peak is clamped to top-level furnace_max_T_C;
    # temp_range_C is the searchable ramp envelope, not the hard peak.
    temp_range_C: [1050, 1600]           # single continuous metered ramp
    dT_dt_C_per_hr:
      early_ramp_1050_1320C: [10, 20]    # Na/K and early Fe regime
      peak_SiO_window_1400_1600C: [5, 10]
    atmosphere: "recirculating_inert_sweep"
    carrier_gas: "pN2"                   # optimal; pHe or pAr fallback
    p_total_mbar: [5, 15]               # optimal 8-12 mbar viscous-flow regime
    pO2_mbar: null                       # <1e-5 mbar; maintained by Fe-granule sorbent
    pO2_mbar_default: 0.0
    p_total_mbar_default: 10.0
    pO2_bar: "<1e-8"
    flow_regime: "viscous"               # Kn << 0.01 at 1-10 mbar
    target_species: ["Na", "K", "Fe", "CrO2", "SiO"]
    adaptive_control:
      law: >
        Meter dT/dt to keep instantaneous outgassing flux (IR-monitored)
        <= 60-80% of hot-wall pipe capacity (target 5-12 g/s SiO at peak)
      sensors: >
        Stage 0 hot-duct IR: Na 589 nm early, Fe 370 nm mid,
        SiO 230 nm UV dominant >1400 C; plus upstream pressure
      induction_stirring: "continuous 4-8x acceleration + 50-80 C cycling"
    products:
      Na:
        mass_g: [2300, 4000]
        note: "recyclable shuttle stock; quantitative collection"
      K:
        mass_g: [800, 1350]
        note: "recyclable shuttle stock; quantitative collection"
      Fe:
        mass_kg: [85, 130]
        condensation_T_C: [1100, 1400]
      SiO2_glass:
        mass_kg: [100, 160]
        condensation_T_C: [900, 1200]
        note: "fused silica on removable Stage 2 cartridge"
      O2:
        mass_kg: [48, 70]
        note: "from Fe sorbent reheat"
    recovery_NaK_pct: [88, 96]
    SiO_transport_capacity_g_per_s: [7, 16]
    hertz_knudsen_SiO_flux_g_per_m2s: [60, 70]   # at 1600 C, a(SiO2) ~1
    endpoint:
      type: "ir_signal_decay"
      threshold: 0.05
      species_monitored: ["Na", "K", "Fe", "SiO"]
      SiO_target: "target a(SiO2) reduction reached"
    max_hold_hr: 30
    soft_endpoint:
      type: "total_evaporation_rate_below_after_min_hold"
      min_hold_hr: 18
      threshold_kg_hr: 0.1
    termination_class: "C"
    duration_h: [18, 28]
    downstream_impact: >
      C3 cycles halved (0-1 K + 1 Na); C5 MRE scope reduced 20-40%;
      8-20% shorter full batch
    notes: >
      Preferred default Path A implementation. Single continuous solar-thermal
      ramp; no discrete holds or atmosphere switches. Hot-wall design
      (Stage 0 duct >1400 C) prevents premature condensation. IR endpoint
      control allows precise termination when target a(SiO2) reduction
      is reached. Fully compatible with micro-g adaptations
      (wicking/centrifugal condensers).

  C2A_staged:
    label: "Staged pN2 Bakeout -- Alkali / SiO / Fe Hold / Cool Na Cleanup"
    activation_condition: "Path_A_staged AND sequential_product_collection"
    preferred_default: false
    temp_range_C: [1250, 1750]
    default_hold_T_C: 1750
    atmosphere: "recirculating_inert_sweep"
    carrier_gas: "pN2"
    p_total_mbar: [5, 15]
    pO2_mbar: null
    pO2_mbar_default: 0.0
    p_total_mbar_default: 10.0
    pO2_bar: "<1e-8"
    flow_regime: "viscous"
    target_species: ["Na", "K", "SiO", "Fe"]
    depletion_flux_decay_fraction: 0.0
    operator_knobs:
      hold_temp_C:
        via: "adjust campaign_override C2A_staged hold_temp_C <C>"
        default_C: 1750
        bounds_C: [1650, 1800]
        role: "cycle-time lever; not a thermal-yield ceiling breaker"
      Na_additive_kg:
        via: "recipe knob campaigns.C3.alkali_dosing.Na_kg requested as C3 alkali credit-line dose"
        default_kg: 12
        role: "V1c cool residual-FeO cleanup dose; thin +9.6 kJ/mol O2 margin at 1150 C"
    max_hold_hr: 9
    termination_class: "A"
    stages:
      - name: alkali_early_fe
        target_C: 1250
        ramp_rate_C_per_hr: 600
        duration_h: 4
        target_species: ["Na", "K"]
        endpoint:
          type: "flux_decay_or_duration"
          threshold_kg_hr: 0.02
          species_monitored: ["Na", "K"]
          flux_decay_species: ["Na", "K"]
        verification:
          lunar_mare_low_ti_kg_per_1000kg:
            Na: 3.05
            K: 0.11
            Fe: 0.00
            SiO: 0.00
      - name: sio_window
        target_C: 1600
        ramp_rate_C_per_hr: 175
        duration_h: 3
        target_species: ["SiO", "minor_Fe"]
        endpoint:
          type: "SiO_pulse_then_flux_decay_or_duration"
          threshold_kg_hr: 0.05
          species_monitored: ["SiO", "Fe", "Mg"]
          flux_decay_species: ["SiO"]
        verification:
          note: >
            Engine ladder shows Fe/SiO/Mg overlap above ~1600 C; this stage
            isolates the first SiO pulse but cannot make a pure SiO window.
      - name: fe_hot_hold
        ramp_rate_C_per_hr: 150
        duration_h: 1
        target_species: ["Fe"]
        endpoint:
          type: "FeO_residual_or_duration"
          FeO_residual_kg_target: [20, 24]
          thermal_Fe_depletion_pct: [86, 88]
          flux_decay_species: ["Fe"]
        verification:
          lunar_mare_low_ti_kg_per_1000kg:
            Fe_thermal_total: 116.2
            FeO_residual: 20.3
            thermal_Fe_pct: 88.0
      - name: cool_for_na_shuttle
        target_C: 1150
        ramp_rate_C_per_hr: 600
        duration_h: 1
        target_species: ["residual_FeO"]
        endpoint:
          type: "temperature_gate_for_Na_FeO_cleanup"
          max_temperature_C: 1150
    na_shuttle_stage:
      campaign: "C3_NA"
      target_C: 1150
      ramp_rate_C_per_hr: 600
      duration_h: 3
      additive: "Na"
      recommended_Na_kg: 12
      Na2O_solubility_cap_wt_pct: 10
      JANAF_4th_multiphase_margin_kJ_per_mol_O2:   # 2026-07-09 re-ground; recomputed from ellingham_thermo multiphase fits
        Na_FeO_1150C: 11.1     # was 9.6 under the earlier linear fit
        Na_FeO_crossover_C: 1181.5     # was 1173.4
        K_FeO_1150C: -127.4    # was -125.7
        K_FeO_crossover_C: 836.25    # was 832.0
      reactions:
        - "2Na + FeO -> Na2O + Fe"
      endpoint:
        type: "residual_FeO_reduction_or_alkali_dose_exhausted"
        Fe_total_pct_target_min: 90
      known_model_limit: >
        The JANAF-4th multiphase refit (2026-07-09 re-ground) removes K/FeO from
        practical melt temperatures (K/Fe crossover 836 C). The staged cleanup is
        now Na-only at 1150 C, inside a narrow Na/FeO window with about +11.1 kJ/mol O2
        margin and a 1181.5 C crossover. Do not retune upward without new thermodynamic evidence.
    downstream_impact: >
      Adds an operator-selectable Path A staged route without changing
      C2A_continuous. The cool Na cleanup uses additive/recycled Na for
      residual FeO cleanup; K remains a volatile product, not a FeO reductant.
    notes: >
      Setpoints were derived from the corrected vapor ladder under the main
      venv with VapoRock available: alkalis dominate <=1350 C, SiO starts to
      overlap Fe/Mg near 1600 C, and one 1750 C hot hold leaves residual FeO
      for the cooler Na cleanup. Hold temperature is exposed as a knob capped
      at the alumina/doloma furnace ceiling of ~1800 C.

  # --------------------------------------------------------------------------
  # C2B -- pO2-Managed Fe Pyrolysis (Path B)
  # --------------------------------------------------------------------------
  C2B:
    label: "pO2-Managed Fe Pyrolysis (Path B)"
    activation_condition: "Path_B -- preserving CMAS glass for Material 1 or terminal ceramics"
    temp_range_C: [1320, 1480]
    dT_dt_C_per_hr: null                 # pO2-ramped with temperature
    atmosphere: "controlled_O2"
    pO2_mbar: [0.8, 2.3]                # ramped with temperature
    pO2_mbar_default: 1.5
    p_total_mbar_default: 1.5
    target_species: ["Fe"]
    products:
      Fe:
        mass_kg: [85, 130]
      CMAS_glass:
        note: "preserved in melt for tapping as Material 1"
    co_partitioning: ["Ni", "Co", "Cu", "P"]   # partition into iron phase
    product_quality: "low-alloy structural iron"
    endpoint:
      type: "ir_signal_decay"
      threshold: 0.05
      species_monitored: ["Fe"]
    max_hold_hr: 20
    soft_endpoint:
      type: "species_evaporation_rate_below_after_min_hold"
      species: "Fe"
      min_hold_hr: 8
      threshold_kg_hr: 0.05
    termination_class: "C"
    duration_h: null                     # IR-controlled
    notes: >
      Path B: 8-20% slower overall cycle if leaving SiO2 in the melt for
      Material 1 or terminal ceramics recipes vs pN2 ramp. Use only when
      glass preservation is required.

  # --------------------------------------------------------------------------
  # C3 -- Na/K Metallothermic Polish (Shuttle Cycles)
  # --------------------------------------------------------------------------
  C3:
    label: "Deprecated Na/K Metallothermic Polish"
    JANAF_4th_multiphase_status: >
      K/FeO is refused throughout practical melt temperatures (formal
      crossover 836 C). Na/FeO survives only below 1181.5 C and is therefore
      used only by the C2A_staged 1150 C FeO cleanup override. Default C3
      Cr/Ti reductions remain refused by the executable temperature gate.
    pO2_mbar_default: 1.0
    p_total_mbar_default: 1.0
    sequencing: "legacy K-first then Na; physics gate may refuse all targets"
    alkali_dosing:
      Na_kg: 0.0
      K_kg: 0.0
    K_phase:
      name: "Deprecated K FeO reduction diagnostic"
      T_inject_C: [760, 820]
      T_bakeout_C: [1520, 1680]
      pO2_bakeout_mbar: [0.5, 1.5]
      K_per_cycle_kg: [18, 28]
      K_recovery_per_cycle_pct: [75, 90]
      cycles_after_pathA: [0, 1]
      cycles_after_pathB: 2
      targets: "formal low-T K/Fe diagnostic only; not a practical melt recipe"
      Fe_reduction_per_cycle_pct: [0, 0]
      Si_conditioned_kg: [20, 40]
    Na_phase:
      name: "Cool Fe cleanup or refused Cr/Ti diagnostic"
      T_inject_C: [1050, 1150]
      T_bakeout_C: [1520, 1680]
      pO2_bakeout_mbar: [0.5, 1.5]
      Na_total_kg: [80, 140]             # over all cycles
      Na_recovery_per_cycle_pct: [75, 92]
      cycles_after_pathA: 1
      cycles_after_pathB: 2
      products:
        Ti:
          mass_g: [12000, 15000]
          note: "65-85% of available; Na accessibility is key uncertainty"
    Na2O_activity_gamma: [1.0e-3, 1.0e-2]   # provenance: docs/chemistry-provenance.yaml::gamma_alkali_melt_activity; NaO0.5 value/range from REF-013/REF-019/REF-050; DOI 10.1016/j.gca.2019.06.021 / 10.2138/rmg.2018.84.11
    delta_G_shift_kJ_per_mol: [50, 80]       # due to low activity coefficient
    slag_solubility_limit_wt_pct: [8, 12]    # Na2O/K2O oxide equivalent
    endpoint:
      type: "pO2_return_to_setpoint"
      hold_time_min: 30
      species_monitored: ["Na", "K"]
    max_hold_hr:
      C3_K:
        A_staged: 3
        A: 12
        default: 25
      C3_NA:
        A_staged: 3
        A: 18
        default: 35
    termination_class: "A"
    duration_after_pathA_h: [10, 18]
    duration_after_pathB_h_per_phase: [20, 35]
    notes: >
      Three-tier shuttle architecture. Each tier: inject reductant -> reduce
      target oxide -> tap metal -> pO2 bakeout -> recover reductant.
      Mixed alkali effect reduces diffusion up to 10x at equimolar --
      strict K-first, Na-second sequencing mandatory.

  # --------------------------------------------------------------------------
  # C4 -- Mg Selective Pyrolysis (Branch Two)
  # --------------------------------------------------------------------------
  C4:
    label: "Mg Selective Pyrolysis (Branch Two)"
    temp_range_C: [1580, 1670]
    dT_dt_C_per_hr: null                 # IR-controlled
    atmosphere: "controlled_O2"
    pO2_mbar: [0.08, 0.35]
    pO2_mbar_default: 0.2
    p_total_mbar_default: 0.2
    # The N2 continuum floor derives from hard-sphere kinetic theory:
    # p_min = k_B*T/(sqrt(2)*pi*sigma_N2^2*Kn_max*D), with T=1670 C,
    # sigma_N2=3.798e-10 m, Kn_max=0.01, and hot-wall D=0.12 m. The
    # formula returns Pa; divide by 100 for mbar. The operational 5-15 mbar
    # pN2 band keeps Kn well below 0.01. Derive total pressure as pO2+pN2.
    # The optimizer pressure-cap chunk consumes this data; it is not a clamp.
    continuum_pressure_bounds:
      pN2_mbar: [5.0, 15.0]
      derived_pN2_floor_mbar: 0.348846
      knudsen_max: 0.01
      carrier_gas: "N2"
      gas_temperature_C: 1670
      pipe_diameter_m: 0.12
    target_species: ["Mg"]
    Mg_vapour_pressure_bar_1600C: 0.5  # Legacy inert note; MgO congruent vaporization follows overhead pO2, not this fossil scalar.
    prerequisite: "SiO2 activity reduced 30-50% by C3 conditioning"
    SiO_gunk_vs_vacuum: "10-40x lower"
    products:
      Mg:
        mass_kg: [18, 42]
        note: "35-65% of remaining Mg"
    optional_Ca_harvest:
      T_C: [1780, 1920]
      pO2_mbar: [0.03, 0.12]
      yield_pct: [15, 35]
      note: "poor selectivity, marginal"
      requires: "Furnace B at 1950-2050 C for serious Ca depletion"
    pN2_variant:
      note: "Under pN2 with pO2->0, MgO decomposition faster (no Le Chatelier)"
      T_lower_C: [1500, 1580]           # Mg p_vap ~0.1 bar
      pN2_mbar: [5, 12]
      contraindication: "if residual SiO2 wanted for ceramics"
    branch_one_fallback: "Skip C4; Mg electrolysed in C5 MRE"
    energy_savings_kWh_per_t: [2050, 2750]   # combined Mg pyrolysis + Al thermite vs MRE
    endpoint:
      type: "ir_signal_decay"
      threshold: "background"
      species_monitored: ["Mg"]
    max_hold_hr: 20
    soft_endpoint:
      type: "species_evaporation_rate_below_after_min_hold"
      species: "Mg"
      min_hold_hr: 6
      threshold_kg_hr: 0.02
    termination_class: "C"
    duration_h: null                     # IR-controlled
    notes: >
      Branch Two preferred: C4 Mg pyrolysis + C6 Mg thermite. MRE <= 1.6 V,
      ~1200-2000 kWh/t, electrode life 5-10x. Branch One fallback:
      skip C4, MRE to 2.5 V for Mg+Al+Ca, ~2650-4050 kWh/t,
      electrode life 2-3x.

  # --------------------------------------------------------------------------
  # C5 -- Limited MRE Under O2 Backpressure
  # --------------------------------------------------------------------------
  C5:
    label: "Limited MRE Under O2 Backpressure"
    temp_range_C: [1500, 1650]
    dT_dt_C_per_hr: null                 # electrochemical; not ramp-driven
    atmosphere: "O2_backpressure"
    pO2_bar: [0.01, 0.1]                # total pyrolysis suppression
    pO2_mbar_default: 50.0
    p_total_mbar_default: 50.0
    allow_mre_voltage_cap_V: 0.0         # optimizer/user gate; 0 disables C5/MRE
    allow_mre_voltage_cap_upper_bound_V: 2.5  # owner search bound; use 1.6 for pyrolysis-limited sweeps
    branch_two:
      max_voltage_V: 1.6                 # branch selectivity default (Si-only), used when allow_mre_voltage_cap_V is unset; a positive cap is the operative MRE voltage and overrides this (may exceed it to reduce more species)
      electrical_kWh_per_t: [600, 1200]
      targets: "Si as liquid metal (permanently removes SiO source)"
    branch_one:
      max_voltage_V: 2.5                 # branch selectivity default, used when allow_mre_voltage_cap_V is unset; a positive cap is the operative MRE voltage and overrides this
      electrical_kWh_per_t: [2650, 4050]
      targets: ["Si", "Al", "Mg", "Ca"]
    Si_Ti_selectivity: >
      Imperfect; voltage hold near 1.45 V (SiO2) for high-Si,
      ramp to 1.70 V (TiO2) for Ti-rich tap
    Ti_retention_option: "Stop before Ti sweep -> C6 produces Al-Ti alloy"
    electrode_materials:
      anode: "Ir or Pt-alloy"
      cathode: "Mo or W"
      life_extension_branch_two: "5-10x"
      life_extension_branch_one: "2-3x"
    endpoint:
      type: "current_decay_consecutive_hours"
      at_voltage_margin_V: 0.05
      threshold_A: 5.0
      consecutive_hours: 3
      at_voltage: "target V setpoint"
    max_hold_hr:
      branch_two: 800
      branch_one: 800
    termination_class: "A"
    duration_h: null                     # voltage-hold controlled
    notes: >
      O2 backpressure provides total pyrolysis suppression during
      electrolysis. Branch Two is strongly preferred for electrode
      longevity and energy budget.

  mre_baseline:
    pO2_mbar_default: 50.0
    p_total_mbar_default: 50.0
    max_hold_hr: 120
    soft_endpoint:
      type: "current_decay_consecutive_hours"
      min_voltage_V: 2.45
      threshold_A: 10.0
      consecutive_hours: 3
    termination_class: "C"

  # --------------------------------------------------------------------------
  # C6 -- Mg Thermite Reduction (Separate Solar Furnace)
  # --------------------------------------------------------------------------
  C6:
    label: "Mg Thermite Reduction (Separate Solar Furnace)"
    temp_range_C: [1380, 1450]
    default_hold_T_C: 1450
    dT_dt_C_per_hr: null                 # reaction-controlled
    atmosphere: "controlled_O2"          # bakeout atmosphere for Mg recovery
    pO2_mbar: [0.08, 0.35]              # bakeout pO2
    pO2_mbar_default: 0.2
    p_total_mbar_default: 0.2
    # Same N2 continuum derivation and operational band as C4, evaluated at
    # the C6 recipe maximum 1450 C: k_B*(1450+273.15) /
    # (sqrt(2)*pi*(3.798e-10 m)^2*0.12 m*0.01) = 30.935 Pa = 0.309350 mbar.
    # The 5.0 mbar operating floor remains conservative at 16.16x that minimum.
    continuum_pressure_bounds:
      pN2_mbar: [5.0, 15.0]
      derived_pN2_floor_mbar: 0.309350
      knudsen_max: 0.01
      carrier_gas: "N2"
      gas_temperature_C: 1450
      pipe_diameter_m: 0.12
    target_species: ["Al"]
    reaction: "3Mg(l) + Al2O3(melt) -> 3MgO(slag) + 2Al(l)"
    # 2026-07-11 C6 static-recipe sweep:
    # staged residuals from executable C0->C0B->C2A_STAGED->C3_NA->C4,
    # MAGEMin liquid_fraction(T) workability threshold >=0.5, C6 Al-yield
    # sweep 1380..1470 C with 5 C refinement near 1430..1455, and selection
    # tie-break requiring >=4 kJ/mol-O2 Mg/Al2O3 headroom. Feasible static
    # feedstocks (low/high-Ti mare, highland, Mars basalt) all select 1450 C;
    # CI remains a typed refusal (liquid_fraction=0.0 through the window).
    # Yield curve excerpt, Al kg per tonne at T C:
    # feedstock                 window          lf1450  1380    1430    1450    1470   recipe
    # lunar_mare_low_ti         [1380,1471.4)   0.992  25.129  25.129  25.129  25.130  1450
    # lunar_mare_high_ti        [1380,1471.4)   0.999  25.537  25.538  25.538  25.538  1450
    # lunar_highland            [1380,1471.4)   0.970  28.503  28.503  28.503  28.503  1450
    # mars_basalt               [1380,1471.4)   0.899  25.440  25.441  25.442  25.442  1450
    # ci_carbonaceous_chondrite empty           0.000  forced-only, not recipe-feasible
    # Evidence: docs-private/research/2026-07-11-c6-static-temperature/results.json
    static_window_by_feedstock:
      ci_carbonaceous_chondrite:
        status: "refused"
        reason_refused: "c6_joint_thermodynamic_liquid_fraction_window_empty"
        liquid_fraction_at_hold: 0.0
        joint_window:
          status: "empty"
          T_min_C: null
          T_max_exclusive_C: 1471.4
        source: "docs-private/research/2026-07-11-c6-static-temperature/results.json"
    JANAF_4th_multiphase_margin_kJ_per_mol_O2:   # recomputed from ellingham_thermo multiphase fits
      Mg_Al_1450C: 4.153
      Mg_Al_crossover_C: 1471.4
      Mg_Al_1500C: -5.557
      Mg_Al_1600C: -24.978
    kinetic_driven_above_crossover: false
    kinetic_note: >
      The static recipe holds at 1450 C, below the 1471.4 C Mg/Al2O3
      multiphase crossover with +4.153 kJ/mol-O2 standard-state headroom.
      Operation above the crossover is not part of the static recipe and must be
      refused unless a future optimizer-owned local thermite/exotherm model
      supplies separate evidence.
    Mg_density_g_per_cm3: 1.58
    melt_density_g_per_cm3: [2.5, 2.8]
    injection: "Mg rods via SiC bottom port; buoyancy-driven reaction column"
    Mg_stoichiometric_draw_mare_kg: [50, 60]
    Mg_recovery_per_bakeout_pct: [75, 85]
    Mg_inventory_balance:
      mare: "net positive (Mg-surplus)"
      highland: "~neutral at >=80% recovery"
      bootstrapping: "3-6 batches of C4 accumulation before first thermite"
    back_reduction_cascade:
      reaction: "4Al + 3SiO2 -> 2Al2O3 + 3Si"
      note: "spontaneous separation by oxide stability"
    self_terminating_liquidus:
      ceiling_C: 1700
      stalls_when: "residual SiO2 + Al2O3 < 15-20%"
    terminal_slag:
      mass_kg: [10, 15]
      REE_wt_pct: [0.5, 1.0]
      composition: "CaO-MgO with minor SiO2/Al2O3 (synthetic doloma)"
    endpoint:
      type: "self_terminating"
      criterion: "liquidus exceeds 1700 C (residual SiO2+Al2O3 < 15-20%)"
    max_hold_hr: 20
    composition_endpoint:
      type: "refractory_oxide_sum_below"
      species: ["SiO2", "Al2O3"]
      threshold_wt_pct: 17.5
    termination_class: "A"
    duration_h: null                     # self-terminating
    notes: >
      Uses separate solar furnace. Self-terminating when residual
      SiO2+Al2O3 falls below 15-20 wt% (liquidus exceeds ~1700 C).
      Al-Ti alloy produced if TiO2 was retained from C5.
      Mg bootstrapping: 3-6 C4 batches to accumulate 150-300 kg
      inventory before first thermite run.

  # --------------------------------------------------------------------------
  # C7 -- Aluminothermic Ca Recovery (Optional / Default Off)
  # --------------------------------------------------------------------------
  C7:
    label: "Aluminothermic Ca Recovery (Optional)"
    enabled: false
    objective: "ree_enrichment"
    aluminate_mode: "C3A"
    al_fraction: 1.0
    al_credit_limit_kg: 0.0
    extent_fraction: 1.0
    allow_partial_extent: true
    default_hold_T_C: 1200
    temp_range_C: [1100, 1300]
    dT_dt_C_per_hr: null
    atmosphere: "hard_vacuum"
    pO2_mbar_default: 0.0
    p_total_mbar_default: 0.05
    hold_time_h: 1.0
    hold_time_source: "owner-ratify:c7-single-pass-hold-time-v1"
    ca_route_surface_area_m2: 0.2
    ca_route_surface_area_source: "owner-ratify:c7-ca-route-surface-area-v1"
    ca_condenser_temperature_C: 780
    active_ca_condensation_route: true
    dedicated_ca_condenser: true
    thermo_margin_kJ_per_mol_O2: 1.0
    ca_shuttle:
      enabled: false
      rate_fraction: 0.0
      targets: ["Al2O3"]
      reserve_ca_product_fraction: 1.0
    max_hold_hr: 1
    endpoint:
      type: "single_c7_pass"
    termination_class: "C"
    notes: >
      Default-off C7 campaign. Reduces CaO with Al under hard vacuum,
      captures Ca in a dedicated condenser, and reports calcium-aluminate
      slag plus REE-enriched residual ceramic separately.


# ============================================================================
# 1a. COMPLETION CONTRACTS
# ============================================================================
completion_contracts:
  version: "step-gating-completion-contracts-v1"
  vapor_defaults: &vapor_completion_contract
    mechanism: "vaporization"
    product_accounts: &vapor_product_accounts
      - "process.condensation_train"
      - "process.overhead_gas"
      - "terminal.chromium_condensed_oxide_stored"
    residual_accounts: &vapor_residual_accounts
      - "process.cleaned_melt"
      - "terminal.slag"
    wall_account: "process.wall_deposit_segment_*"
    denominator_source: "product_plus_residual_plus_wall_deposit"
    provenance_rule: "narrow_account_feedstock_clean"
    mid_run_vs_terminal: "mid_run_cumulative"
    aggregation: "min_all_targets"
    deferred: false
  deferred_defaults: &deferred_completion_contract
    product_accounts: []
    residual_accounts: []
    residual_species: []
    wall_account: null
    element_map: {}
    denominator_source: "deferred"
    provenance_rule: "deferred"
    mid_run_vs_terminal: "deferred"
    aggregation: "deferred"
    deferred: true

  species_sets:
    Na: &completion_species_Na ["Na", "Na2O"]
    K: &completion_species_K ["K", "K2O"]
    Fe: &completion_species_Fe ["Fe", "FeO"]
    Si: &completion_species_Si ["SiO", "SiO2"]
    Mg: &completion_species_Mg ["Mg", "MgO"]
    Cr: &completion_species_Cr ["Cr", "CrO2", "Cr2O3"]
  residual_species:
    Na: &completion_residual_Na ["Na2O", "Na"]
    K: &completion_residual_K ["K2O", "K"]
    Fe: &completion_residual_Fe ["FeO", "Fe"]
    Si: &completion_residual_Si ["SiO2", "SiO"]
    Mg: &completion_residual_Mg ["MgO", "Mg"]
    Cr: &completion_residual_Cr ["Cr2O3", "CrO2", "Cr"]

  gated_steps:
    C0:
      contracts:
        - <<: *deferred_completion_contract
          contract_id: "C0.H2O.volatile.deferred"
          mechanism: "volatile_removal"
          target_species: "H2O"
          semantic_target_kind: null
          target_element: null
          deferred_reason: "Stage-0 volatile inventory release fraction is out of SG-2B vapor-first scope."
        - <<: *deferred_completion_contract
          contract_id: "C0.CO2.volatile.deferred"
          mechanism: "volatile_removal"
          target_species: "CO2"
          semantic_target_kind: null
          target_element: null
          deferred_reason: "Stage-0 volatile inventory release fraction is out of SG-2B vapor-first scope."
        - <<: *deferred_completion_contract
          contract_id: "C0.S2.volatile.deferred"
          mechanism: "volatile_removal"
          target_species: "S2"
          semantic_target_kind: null
          target_element: null
          deferred_reason: "Stage-0 volatile inventory release fraction is out of SG-2B vapor-first scope."
        - <<: *deferred_completion_contract
          contract_id: "C0.CHNOPS.semantic.deferred"
          mechanism: "volatile_removal"
          target_species: null
          semantic_target_kind: "CHNOPS"
          target_element: null
          deferred_reason: "Composite CHNOPS split needs Stage-0 inventory denominator; out of SG-2B vapor-first scope."
    C0b_p_cleanup:
      contracts:
        - <<: *deferred_completion_contract
          contract_id: "C0b.PO.semantic.deferred"
          mechanism: "volatile_removal"
          target_species: null
          semantic_target_kind: "PO"
          target_element: null
          deferred_reason: "P-cleanup volatile denominator is Stage-0 inventory, not silicate rump; out of SG-2B vapor-first scope."
        - <<: *deferred_completion_contract
          contract_id: "C0b.POx.semantic.deferred"
          mechanism: "volatile_removal"
          target_species: null
          semantic_target_kind: "POx"
          target_element: null
          deferred_reason: "P-cleanup volatile denominator is Stage-0 inventory, not silicate rump; out of SG-2B vapor-first scope."
    C2A_continuous:
      contracts:
        - <<: *vapor_completion_contract
          contract_id: "C2A_continuous.Na.vapor"
          target_species: "Na"
          semantic_target_kind: null
          target_element: "Na"
          residual_species: *completion_residual_Na
          element_map:
            Na: *completion_species_Na
        - <<: *vapor_completion_contract
          contract_id: "C2A_continuous.K.vapor"
          target_species: "K"
          semantic_target_kind: null
          target_element: "K"
          residual_species: *completion_residual_K
          element_map:
            K: *completion_species_K
        - <<: *vapor_completion_contract
          contract_id: "C2A_continuous.Fe.vapor"
          target_species: "Fe"
          semantic_target_kind: null
          target_element: "Fe"
          residual_species: *completion_residual_Fe
          element_map:
            Fe: *completion_species_Fe
        - <<: *vapor_completion_contract
          contract_id: "C2A_continuous.CrO2.vapor"
          target_species: "CrO2"
          semantic_target_kind: null
          target_element: "Cr"
          residual_species: *completion_residual_Cr
          element_map:
            Cr: *completion_species_Cr
        - <<: *vapor_completion_contract
          contract_id: "C2A_continuous.SiO.vapor"
          target_species: "SiO"
          semantic_target_kind: null
          target_element: "Si"
          residual_species: *completion_residual_Si
          element_map:
            Si: *completion_species_Si
    C2A_staged:
      stage_contracts:
        alkali_early_fe:
          contracts:
            - <<: *vapor_completion_contract
              contract_id: "C2A_staged.alkali_early_fe.Na.vapor"
