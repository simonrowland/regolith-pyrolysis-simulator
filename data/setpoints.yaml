          - campaign: ["C2A_STAGED", "C2A_staged"]
            from_campaign_hour: 0
            start_C: 1800
            end_C: 1800

  # Phase 1 uses the existing Poiseuille pipe conductance model.
  bleed_model: "poiseuille"
  conductance_kg_s: null

  # null derives from the campaign atmosphere/setpoint.
  downstream_pressure_bar: null

# Per-campaign override pattern:
# campaigns:
#   C0:
#     overhead_headspace:
#       enabled: true


# ============================================================================
# 15. EVAPORATION FREEZE GATE (migration toggle)
# ============================================================================
freeze_gate:
  # Default false preserves existing evaporation recipes and goldens.
  # Later milestone flips this on with golden regeneration.
  enabled: false

  # Per-campaign override pattern:
  # campaigns:
  #   C2A:
  #     freeze_gate:
  #       enabled: true


# ============================================================================
# 16. CHEMISTRY KERNEL POLICY FLAGS
# ============================================================================
# Project-level defaults for kernel behaviours that the engine code defaults
# to fail-loud on. Engine policy stays strict; this section makes operational
# overrides explicit + auditable in one place.
chemistry_kernel:
  # V1e-impl TIER-3 fail-loud (engine policy: refuse if a species without
  # measured evaporation_alpha is sampled). Cr, CrO2, and Mn currently lack
  # measured α in the literature (audit artifacts:
  # docs-private/goal-V1e-audit-alpha-coverage-2026-05-26.md and
  # docs-private/research/2026-05-29-e2b-alpha-anchors/findings.md  --  both
  # verified present 2026-06-12) and are routinely sampled in
  # default lunar/Mars extraction recipes (Cr2O3 trace ~0.3-0.5 wt%; CrO2(g)
  # is a real VapoRock species). Setting this true makes production use α=1.0
  # as the HK upper-bound placeholder for those species, with the fallback
  # status surfaced in the evaporation flux diagnostic so the operator sees
  # which species are using it. V1e-followon (task #36) is the post-0.5.0
  # work to either measure α or refine the placeholder policy.
  allow_unmeasured_alpha_fallback: true
  evaporation_series_resistance:
    melt_resistance_enabled: true
    melt_surface_renewal_base_kg_s_m2_pa: 1.0e-4
    melt_surface_renewal_source: "owner-ratify:melt-side-surface-renewal-v1"
