# ============================================================================
# 2. CONDENSATION TRAIN
# ============================================================================
condensation_train:

  # 0.5.4.1 B1-tunable (CW3 follow-on, 2026-05-28): per-species
  # condensation temperature overrides. The simulator's hardcoded
  # ``simulator/condensation.py::CONDENSATION_TEMPS_C`` carries the
  # in-source defaults; values here OVERRIDE the in-source defaults
  # via
  # ``apply_setpoints_condensation_temperature_overrides`` (called
  # once at sim load time). All values below match the in-source
  # defaults  --  no behavior shift from a fresh checkout. Operators
  # who want to retune (e.g., move SiO from the recipe midpoint to
  # the cold-baffle anchor) edit here; YAML is canonical for the
  # operator surface.
  condensation_temperatures_C:
    Fe:   1250
    SiO:  1050   # ENGINEERING MIDPOINT of the 900-1200 C SiO zone
    CrO2: 1250
    Mg:    580
    Na:    480
    K:     420
    Ca:    780
    Mn:   1000
    Cr:   1280
    Al:   1180
    Ti:   1500

  condensation_temperature_sources:
    Fe: >-
      Estimated/operator-routing override matching the Fe condenser band;
      no source-backed 1 mbar condensation-temperature row is declared.
    SiO: >-
      Estimated/operator-routing midpoint of the 900-1200 C SiO zone;
      not a literature-derived pure-component condensation temperature.
    CrO2: >-
      Option A Cr2O3 harvest setpoint. VapoRock JANAF0 has CrO2(g)
      thermochemistry valid from 1100-6000 K; the Sossi-Moon Cr fixture records
      CrO2(g) as the relevant Cr vapor above 1500 K. 1250 C sits inside the
      user-directed 1100-1300 C Cr stage and below the Fe-condenser midpoint so
      the dedicated Cr stage captures the vapor.
    Mg: >-
      Estimated/operator-routing override matching the alkali/Mg cyclone band;
      no source-backed 1 mbar condensation-temperature row is declared.
    Na: >-
      Estimated/operator-routing override matching the alkali/Mg cyclone band;
      no source-backed 1 mbar condensation-temperature row is declared.
    K: >-
      Estimated/operator-routing override matching the alkali/Mg cyclone band;
      no source-backed 1 mbar condensation-temperature row is declared.
    Ca: >-
      Estimated/operator-routing override for possible carryover; no
      source-backed 1 mbar condensation-temperature row is declared.
    Mn: >-
      Estimated/operator-routing override for the Cr/Mn oxide harvester branch;
      no source-backed 1 mbar condensation-temperature row is declared.
    Cr: >-
      Estimated/operator-routing override for Cr-bearing vapor capture; no
      source-backed 1 mbar condensation-temperature row is declared.
    Al: >-
      Estimated/operator-routing override for completeness; no source-backed
      1 mbar condensation-temperature row is declared.
    Ti: >-
      Estimated/operator-routing override for completeness; no source-backed
      1 mbar condensation-temperature row is declared.

  condensation_temperature_estimated:
    Fe: true
    SiO: true
    CrO2: false
    Mg: true
    Na: true
    K: true
    Ca: true
    Mn: true
    Cr: true
    Al: true
    Ti: true

  stages:
    - stage_number: 2
      key: "stage_2_cr_oxide_harvest"
      label: "Cr Oxide Harvester"
      temp_range_C: [1100, 1300]
      target_species: ["Cr", "CrO2"]
      product: "Cr2O3"
      terminal_account: "terminal.chromium_condensed_oxide_stored"
      note: "Dedicated physical Cr product stream; CrO2(g) disproportionates to Cr2O3(s) + O2(g)."

  # --- Volatiles Train (C0 / C0b products) ---
  volatiles_train:
    gate_valve: true                     # isolates from metals train
    stages:
      - label: "CHNOPS cold traps"
        temp_range_C: [50, 400]
        products: ["H2O", "CO2", "S2", "hydrocarbons"]
        note: "Solar-wind implanted volatiles from C0"
      - label: "P-trap (C0b)"
        temp_range_C: [350, 650]
        material: "CaO/MgO sorbent bed"
        products: ["phosphate_salts"]
        capture_efficiency_pct: [85, 98]
        note: "Clean Ca/Mg/alkali phosphates; active during C0b only"

  # --- Metals Train (C2A/C2B through C6) ---
  metals_train:

    stage_0_hot_duct:
      label: "Hot Duct with IR Spectroscopy"
      temp_range_C: [1400, 1600]
      material: "Doloma-REE ceramic (Material 3)"
      max_service_T_C: 1750
      ir_spectroscopy:
        window: "sapphire"
        monitored_lines:
          Na: "589 nm"
          K: "766 nm"
          Fe: "370 nm"
          SiO: "230 nm UV"
        note: "Na 589 nm early, Fe 370 nm mid, SiO 230 nm UV dominant >1400 C"
      compatibility: "Excellent with alkali and SiO"

    stage_1_fe_condenser:
      label: "Fe Condenser"
      temp_range_C: [1100, 1400]
      coating: "MZO (MgO-ZrO2)"
      max_service_T_C: 1450
      product: "liquid Fe draining to sump"
      compatibility: "liquid Fe compatible"

    stage_2_cr_oxide_harvest:
      label: "Cr Oxide Harvester"
      temp_range_C: [1100, 1300]
      material: "MZO-lined removable chromia cartridge"
      max_service_T_C: 1450
      product: "Cr2O3-rich chromium oxide concentrate"
      target_species: ["Cr", "CrO2"]
      terminal_account: "terminal.chromium_condensed_oxide_stored"
      compatibility: "Cr2O3-stable hot oxide harvest before SiO baffles"

    stage_3_sio_zone:
      label: "SiO Condensation Zone"
      temp_range_C: [900, 1200]
      material: "fused silica baffles (removable cartridge)"
      max_service_T_C: 1300
      product: "fused silica glass (SiO2 on SiO2 -- self-compatible)"
      note: >
        Only grams per campaign at >300x suppression under pO2 control;
        100-160 kg under Path A pN2 sweep.
      compatibility: "Self-compatible with condensate"

    stage_4_alkali_mg_cyclone:
      label: "Alkali / Mg Cyclone Separator"
      temp_range_C: [350, 700]
      condensation_temperatures_C:
        Mg: [500, 650]
        Na: [450, 550]
        K: [400, 500]

    stage_5_vortex_dust_filter:
      label: "Vortex Dust Filter"
      temp_range_C: [200, 350]

    stage_6_turbine_compressor:
      label: "Turbine-Compressor (Pressure Regulator)"
      function: "pressure regulator + first-stage O2 compression"
      control: "turbine speed sets upstream pO2; IR feedback loop"

    stage_7_accumulator:
      label: "O2 Accumulator"
      storage: "compressed O2 gas at ~3 bar"
      compression_energy_kWh_per_t: [15, 30]


# ============================================================================
# 2A. CONDENSER GEOMETRY
# ============================================================================
condenser_geometry:

  # BH-063 user-exposed knob candidate. Default is pi * (0.06 m)^2,
  # which reproduces the historical 12 cm hot-wall throat diameter:
  # sqrt(4 * initial_throat_area_m2 / pi) = 0.12 m.
  initial_throat_area_m2: 0.011309733552923255
  initial_throat_area_source: "BH-063 owner-approved back-compat anchor; 12 cm pipe throat, 2026-07-08"
  initial_throat_area_knob_candidate: true

  # Physical stage area = initial_throat_area_m2 * ratio. The throat is
  # the constriction; downstream condenser and terminal capture areas stay
  # at or above throat area and expose conservative baffle/cyclone surface
  # multipliers for later per-stage Kn/coating work.
  stage_area_ratios:
    fe_stage1: 4.0
    sio_stage3: 6.0
    alkali_stage4: 5.0
    terminal: 2.0
  stage_area_ratio_sources:
    fe_stage1: "engineering-default: baffled Fe condenser presents multiple throat areas downstream of the constriction"
    sio_stage3: "engineering-default: removable SiO baffle cartridge needs the largest capture surface among named stages"
    alkali_stage4: "engineering-default: cyclone separator effective wall area exceeds throat but stays below SiO baffle cartridge"
    terminal: "engineering-default: terminal vent/capture area is not the constriction; keep >= throat for follow-on Kn diagnostics"


# ============================================================================
# 3. DECISION TREE
# ============================================================================
decision_tree:

  path_selection:
    description: "Campaign 2 path choice"
    options:
      Path_A:
        label: "Continuous Adaptive pN2 Ramp (default)"
        campaign: "C2A_continuous"
        condition: "SiO2 extraction desired (most feedstocks)"
        products: ["Fe", "fused_silica_glass"]
        downstream_effects:
          - "C3 scope halved (0-1 K + 1 Na cycles)"
          - "C5 MRE scope reduced 20-40%"
          - "8-20% shorter full batch cycle"
        preferred: true
        note: >
          Default unless preserving CMAS glass for industrial
          glass or terminal ceramics recipes
      Path_B:
        label: "pO2-Managed Fe Pyrolysis"
        campaign: "C2B"
        condition: "CMAS glass preservation required"
        products: ["Fe", "CMAS_glass_preserved"]
        downstream_effects:
          - "C3 full scope required"
          - "8-20% longer overall cycle"

  branch_selection:
    description: "Campaign 4+ branch choice"
    options:
      Branch_Two:
        label: "C4 Mg Pyrolysis + C6 Mg Thermite (preferred)"
        campaigns: ["C4", "C5_limited", "C6"]
        C5_max_voltage_V: 1.6
        electrical_kWh_per_t: [1200, 2000]
        electrode_life_factor: "5-10x"
        preferred: true
      Branch_One:
        label: "Skip C4, Full MRE (fallback)"
        campaigns: ["C5_full"]
        C5_max_voltage_V: 2.5
        electrical_kWh_per_t: [2650, 4050]
        electrode_life_factor: "2-3x"

  C5_Ti_retention_option:
    description: "Optional Ti retention in C5"
    criterion: "Stop MRE before Ti sweep voltage (1.5-1.6 V)"
    effect: "C6 produces Al-Ti alloy instead of pure Al"

  guidance:
    - priority: "Maximum throughput / electrode life / fused silica"
      path: "A"
      branch: "Two"
      rationale: "8-20% faster, halved C3, 5-10x electrode life"
    - priority: "Structural CMAS glass or specific ceramics recipes"
      path: "B"
      branch: "Two"
      rationale: "Preserves melt for direct tapping as Material 1"
    - priority: "Minimal electrical power budget"
      path: "A"
      branch: "Two"
      rationale: "Lowest total kWh/t"
    - priority: "Al-Ti alloy production"
      path: "A or B (stop C5 before Ti)"
      branch: "Two"
      rationale: "Retain TiO2 for thermite"
    - priority: "Bootstrapping phase (first 3-6 batches)"
      path: "A"
      branch: "Two"
      rationale: "Maximises early Mg harvest for C6 inventory"


# ============================================================================
# 4. ENDPOINT CRITERIA
# ============================================================================
endpoint_criteria:

  general: >
    IR spectroscopy (Stage 0 hot-duct sapphire window)
    + pressure stabilisation + cumulative mass loss.
    Model-predictive or PID with IR + pressure feedback;
    induction stirring ensures surface renewal.

  species_lines:
    Na:
      wavelength_nm: 589
    K:
      wavelength_nm: 766
    Fe:
      wavelength_nm: 370
    SiO:
      wavelength_nm: 230
      band: "UV"
      note: "dominant >1400 C"
    O2:
      method: "derived from turbine speed"

  termination_rules:
    C0:
      criterion: "volatile IR signals decay to <5% peak"
    C0b_p_cleanup:
      criterion: "P-species IR signals decay to <5% peak"
    C2A_continuous:
      criterion: >
        Na/K/Fe signals decay to <5% peak;
        SiO signal reaches target a(SiO2) reduction
    C2B:
      criterion: "Fe signal decays to <5% peak"
    C3:
      criterion: "Alkali bakeout pO2 returns to setpoint and holds for 30 min"
    C4:
      criterion: "Mg vapor signal decays to background"
    C5:
      criterion: "Voltage hold + current decay to <10 A at target V"
    C6:
      criterion: >
        Self-terminating when liquidus >1700 C
        (residual SiO2+Al2O3 < 15-20%)

  control:
    method: "Model-predictive or PID"
    feedback: ["IR_spectroscopy", "pressure"]
    surface_renewal: "induction stirring (4-8x rate acceleration)"


# ============================================================================
# 5. pO2 CONTROL METHODS
# ============================================================================
pO2_control_methods:

  general: >
    Closed-loop via Stage 5 turbine speed + variable O2 bleed
    or electrochemical pump.

  precision_mbar: [0.1, 0.3]            # in viscous regime
  sensors: ["IR-derived pO2", "turbine RPM feedback"]

  methods_by_campaign:
    C0:
      method: "hard vacuum (no pO2 control needed)"
      pO2_bar: null
    C0b_p_cleanup:
      method: "controlled O2 flow/sweep or mild bubbling"
      pO2_mbar: [3.0, 15.0]
    C2A_continuous:
      method: "Fe-granule sorbent only (pO2 -> 0)"
      pO2_bar: "<1e-8"
    C2B:
      method: "Fe-granule sorbent + precision O2 micro-bleed to target"
      pO2_mbar: [0.8, 2.3]
    C3:
      method: "Fe-granule sorbent + precision O2 micro-bleed to target"
      pO2_mbar: [0.5, 1.5]
    C4:
      method: "Fe-granule sorbent + precision O2 micro-bleed to target"
      pO2_mbar: [0.08, 0.35]
    C5:
      method: "O2 backpressure from accumulator"
      pO2_bar: [0.01, 0.1]
    C6:
      method: "Fe-granule sorbent + precision O2 micro-bleed to target"
      pO2_mbar: [0.08, 0.35]
    Mars_merged:
      method: "Natural CO2 dissociation + regulated flow"
      note: "no deep vacuum possible; ~6 mbar surface pressure"


# ============================================================================
# 6. FURNACE
# ============================================================================
furnace:

  solar_concentrator:
    aperture_m2: 100
    lunar_insolation_W_per_m2: 1361
    thermal_power_kW: 136

  crucible:
    diameter_m: 0.5
    melt_surface_area_m2: 0.2

  hot_wall_pipe:
    diameter_cm: [10, 20]
    typical_cm: 12

  bottom_tap:
    material: "SiC-lined"
    design: "freeze-valve"
    function: "drain/injection dual-purpose"

  induction_stirring:
    rate_acceleration_factor: [4, 8]
    thermal_cycling_C: [50, 80]
    note: "continuous; ensures surface renewal for evaporation kinetics"

  melt_viscosity:
    FeO_fluxed_basalt_Pa_s: [3, 10]      # fresh C2 melt
    Fe_depleted_aluminosilicate: "higher; better for electrode stability"

  total_batch_time_days: [4, 9]
  total_electrical_kWh_per_t_branch_two: [1200, 2000]


# ============================================================================
# 7. REFRACTORY COMPATIBILITY
# ============================================================================
refractory_compatibility:

  zones:
    - zone: "Stage 0 hot duct"
      material: "Doloma-REE ceramic"
      max_T_C: 1750
      compatibility: "Excellent with alkali and SiO"

    - zone: "Stage 1 Fe condenser"
      material: "MZO (MgO-ZrO2) coating"
      max_T_C: 1450
      compatibility: "Liquid Fe compatible"

    - zone: "Stage 2 SiO2 capture"
      material: "Removable fused silica"
      max_T_C: 1300
      compatibility: "Self-compatible with condensate"

    - zone: "Main crucible / tap"
      material: "Mo-lined or SiC freeze-valve"
      max_T_C: 1700
      compatibility: "Induction + Mg injection OK"

    - zone: "C5 electrodes"
      material: "Ir/Pt anode, Mo/W cathode"
      max_T_C: 1650
      compatibility: "Branch Two extends life 5-10x"

  general_rule: >
    Avoid long-term silica exposure to alkali vapors or
    high pO2 above 1400 C.


# ============================================================================
# 8. MRE VOLTAGE SEQUENCE
# ============================================================================
mre_voltage_sequence:

  description: >
    Electrochemical decomposition voltage sequence for molten regolith
    electrolysis (C5). Species reduced in order of increasing voltage.
    Values per mol O2 at ~1600 C.

  electrode_materials:
    anode: "Ir or Pt-alloy"
    cathode: "Mo or W"

  # 0.5.4.1 B5 hardening (midflight P1 fix, 2026-05-28): explicit
  # ``min_hold_hours`` per species so the YAML-driven ladder
  # reproduces the historical hardcoded MRE_BASELINE step-advance
  # behavior. Pre-hardening, the Python builder defaulted
  # unspecified species to 3h, shifting Al2O3 / MgO / CaO hold-
  # hours from their legacy values (8 / 5 / 10). Now the YAML
  # carries the canonical hold-hours; the Python fallback ladder
  # (simulator/extraction.py::_MRE_VOLTAGE_LADDER_FALLBACK)
  # remains in lockstep for the missing-YAML path. Na2O / K2O are
  # present in the YAML but ABSENT from the Python fallback  -- 
  # operators running with the YAML get the 11-species ladder;
  # tests built on the fallback see the 9-species subset.
  # V2O5 was an early member of the YAML but was REMOVED in the
  # 0.5.4.1 morning-review P1 fix because V is absent from the
  # supporting simulator tables (state.py OXIDE_SPECIES /
  # OXIDE_TO_METAL / MOLAR_MASS + electrolysis.py DECOMP_VOLTAGES /
  # ELECTRONS_PER_OXIDE). Re-add via the same place once full V
  # support lands.
  # decomposition_V: "canonical" resolves through
  # simulator/mre_ladder.py DECOMP_VOLTAGES.
  sequence:
    - species: "NiO"
      decomposition_V: "canonical"
      campaign: "C5 carbonaceous trace recovery"
      min_hold_hours: 2
      note: >-
        NiO source: DeltaGf(NiO, ~1873 K) ~= -76 kJ/mol from Hemingway
        1990 Am. Mineral. 75:781 + Robie & Hemingway auxiliaries,
        cross-confirmed by NEA Chemical Thermodynamics of Nickel;
        E = -DeltaGf/(2F) ~= 0.39 V standard-state, with runtime Nernst
        applying melt activity + pO2. MRE-COVERAGE #32B reanchors FeO,
        Cr2O3, MnO, SiO2, TiO2, and Al2O3 to the same raw-thermo basis
        (NIST-JANAF/Chase 1998, Barin, O'Neill 1988, Robie-Hemingway,
        NEA), rounded to 0.05 V. Fe2O3 is not a live MRE full-reduction
        rung; ferric Fe is represented by fO2-coupled speciation.
        Na2O/K2O remain held at legacy 0.5 V pending activity/vapor-aware
        grounding because Na/K are volatile at 1873 K.

    - species: "Na2O"
      decomposition_V: "canonical"
      campaign: "C5 opening"
      min_hold_hours: 2
      note: "alkali recovery; held legacy pending volatility-aware grounding"

    - species: "K2O"
      decomposition_V: "canonical"
      campaign: "C5 opening"
      min_hold_hours: 2
      note: "alkali recovery; held legacy pending volatility-aware grounding"

    - species: "FeO"
      decomposition_V: "canonical"
      campaign: "C5"
      min_hold_hours: 3
      note: "O'Neill 1988 + Chase 1998 raw-thermo anchor; should be pre-depleted by C2/C3"

    - species: "Cr2O3"
      decomposition_V: "canonical"
      campaign: "C5 trace cleanup"
      min_hold_hours: 2

    # V2O5 entry intentionally omitted (0.5.4.1 morning-review P1 fix,
    # 2026-05-28): V is not in simulator/state.py OXIDE_SPECIES /
    # OXIDE_TO_METAL / MOLAR_MASS / electrolysis.py decomposition
    # voltage tables. Including V2O5 in the YAML ladder caused
    # _step_mre to silently no-op for the species  --  operator-visible
    # "running" lie with zero cleanup output. Add V2O5 here once
    # full V vector landing support lands (vapor-pressure data +
    # MOLAR_MASS + OXIDE_TO_METAL + ELECTRONS_PER_OXIDE etc.).

    - species: "MnO"
      decomposition_V: "canonical"
      campaign: "C5 trace cleanup"
      min_hold_hours: 2

    - species: "SiO2"
      decomposition_V: "canonical"
      campaign: "C5 primary target"
      min_hold_hours: 5
      note: "Chase 1998 raw-thermo anchor; Si as liquid metal; permanently removes SiO source"

    - species: "TiO2"
      decomposition_V: "canonical"
      campaign: "C5 sweep"
      min_hold_hours: 3
      note: "Chase 1998 + Barin raw-thermo anchor; optional -- retain for C6 Al-Ti alloy by stopping before this voltage"

    - species: "Al2O3"
      decomposition_V: "canonical"
      campaign: "C5 Branch One only"
      min_hold_hours: 8
      note: "NIST-JANAF/Chase 1998 + Barin raw-thermo anchor"

    - species: "MgO"
      decomposition_V: "canonical"
      campaign: "C5 Branch One only"
      min_hold_hours: 5

    - species: "CaO"
      decomposition_V: "canonical"
      campaign: "C5 Branch One only (or dedicated batch)"
      min_hold_hours: 10

  voltage_strategy:
    branch_two:
      hold_V: [1.3, 1.4]
      purpose: "high-Si extraction"
      ramp_V: [1.5, 1.6]
      ramp_purpose: "Ti-rich tap"
      max_V: 1.6
    branch_one:
      max_V: 2.5
      purpose: "Si + Al + Mg + Ca"


# ============================================================================
# 9. THERMODYNAMIC REFERENCE (V1c JANAF refit)
# ============================================================================
ellingham_V1c_reference:
  description: >
    V1c JANAF-fit ordering for recipe gates. More-negative delta-G_f per mol O2
    means the oxide is more stable; reduction requires the reagent oxide to sit
    below the target oxide at the recipe temperature.
  moderate_T_ordering: "Ca > Mg > Al > Ti > Mn > Cr > Fe > Na > K"
  key_crossovers_C:   # 2026-07-09 JANAF-4th multiphase re-ground (were 832.0 / 1173.4 / 1573.0 under the linear fit)
    K_FeO: 836.25
    Na_FeO: 1181.5
    Mg_Al2O3: 1471.4
  recipe_implications:
    alkali_shuttle: >
      K/FeO is gone in the melt window. Na/FeO survives only as a thin cool
      window at 1150 C (a positive ~31 C margin) and is refused above the 1181.5 C crossover.
    C6_thermite: >
      Mg/Al2O3 is favorable only below the 1471 C multiphase crossover. The
      static recipe now holds at 1450 C (+4.153 kJ/mol O2), selected by the
      2026-07-11 executable C6 residual-melt sweep with >=4 kJ/mol O2 headroom.
      CI carbonaceous chondrite has no workable static C6 window and remains a
      typed refusal rather than a kinetic/exotherm claim.


# ============================================================================
# 10. VAPOUR PRESSURES (key operating parameters)
# ============================================================================
vapour_pressures:
  description: "Metal vapour pressures at process temperatures"
  values:
    - species: "Na"
      T_C: 1600
      p_vap: "several bar"
      note: ">> any pO2 setpoint"
    - species: "K"
      T_C: 1600
      p_vap: "> Na (more volatile)"
      note: ">> any pO2 setpoint"
    - species: "Fe"
      T_C: [1400, 1600]
      p_vap_mbar: [0.01, 0.1]
      note: "adequate for selective harvest"
    - species: "Mg"
      T_C: 1600
      p_vap_bar: 0.5
      note: ">> pO2 setpoints"
    - species: "Mg"
      T_C: [1500, 1580]
      p_vap_bar: 0.1
      note: "workable under pN2 variant"
    - species: "Ca"
      bp_C: 1484
      note: "significant above ~1500 C"
    - species: "Al"
      bp_C: 2519
      note: "negligible <2500 C; not pyrolysable"
    - species: "Si"
      p_vap: "negligible"
      note: "extracted only by MRE"
    - species: "SiO"
      T_C: 1600
      p_vap_mbar: [0.5, 2.0]
      condition: "vacuum"
      note: "the problem species"
    - species: "SiO"
      T_C: 1600
      p_vap_mbar: "<0.005"
      condition: "1 mbar O2 backpressure"
      note: "suppressed >300x"

  SiO_suppression:
    law: "p(SiO) = K(T) * a(SiO2) / sqrt(pO2)"
    at_hard_vacuum_pO2_bar: 1.0e-9
    at_1mbar_pO2_bar: 1.0e-3
    suppression_factor_theoretical: 1000
    suppression_factor_conservative: 300  # accounts for non-ideality


