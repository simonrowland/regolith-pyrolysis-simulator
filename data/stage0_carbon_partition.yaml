burnout_kinetics:
  labile_chon_unlimited_o2:
    law: complete_when_o2_sufficient
    chi_default: 1.0
    source: sephton_2004_stepped_combustion_temperature_classes

  refractory_accessible_char_tga:
    law: apparent_solid_state
    model: avrami_erofeev_n_1p5
    Ea_kJ_per_mol_range: [59.6, 110.66]
    temperature_validity_C: [400, 700]
    atmosphere: air
    source: guo_2018_rsc_advances_low_rank_char
    use: scenario_only_not_default_certification

  graphite_process_reductant_ere:
    law: langmuir_extended_resistance_equation
    Ea_ads_cal_per_mol_range: [4500, 7500]
    Ea_des_cal_per_mol_range: [35000, 45000]
    davis_hottel:
      Ea_ads_cal_per_mol: 11400
      k_ads0_g_per_cm2_s: 5.65
      Ea_des_cal_per_mol: 28800
      k_des0_g_per_cm2_s: 298
    source: doe_osti_5279262
    use: process_added_graphitic_C_or_scenario_only

uncertainty_policies:
  refractory_process_extent:
    certified_range: [0.0, 1.0]
    reason: missing_O2_bake_data_for_regolith_matrix_pO2_surface_area_dwell
    queued_measurement: O2_bake_TGA_or_fixed_bed_test_at_1050C_with_pO2_profile