# Stage-0 foulant disposition registry (chunk A0).
# CACHE-INERT until G2 digest wiring — not in REQUIRED_DATA_DIGEST_KEYS.
# Constants: evidence-E1 (C0-corrected), foulant-disposition-spec, CONTAMINANT-WARNING-DOC.
# †ΔG rows: NIST WebBook tier-2 bounds (ΔH°f − TΔS°, no Cp); sulfide rows anchor kinetic onset (E2).

foulant_dG:
  CaSO4_thermal_decomp:
    reaction: "CaSO4 -> CaO + SO2 + 1/2 O2"
    source: "NIST WebBook †; E1 §1.1 (½O₂ path); C0-corrected"
    points:
      - {T_K: 1373.15, dG_kJ_per_mol: 80.0}
      - {T_K: 1573.15, dG_kJ_per_mol: 57.0}
      - {T_K: 1673.15, dG_kJ_per_mol: 28.0}
      - {T_K: 1773.15, dG_kJ_per_mol: 0.0}

  MgSO4_thermal_decomp:
    reaction: "MgSO4 -> MgO + SO3"
    source: "NIST WebBook † SO₃ path; E1 §1.4 C0-6"
    points:
      - {T_K: 1273.15, dG_kJ_per_mol: 24.0}
      - {T_K: 1453.15, dG_kJ_per_mol: 0.0}
      - {T_K: 1573.15, dG_kJ_per_mol: -64.0}

  FeSO4_thermal_decomp:
    reaction: "2 FeSO4 -> Fe2O3 + 2 SO2 + O2"
    source: "NIST WebBook †; E1 §1.5; Kanari 2018"
    points:
      - {T_K: 873.15, dG_kJ_per_mol: 30.0}
      - {T_K: 973.15, dG_kJ_per_mol: 0.0}
      - {T_K: 1173.15, dG_kJ_per_mol: -20.0}

  CaCO3_calcination:
    reaction: "CaCO3 -> CaO + CO2"
    source: "NIST WebBook †; E1 §2.1"
    points:
      - {T_K: 873.15, dG_kJ_per_mol: 20.0}
      - {T_K: 1173.15, dG_kJ_per_mol: -8.0}
      - {T_K: 1273.15, dG_kJ_per_mol: -35.0}

  MgCO3_calcination:
    reaction: "MgCO3 -> MgO + CO2"
    source: "NIST WebBook †; E1 §2.2"
    points:
      - {T_K: 673.15, dG_kJ_per_mol: 10.0}
      - {T_K: 773.15, dG_kJ_per_mol: -35.0}
      - {T_K: 1173.15, dG_kJ_per_mol: -105.0}

  Na2CO3_silicate_displacement:
    reaction: "Na2CO3 + SiO2 -> Na2SiO3 + CO2"
    source: "NIST WebBook †; E1 §2.3 C0-corrected (−84 @900 °C)"
    points:
      - {T_K: 1073.15, dG_kJ_per_mol: 20.0}
      - {T_K: 1173.15, dG_kJ_per_mol: -84.0}
      - {T_K: 1273.15, dG_kJ_per_mol: -120.0}

  Mg_ClO4_2_decomp:
    reaction: "Mg(ClO4)2 -> MgCl2 + 4 O2"
    source: "Sutter 2014 NTRS 20140006489; E1 §3.1 C0-2 balanced"
    points:
      - {T_K: 673.15, dG_kJ_per_mol: 15.0}
      - {T_K: 729.15, dG_kJ_per_mol: 0.0}
      - {T_K: 799.15, dG_kJ_per_mol: -45.0}

  Ca_ClO4_2_decomp:
    reaction: "Ca(ClO4)2 -> CaCl2 + 4 O2"
    source: "Bruck 2014 LPSC 2057; E1 §3.2 C0-2 balanced"
    points:
      - {T_K: 623.15, dG_kJ_per_mol: 20.0}
      - {T_K: 673.15, dG_kJ_per_mol: 0.0}
      - {T_K: 773.15, dG_kJ_per_mol: -35.0}

  FeS_roasting:
    reaction: "FeS + 3/4 O2 -> FeO + SO2"
    source: "E2 §2.1 JANAF-class; kinetic-onset tier-2 bracket (ΔG° ≪ 0 @1200–1400 K)"
    points:
      - {T_K: 673.15, dG_kJ_per_mol: 25.0}
      - {T_K: 873.15, dG_kJ_per_mol: 0.0}
      - {T_K: 1273.15, dG_kJ_per_mol: -120.0}

  CaS_roasting:
    reaction: "CaS + 2 O2 -> CaO + SO2"
    source: "E2 §2.1; kinetic-onset tier-2 bracket"
    points:
      - {T_K: 723.15, dG_kJ_per_mol: 20.0}
      - {T_K: 923.15, dG_kJ_per_mol: 0.0}
      - {T_K: 1273.15, dG_kJ_per_mol: -100.0}

  NiS_roasting:
    reaction: "NiS + O2 -> NiO + SO2"
    source: "E2 §2.1; kinetic-onset tier-2 bracket"
    points:
      - {T_K: 673.15, dG_kJ_per_mol: 22.0}
      - {T_K: 873.15, dG_kJ_per_mol: 0.0}
      - {T_K: 1273.15, dG_kJ_per_mol: -110.0}

NaCl:
  carrier:
    species: NaCl
    aliases: [nacl, halide, halides, nacl_kcl_salts]
    molar_mass_g_mol: 58.44
  group: other_mineral_contaminant
  reaction_family: volatilization
  thermo:
    antoine_row: foulant_vapor.NaCl
    source: "NIST WebBook SRD 69 Stull 1947; chloride-coefficients-salvage.md"
  gating:
    chi_model: vapor_psat_vs_overhead
  fate:
    on_escape: {account: evaporation, residual_target: NaCl}
    on_retain: {account: terminal.stage0_chloride_salt_phase}
  warning_flags:
    confidence: partly_grounded
    kinetic_access_flag: hk_alpha_tier2_salt_analogy

