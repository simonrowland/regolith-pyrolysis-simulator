version: "2026-06-10"
taxonomy_name: terminal_product_taxonomy
description: >
  Fail-closed classifier for simulator terminal products. Oxide ceramics are the
  common case, but metallic, mixed, and unclassified concentrates are first-class.

product_classes:
  oxide_ceramic:
    label: Oxide ceramic
  metallic:
    label: Metallic terminal product
  mixed:
    label: Mixed terminal product
  unclassified_concentrate:
    label: Unclassified concentrate

match_policy:
  policy_id: terminal_product_taxonomy.v1.fail_closed
  basis: oxide_wt_pct_normalized_volatiles_free
  input_bases:
    - oxide_wt_pct
    - oxide_mol
  classifier_basis: >
    CIPW-like normative composition projection over curated oxide terminal-product
    leaves. This is not thermodynamic equilibrium authority.
  ignored_oxide_residuals:
    - FeO
    - Fe2O3
    - MnO
    - Na2O
    - K2O
    - NiO
    - Cr2O3
  max_nonignored_unmodeled_oxide_wt_pct: 7.5
  min_modeled_basis_wt_pct: 50.0
  single_leaf:
    max_total_l1_residual_wt_pct: 5.0
    max_major_oxide_abs_residual_wt_pct: 3.0
    forbidden_nonleaf_major_oxide_wt_pct: 7.5
  mixture:
    max_phases: 4
    max_total_l1_residual_wt_pct: 7.5
    max_major_oxide_abs_residual_wt_pct: 4.0
    min_nontrace_phase_fraction_wt_pct: 10.0
    trace_phase_fraction_range_wt_pct: [0.5, 10.0]
  ambiguity:
    min_score_delta_wt_pct: 2.0
    fallback: unclassified_concentrate
  display:
    fallback_mode: composition_only
    user_label_term: terminal product
    internal_pool_term: rump

value_grade_policy:
  policy_id: terminal_product_taxonomy.grade.v1
  basis: oxide_wt_pct_normalized_volatiles_free
  buckets:
    rare_earth_oxides:
      label: Rare-earth oxides
      species: [REE2O3]
      coverage_note: >
        Current taxonomy data carries rare-earth oxides as the lumped REE2O3
        species when present; individual rare-earth elements are omitted unless
        the input composition carries explicit species.
    titania:
      label: Titania
      species: [TiO2]
      coverage_note: TiO2 grade is reported only when TiO2 is present in the input residue composition.
    chromia:
      label: Chromia
      species: [Cr2O3]
      coverage_note: Cr2O3 grade is reported only when Cr2O3 is present in the input residue composition.
    zirconia:
      label: Zirconia
      species: [ZrO2]
      coverage_note: ZrO2 grade is reported only when ZrO2 is present in the input residue composition.
    metallic_pgm:
      label: Metallic / PGM
      species: []
      status: future_out_of_domain_today
      coverage_note: >
        Current terminal-product classifier receives oxide residue composition,
        not a metal/PGM product ledger; metallic and PGM grades are future
        scope and omitted rather than zero-filled.

provenance_required:
  - taxonomy_version
  - run_id
  - feedstock_id
  - terminal_product_account_or_artifact
  - basis
  - furnace_ceiling_c
  - temperature_profile_id
  - classifier_policy_id
  - ignored_oxides
  - residual_wt_pct

