  MgO:    {T_K_min: 1873, T_K_max: 1873, gamma_min: 0.25, gamma_max: 4.0, melt_class: "CMAS basicity 0.55-0.65"}
  MnO:    {T_K_min: 1823, T_K_max: 1923, gamma_min: 0.5, gamma_max: 7.2, melt_class: "FCMS(P) / CAS"}
  NaO0.5: {T_K_min: 1623, T_K_max: 1673, gamma_min: 8.4e-4, gamma_max: 2.2e-3, melt_class: "CMAS / CMS"}
  SiO2:   {T_K_min: 1573, T_K_max: 1773, gamma_min: 0.9, gamma_max: 1.1, melt_class: "CMAS (An-Di)"}
  TiO2:   {T_K_min: 1573, T_K_max: 1773, gamma_min: 1.5, gamma_max: 1.7, melt_class: "CMAS"}

  # ---- v2 additions (Table 2 augmentation, 2026-05-16) ----
