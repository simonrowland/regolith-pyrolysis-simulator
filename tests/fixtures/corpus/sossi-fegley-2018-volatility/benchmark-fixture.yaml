  # melt class — recorded as separate keyed entries with a "_NN" suffix where needed to preserve all rows.
  AsO1.5: {T_K_min: 1573, T_K_max: 1573, gamma_min: 0.03, gamma_max: 0.56, melt_class: "FCS", ref: "Chen & Jahanshahi 2010"}
  BiO1.5: {T_K_min: 1573, T_K_max: 1573, gamma_min: 0.3, gamma_max: 0.5, melt_class: "FCS", ref: "Paulina et al. 2013"}
  CoO_a:  {T_K_min: 1573, T_K_max: 1873, gamma_min: 0.5, gamma_max: 2.2, melt_class: "(F)CMAS", ref: "Holzheid et al. 1997"}
  CoO_b:  {T_K_min: 1673, T_K_max: 1673, gamma_min: 0.8, gamma_max: 1.8, melt_class: "CMAS", ref: "O'Neill & Eggins 2002; O'Neill & Berry 2006"}
  CrO:    {T_K_min: 1773, T_K_max: 1773, gamma_min: 1.9, gamma_max: 7.2, melt_class: "CAS", ref: "Pretorius & Muan 1992"}
  CrO1.5: {T_K_min: 1773, T_K_max: 1773, gamma_min: 23, gamma_max: 42, melt_class: "CAS", ref: "Pretorius & Muan 1992"}
