<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Regolith Pyrolysis Simulator{% endblock %}</title>

    <!-- IBM Plex Sans (technical typeface; degrades to the system stack offline) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap">

    <!-- Plotly for interactive charts -->
    <script src="https://cdn.plot.ly/plotly-2.35.0.min.js" charset="utf-8"></script>

    <!-- HTMX for declarative UI updates -->
    <script src="https://unpkg.com/htmx.org@2.0.4" crossorigin="anonymous"></script>

    <!-- Socket.IO for real-time simulation push -->
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js" crossorigin="anonymous"></script>

    <!-- Shared styles -->
    <link rel="stylesheet" href="{{ url_for('web.static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="top-nav">
        <div class="nav-brand">
            <span class="nav-icon">&#9790;</span>
            Regolith Pyrolysis Simulator
        </div>
        <div class="nav-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Simulator</a>
            {# Lunar Operator nav omitted: the game is a shelved stub. The game/ dir is gitignored and app.py mounts /lunar-operator only when it is restored. #}
        </div>
    </nav>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
